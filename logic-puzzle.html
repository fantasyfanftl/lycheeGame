<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逻辑推理挑战</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #333;
  padding: 12px;
  -webkit-tap-highlight-color: transparent;
}

.topbar {
  max-width: 640px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 4px;
  flex-wrap: wrap;
}

.back-link {
  color: #fff;
  font-size: 13px;
  text-decoration: none;
  background: rgba(255,255,255,0.18);
  padding: 6px 12px;
  border-radius: 16px;
}

.meta {
  display: flex;
  gap: 12px;
  font-size: 13px;
  color: #fff;
  font-weight: 500;
}

.container { max-width: 640px; margin: 0 auto; }

.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.category {
  display: inline-block;
  background: #f3e8ff;
  color: #764ba2;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 10px;
  margin-bottom: 12px;
  font-weight: 500;
}

.question {
  font-size: 16px;
  line-height: 1.7;
  color: #222;
  margin-bottom: 16px;
  white-space: pre-line;
}

.sequence {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.seq-box {
  aspect-ratio: 1;
  background: #fafafa;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: #bbb;
  font-weight: 300;
}

.seq-box svg { width: 82%; height: 82%; }

.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.option {
  background: #f5f5f7;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  color: #333;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: inherit;
  line-height: 1.5;
}

.option:hover:not(:disabled) {
  background: #ede9fe;
  border-color: #a78bfa;
}

.option:disabled { cursor: default; }

.letter {
  background: #764ba2;
  color: #fff;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}

.option.selected.correct, .option.reveal-correct {
  background: #dcfce7;
  border-color: #22c55e;
}
.option.selected.correct .letter, .option.reveal-correct .letter {
  background: #22c55e;
}

.option.selected.wrong {
  background: #fee2e2;
  border-color: #ef4444;
}
.option.selected.wrong .letter { background: #ef4444; }

.option-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.option-grid .option {
  flex-direction: column;
  padding: 8px 6px;
  gap: 6px;
  align-items: center;
}

.option-grid .letter { align-self: flex-start; }

.option-grid svg {
  width: 100%;
  max-width: 70px;
  height: auto;
  aspect-ratio: 1;
}

@media (max-width: 400px) {
  .option-grid { grid-template-columns: repeat(2, 1fr); }
}

.explanation {
  background: #f8f7fc;
  border-left: 4px solid #764ba2;
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.8;
  color: #444;
  white-space: pre-line;
}

.explanation h4 {
  font-size: 14px;
  margin-bottom: 6px;
}

.explanation.right h4 { color: #22c55e; }
.explanation.wrong h4 { color: #ef4444; }

.next-btn {
  width: 100%;
  background: #764ba2;
  color: #fff;
  border: none;
  padding: 14px;
  font-size: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}

.next-btn:active { transform: scale(0.98); background: #653d8f; }

.next-btn.secondary {
  background: #f5f3ff;
  color: #764ba2;
  margin-top: 8px;
  border: 1px solid #d9c9f2;
}

.next-btn.secondary:active { background: #ede4ff; }

.result-title {
  font-size: 22px;
  color: #764ba2;
  text-align: center;
  margin-bottom: 8px;
  font-weight: 600;
}

.result-score {
  font-size: 48px;
  text-align: center;
  color: #333;
  margin: 16px 0;
  font-weight: 700;
}

.result-score small { font-size: 20px; color: #999; font-weight: 400; }

.result-desc {
  text-align: center;
  color: #666;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 20px;
  padding: 0 8px;
}

/* ===== 开始屏 ===== */
.start-title {
  font-size: 24px;
  color: #764ba2;
  text-align: center;
  margin-bottom: 6px;
  font-weight: 700;
}
.start-subtitle {
  text-align: center;
  color: #777;
  font-size: 13px;
  margin-bottom: 18px;
}
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.cat-btn {
  background: #f7f4fc;
  border: 2px solid #e8dff5;
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: all 0.15s;
  color: #333;
}
.cat-btn:hover {
  background: #ede4ff;
  border-color: #a78bfa;
  transform: translateY(-1px);
}
.cat-btn:active { transform: translateY(0); }
.cat-label {
  font-size: 15px;
  font-weight: 600;
  color: #333;
  margin-bottom: 4px;
}
.cat-count {
  font-size: 11px;
  color: #764ba2;
  font-weight: 600;
  margin-bottom: 4px;
}
.cat-desc {
  font-size: 11px;
  color: #888;
  line-height: 1.4;
}
.cat-btn.full-width {
  grid-column: span 2;
  background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
  border: none;
  color: #fff;
}
.cat-btn.full-width .cat-label { color: #fff; font-size: 17px; }
.cat-btn.full-width .cat-count { color: rgba(255,255,255,0.95); }
.cat-btn.full-width .cat-desc { color: rgba(255,255,255,0.88); }

@media (max-width: 480px) {
  .question { font-size: 15px; }
  .option { font-size: 13px; padding: 11px 12px; }
  .seq-box { font-size: 28px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <div class="meta">
    <span id="progress">—</span>
    <span id="score"></span>
  </div>
</div>

<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
// ============================================================
//  SVG 生成器（图形推理题用）
// ============================================================

function svgArrow(deg) {
  return `<svg viewBox="0 0 80 80"><g transform="rotate(${-deg} 40 40)"><line x1="20" y1="40" x2="58" y2="40" stroke="#333" stroke-width="3"/><rect x="14" y="34" width="10" height="12" fill="#333"/><polygon points="64,40 52,32 52,48" fill="none" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/></g></svg>`;
}

function svgQuadrant(pos) {
  const paths = [
    "M40,40 L40,10 A30,30 0 0,1 70,40 Z",
    "M40,40 L70,40 A30,30 0 0,1 40,70 Z",
    "M40,40 L40,70 A30,30 0 0,1 10,40 Z",
    "M40,40 L10,40 A30,30 0 0,1 40,10 Z"
  ];
  return `<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="white" stroke="#333" stroke-width="2"/><path d="${paths[pos]}" fill="#333"/><line x1="10" y1="40" x2="70" y2="40" stroke="#333" stroke-width="1.5"/><line x1="40" y1="10" x2="40" y2="70" stroke="#333" stroke-width="1.5"/></svg>`;
}

function svgSquares(n) {
  const cells = [
    '<rect x="4" y="4" width="26" height="26" fill="#333"/>',
    '<rect x="30" y="4" width="26" height="26" fill="#333"/>',
    '<rect x="30" y="30" width="26" height="26" fill="#333"/>',
    '<rect x="4" y="30" width="26" height="26" fill="#333"/>'
  ];
  let s = '';
  for (let i = 0; i < n; i++) s += cells[i];
  return `<svg viewBox="0 0 60 60">${s}<rect x="4" y="4" width="52" height="52" fill="none" stroke="#333" stroke-width="2"/><line x1="30" y1="4" x2="30" y2="56" stroke="#333" stroke-width="1"/><line x1="4" y1="30" x2="56" y2="30" stroke="#333" stroke-width="1"/></svg>`;
}

function svgClock(deg) {
  return `<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="white" stroke="#333" stroke-width="2"/><g transform="rotate(${deg} 40 40)"><line x1="40" y1="40" x2="40" y2="16" stroke="#333" stroke-width="3" stroke-linecap="round"/></g><circle cx="40" cy="40" r="2.5" fill="#333"/></svg>`;
}

function svgNested(n) {
  let s = '';
  for (let i = 0; i < n; i++) {
    const r = 30 - i * 7;
    if (r > 0) s += `<circle cx="40" cy="40" r="${r}" fill="none" stroke="#333" stroke-width="2"/>`;
  }
  return `<svg viewBox="0 0 80 80">${s}</svg>`;
}

function svgGridDot(row, col) {
  const cell = 20, start = 10;
  const cx = start + col * cell + cell/2;
  const cy = start + row * cell + cell/2;
  let g = '';
  for (let i = 0; i <= 3; i++) {
    g += `<line x1="${start}" y1="${start+i*cell}" x2="${start+3*cell}" y2="${start+i*cell}" stroke="#999" stroke-width="1"/>`;
    g += `<line x1="${start+i*cell}" y1="${start}" x2="${start+i*cell}" y2="${start+3*cell}" stroke="#999" stroke-width="1"/>`;
  }
  return `<svg viewBox="0 0 80 80">${g}<circle cx="${cx}" cy="${cy}" r="6" fill="#333"/></svg>`;
}

// ============================================================
//  分类定义
// ============================================================

const CATEGORIES = [
  {id: 'all',        label: '🎲 全部混合',   desc: '所有题目随机抽 20 道', fullWidth: true},

  {id: 'finance',    label: '💰 金融投资',   desc: '利率·估值·风险·行为金融'},

  {id: 'quick',      label: '⚡ 快速反应',   desc: '心算·直觉陷阱'}

//  题库
// ============================================================

  {

    question: '三个嫌疑人 A、B、C，只有一人是凶手。他们各说一句话：\n\n• A："我不是凶手。"\n• B："C 才是凶手。"\n• C："B 在说谎。"\n\n已知三人中只有一人说真话。谁是凶手？',
    options: ['A', 'B', 'C', '无法判断'],
    correct: 0,
    explanation: '逐一假设：\n\n【假设 A 是凶手】\n• A："我不是凶手" → 假\n• B："C 是凶手" → 假\n• C："B 在说谎" → 真 ✓\n只有 C 说真话，符合条件！\n\n【假设 B 是凶手】\nA 真、B 假、C 真 → 两人说真，不符。\n\n【假设 C 是凶手】\nA 真、B 真、C 假 → 两人说真，不符。\n\n所以 A 是凶手。'
  },

  // ========== 新 · 逻辑思辨 ==========

// ============================================================
//  游戏状态与逻辑
// ============================================================

let activeQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;

const app = document.getElementById('app');
const progressEl = document.getElementById('progress');
const scoreEl = document.getElementById('score');

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateMeta() {
  if (activeQuestions.length === 0) {
    progressEl.textContent = `题库 ${ALL_QUESTIONS.length} 题`;
    scoreEl.textContent = '';
  } else {
    progressEl.textContent = `第 ${currentIdx + 1} / ${activeQuestions.length} 题`;
    scoreEl.textContent = `得分 ${score}`;
  }
}

// ---- 开始屏 ----
function renderStart() {
  activeQuestions = [];
  currentIdx = 0;
  score = 0;
  updateMeta();

  const counts = { all: ALL_QUESTIONS.length };
  ALL_QUESTIONS.forEach(q => counts[q.group] = (counts[q.group] || 0) + 1);

  const cards = CATEGORIES.map(c => `
    <button class="cat-btn ${c.fullWidth ? 'full-width' : ''}" data-id="${c.id}">
      <div class="cat-label">${c.label}</div>
      <div class="cat-count">共 ${counts[c.id] || 0} 题</div>
      <div class="cat-desc">${c.desc}</div>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="start-title">🎯 逻辑推理挑战</div>
    <div class="start-subtitle">选一个方向开始训练思维</div>
    <div class="cat-grid">${cards}</div>
  `;

  app.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => startCategory(btn.dataset.id));
  });
}

function startCategory(id) {
  if (id === 'all') {
    activeQuestions = shuffle(ALL_QUESTIONS).slice(0, Math.min(20, ALL_QUESTIONS.length));
  } else {
    activeQuestions = shuffle(ALL_QUESTIONS.filter(q => q.group === id));
  }
  currentIdx = 0;
  score = 0;
  renderQuestion();
}

// ---- 题目屏 ----
function renderQuestion() {
  if (currentIdx >= activeQuestions.length) {
    renderResult();
    return;
  }
  answered = false;
  updateMeta();
  const q = activeQuestions[currentIdx];

  let sequenceHtml = '';
  if (q.type === 'graphical') {
    sequenceHtml = `<div class="sequence">${
      q.sequence.map(s => `<div class="seq-box">${s === '?' ? '?' : s}</div>`).join('')
    }</div>`;
  }

  let optionsHtml;
  if (q.isSvgOptions) {
    optionsHtml = `<div class="option-grid">${
      q.options.map((opt, i) => `
        <button class="option" data-idx="${i}">
          <span class="letter">${'ABCD'[i]}</span>
          ${opt}
        </button>`).join('')
    }</div>`;
  } else {
    optionsHtml = `<div class="options">${
      q.options.map((opt, i) => `
        <button class="option" data-idx="${i}">
          <span class="letter">${'ABCD'[i]}</span>
          <span>${opt}</span>
        </button>`).join('')
    }</div>`;
  }

  app.innerHTML = `
    <div class="category">${q.category}</div>
    <div class="question">${q.question}</div>
    ${sequenceHtml}
    ${optionsHtml}
    <div id="feedback"></div>
  `;

  app.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.idx)));
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = activeQuestions[currentIdx];
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;

  app.querySelectorAll('.option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === idx) btn.classList.add('selected', isCorrect ? 'correct' : 'wrong');
    else if (i === q.correct) btn.classList.add('reveal-correct');
  });

  updateMeta();

  const feedback = document.getElementById('feedback');
  const label = isCorrect ? '✓ 答对了！' : `✗ 答错了，正确答案是 ${'ABCD'[q.correct]}`;
  feedback.innerHTML = `
    <div class="explanation ${isCorrect ? 'right' : 'wrong'}">
      <h4>${label}</h4>
      <div>${q.explanation}</div>
    </div>
    <button class="next-btn" id="nextBtn">${
      currentIdx === activeQuestions.length - 1 ? '🎯 查看最终结果' : '下一题 →'
    }</button>
  `;

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIdx++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  setTimeout(() => feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// ---- 结果屏 ----
function renderResult() {
  const total = activeQuestions.length;
  const pct = score / total;
  let title, desc;
  if (pct === 1) {
    title = '🏆 完美！逻辑大师';
    desc = '全部答对！你的推理能力堪称顶尖，福尔摩斯看了都要竖大拇指。';
  } else if (pct >= 0.8) {
    title = '🎖 高手水平';
    desc = '相当出色的推理能力，具备严密的逻辑思维。回顾一下错题就更完美了。';
  } else if (pct >= 0.6) {
    title = '👍 不错';
    desc = '有一定的逻辑基础，再多练习几次就能上一个台阶。';
  } else if (pct >= 0.4) {
    title = '🌱 及格';
    desc = '基础还在，但需要更细致地分析条件。多看看解析，思路会更清晰。';
  } else {
    title = '📚 继续加油';
    desc = '别灰心，逻辑思维需要慢慢培养。仔细看每题的解析，再来一次会有收获！';
  }

  app.innerHTML = `
    <div class="result-title">${title}</div>
    <div class="result-score">${score} <small>/ ${total}</small></div>
    <div class="result-desc">${desc}</div>
    <button class="next-btn" id="restartBtn">🔄 再挑一局同类型</button>
    <button class="next-btn secondary" id="menuBtn">☰ 换个类型</button>
  `;

  progressEl.textContent = '挑战完成';

  document.getElementById('restartBtn').addEventListener('click', () => {
    activeQuestions = shuffle(activeQuestions);
    currentIdx = 0;
    score = 0;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('menuBtn').addEventListener('click', () => {
    renderStart();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

// ---- 启动 ----
renderStart();
</script>
