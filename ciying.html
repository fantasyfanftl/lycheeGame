<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词影</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', Georgia, serif;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180, 140, 220, 0.15), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(230, 150, 100, 0.12), transparent 60%),
      linear-gradient(180deg, #1a1830 0%, #0e0c1e 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #e8dcc4;
    padding: 20px 16px;
    user-select: none;
    -webkit-user-select: none;
  }
  .container {
    max-width: 520px;
    margin: 0 auto;
    background: rgba(15, 12, 30, 0.65);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(220, 180, 140, 0.2);
    border-radius: 8px;
    padding: 22px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .back-link {
    display: inline-block;
    color: rgba(220, 180, 140, 0.55);
    text-decoration: none;
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .back-link:hover { color: #ddb887; }
  h1 {
    text-align: center;
    font-size: 26px;
    letter-spacing: 10px;
    color: #ddb887;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(220, 180, 140, 0.4);
  }
  .subtitle {
    text-align: center;
    color: rgba(220, 180, 140, 0.55);
    font-size: 12px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-style: italic;
  }

  .answer-hint {
    text-align: center;
    margin: 14px 0 18px;
    padding: 12px;
    background: rgba(220, 180, 140, 0.05);
    border: 1px solid rgba(220, 180, 140, 0.2);
    border-radius: 4px;
  }
  .answer-hint .label {
    display: block;
    font-size: 11px;
    color: rgba(220, 180, 140, 0.5);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .answer-blanks {
    font-size: 26px;
    letter-spacing: 14px;
    color: #ddb887;
    text-align: center;
    padding-left: 14px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(220, 180, 140, 0.3);
    color: #e8dcc4;
    font-family: inherit;
    font-size: 16px;
    border-radius: 4px;
    letter-spacing: 3px;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
  }
  .input-row input:focus { border-color: #ddb887; box-shadow: 0 0 12px rgba(220, 180, 140, 0.3); }
  .input-row button {
    padding: 10px 20px;
    background: #ddb887;
    color: #1a1830;
    border: none;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 700;
  }
  .input-row button:hover { background: #c19b6a; }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    color: rgba(220, 180, 140, 0.7);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .stat-row b { color: #ddb887; margin-left: 4px; }

  .message {
    text-align: center;
    padding: 8px;
    border-radius: 4px;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    min-height: 24px;
    color: rgba(220, 180, 140, 0.7);
  }
  .message.err { color: #ffa8a8; }

  .latest {
    background: rgba(220, 180, 140, 0.08);
    border: 1px solid rgba(220, 180, 140, 0.35);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 12px;
    display: none;
  }
  .latest.show { display: block; }
  .latest .label {
    font-size: 11px;
    color: rgba(220, 180, 140, 0.55);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 42px 1fr 40px 60px;
    gap: 10px;
    align-items: center;
    padding: 8px 6px;
    border-bottom: 1px dashed rgba(220, 180, 140, 0.15);
    font-size: 14px;
  }
  .row:last-child { border-bottom: none; }
  .row .rank {
    color: rgba(220, 180, 140, 0.55);
    text-align: right;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .row .word {
    color: #e8dcc4;
    letter-spacing: 2px;
  }
  .row .word.hot { color: #ffd48a; font-weight: bold; text-shadow: 0 0 8px rgba(255, 200, 130, 0.4); }
  .row .temp-bar {
    height: 6px;
    background: rgba(220, 180, 140, 0.15);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .row .temp-bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .row .pct {
    text-align: right;
    font-family: 'Georgia', monospace;
    font-size: 12px;
    color: rgba(220, 180, 140, 0.8);
  }
  .row.new-guess {
    background: rgba(220, 180, 140, 0.08);
    animation: flash 0.6s;
  }
  @keyframes flash {
    0% { background: rgba(220, 180, 140, 0.25); }
    100% { background: rgba(220, 180, 140, 0.08); }
  }

  .history {
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .hint {
    text-align: center;
    color: rgba(220, 180, 140, 0.4);
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 12px;
    line-height: 1.6;
  }

  /* Win overlay */
  .win-modal {
    position: fixed;
    inset: 0;
    background: rgba(5, 3, 15, 0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .win-modal.show { display: flex; }
  .win-modal .box {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(220, 180, 140, 0.25), transparent 60%),
      linear-gradient(180deg, #1a1830 0%, #0e0c1e 100%);
    border: 1px solid rgba(220, 180, 140, 0.5);
    border-radius: 4px;
    padding: 30px 26px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(220, 180, 140, 0.2);
  }
  .win-modal h2 {
    color: #ddb887;
    font-size: 22px;
    letter-spacing: 10px;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(220, 180, 140, 0.5);
  }
  .win-modal .answer-reveal {
    font-size: 34px;
    color: #ffd48a;
    letter-spacing: 12px;
    margin: 16px 0;
    text-shadow: 0 0 24px rgba(255, 200, 130, 0.5);
  }
  .win-modal .stats {
    color: rgba(220, 180, 140, 0.85);
    font-size: 14px;
    letter-spacing: 2px;
    line-height: 1.8;
    margin-bottom: 22px;
  }
  .win-modal .stats b { color: #ffd48a; }
  .win-modal button {
    padding: 8px 22px;
    background: transparent;
    color: #ddb887;
    border: 1px solid #ddb887;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 2px;
    margin: 4px;
  }
  .win-modal button:hover { background: rgba(220, 180, 140, 0.15); }

  @media (max-width: 480px) {
    .container { padding: 18px 14px; }
    h1 { font-size: 22px; letter-spacing: 6px; }
    .answer-blanks { font-size: 22px; letter-spacing: 10px; }
    .row { grid-template-columns: 36px 1fr 34px 52px; gap: 8px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <h1>词 影</h1>
  <div class="subtitle">— 猜一个词 · 语义越近越热 —</div>

  <div class="answer-hint">
    <span class="label">— 今日答案 · 猜猜是什么 —</span>
    <div class="answer-blanks" id="answerBlanks"></div>
  </div>

  <div class="input-row">
    <input type="text" id="guessInput" placeholder="输入一个词" maxlength="6" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="submitBtn">猜</button>
  </div>

  <div class="stat-row">
    <span>已猜 <b id="guessCount">0</b> 次</span>
    <span><button id="giveUpBtn" style="background:none;border:none;color:rgba(220,180,140,0.5);font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:2px;">放弃 · 换一题</button></span>
  </div>

  <div class="message" id="message"></div>

  <div class="latest" id="latest">
    <div class="label">— 最近一次 —</div>
    <div id="latestRow"></div>
  </div>

  <div class="history" id="history"></div>

  <div class="hint">
    温度越高，语义越接近。词表约 200 词，只能猜表内的词
  </div>
</div>

<div class="win-modal" id="winModal">
  <div class="box">
    <h2>猜 中 了</h2>
    <div class="answer-reveal" id="winAnswer"></div>
    <div class="stats" id="winStats"></div>
    <button id="againBtn">再来一题</button>
    <button id="homeBtn">回菜单</button>
  </div>
</div>

// Answer candidates (curated for good semantic reach in vocab)
const ANSWERS = [
  "月亮", "眼泪", "咖啡", "童年", "火车",
  "台风", "秘密", "星星", "大海", "故乡",
  "雨伞", "电影", "母亲", "深夜", "时光",
  "初恋", "老屋", "梦", "灯塔", "萤火虫",
];

// ============ Game state ============
let answer = "";
let guesses = [];  // array of { word, sim, rank }
let guessedSet = new Set();
let won = false;

// ============ DOM ============
const answerBlanks = document.getElementById('answerBlanks');
const guessInput = document.getElementById('guessInput');
const submitBtn = document.getElementById('submitBtn');
const giveUpBtn = document.getElementById('giveUpBtn');
const messageEl = document.getElementById('message');
const latestEl = document.getElementById('latest');
const latestRowEl = document.getElementById('latestRow');
const historyEl = document.getElementById('history');
const guessCountEl = document.getElementById('guessCount');
const winModal = document.getElementById('winModal');
const winAnswer = document.getElementById('winAnswer');
const winStats = document.getElementById('winStats');
const againBtn = document.getElementById('againBtn');
const homeBtn = document.getElementById('homeBtn');

// ============ Similarity ============
function similarity(w1, w2) {
  if (w1 === w2) return 1.0;
  const t1 = new Set(WORDS[w1] || []);
  const t2 = new Set(WORDS[w2] || []);
  if (t1.size === 0 || t2.size === 0) return 0;
  let inter = 0;
  for (const t of t1) if (t2.has(t)) inter++;
  const union = t1.size + t2.size - inter;
  return inter / union;
}

// Compute all similarity for ranking (for the current answer)
let allSims = [];  // array of { word, sim }, sorted desc
function computeAllSims() {
  allSims = [];
  for (const w in WORDS) {
    if (w === answer) continue;
    allSims.push({ word: w, sim: similarity(w, answer) });
  }
  allSims.sort((a, b) => b.sim - a.sim);
}
function rankFor(word) {
  const idx = allSims.findIndex(x => x.word === word);
  return idx === -1 ? -1 : idx + 1;
}

// ============ Rendering ============
function tempColor(sim) {
  // 0 (cold blue) → 1 (hot orange)
  if (sim >= 0.85) return '#ff9a5a';  // very hot
  if (sim >= 0.65) return '#ffcc70';
  if (sim >= 0.45) return '#e8dcc4';
  if (sim >= 0.25) return '#8fb0d0';
  return '#5878a8';
}
function tempIcon(sim) {
  if (sim >= 0.85) return '🔥';
  if (sim >= 0.65) return '🌡';
  if (sim >= 0.45) return '😌';
  if (sim >= 0.25) return '❄';
  return '🧊';
}

function renderRow(g, isLatest = false) {
  const rank = g.rank > 0 && g.rank <= 500 ? `#${g.rank}` : '';
  const barWidth = Math.max(2, g.sim * 100);
  const color = tempColor(g.sim);
  const hotClass = g.sim >= 0.85 ? ' hot' : '';
  const pct = (g.sim * 100).toFixed(1) + '%';
  return `<div class="row ${isLatest ? 'new-guess' : ''}">
    <span class="rank">${rank}</span>
    <span class="word${hotClass}">${g.word}</span>
    <div class="temp-bar"><div class="temp-bar-fill" style="width:${barWidth}%;background:${color};"></div></div>
    <span class="pct">${pct}</span>
  </div>`;
}

function renderHistory() {
  const sorted = [...guesses].sort((a, b) => b.sim - a.sim);
  historyEl.innerHTML = sorted.map(g => renderRow(g)).join('');
}

// ============ Actions ============
function submitGuess() {
  if (won) return;
  const word = guessInput.value.trim();
  if (!word) return;
  guessInput.value = '';
  guessInput.focus();

  if (!WORDS[word]) {
    showMessage(`「${word}」不在词表里，试试别的（词表约 200 词）`, 'err');
    return;
  }
  if (guessedSet.has(word)) {
    showMessage(`「${word}」已经猜过啦`, 'err');
    return;
  }

  const sim = similarity(word, answer);
  const rank = rankFor(word);
  const g = { word, sim, rank };
  guesses.push(g);
  guessedSet.add(word);
  guessCountEl.textContent = guesses.length;

  // Show as latest
  latestEl.classList.add('show');
  latestRowEl.innerHTML = renderRow(g, true);

  // Show in history
  renderHistory();

  // Show message
  const icon = tempIcon(sim);
  if (word === answer) {
    winGame();
  } else {
    showMessage(`${icon} ${word} · ${(sim*100).toFixed(1)}%`);
  }
}

function showMessage(t, cls = '') {
  messageEl.textContent = t;
  messageEl.className = 'message ' + cls;
}

function winGame() {
  won = true;
  winAnswer.textContent = answer;
  const cnt = guesses.length;
  winStats.innerHTML = `你在第 <b>${cnt}</b> 次猜中<br>` +
    (cnt <= 5 ? '⭐ 语感强者' :
     cnt <= 15 ? '不错，稳中有胆' :
     cnt <= 30 ? '慢慢来的胜利' : '契而不舍');
  winModal.classList.add('show');
}

function newRound() {
  answer = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
  guesses = [];
  guessedSet = new Set();
  won = false;
  computeAllSims();
  answerBlanks.textContent = '_ '.repeat(answer.length).trim();
  guessCountEl.textContent = '0';
  latestEl.classList.remove('show');
  historyEl.innerHTML = '';
  showMessage('');
  winModal.classList.remove('show');
  guessInput.focus();
}

// ============ Events ============
submitBtn.addEventListener('click', submitGuess);
guessInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitGuess(); }
});
giveUpBtn.addEventListener('click', () => {
  if (confirm(`真放弃？答案是「${answer}」。换新题目吗？`)) newRound();
});
againBtn.addEventListener('click', newRound);
homeBtn.addEventListener('click', () => { window.location.href = 'index.html'; });

// Boot
newRound();
</script>
