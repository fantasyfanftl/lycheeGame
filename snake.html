<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>什么！？我只是凡人</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'KaiTi', 'STKaiti', '楷体', 'Songti SC', 'Segoe UI', serif;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(120, 80, 200, 0.25), transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(180, 140, 90, 0.18), transparent 60%),
      linear-gradient(135deg, #12132a 0%, #0a0a1a 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 50px 18px 24px;
    color: #e8dcc4;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }
  .container {
    background: rgba(10, 10, 20, 0.65);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(245, 200, 138, 0.2);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(245, 200, 138, 0.06) inset;
    padding: 44px 20px 20px 20px;
    max-width: 480px;
    width: 100%;
  }
  .back-link {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 999;
    color: rgba(245, 200, 138, 0.75);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 5px 12px;
    background: rgba(10, 10, 20, 0.6);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(245, 200, 138, 0.25);
    border-radius: 999px;
    transition: color 0.2s, background 0.2s;
  }
  .back-link:hover { color: #f5c88a; background: rgba(10, 10, 20, 0.85); }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .realm-info { }
  .realm-name {
    font-size: 22px;
    letter-spacing: 4px;
    color: #f5c88a;
    text-shadow: 0 0 12px rgba(245, 200, 138, 0.4);
    transition: color 0.6s ease, text-shadow 0.6s ease;
  }
  .realm-desc {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(232, 220, 196, 0.55);
    margin-top: 2px;
  }
  .scores {
    display: flex;
    gap: 6px;
  }
  .score-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(245, 200, 138, 0.15);
    border-radius: 4px;
    padding: 5px 10px;
    text-align: center;
    min-width: 54px;
  }
  .score-box .label {
    display: block;
    font-size: 10px;
    color: rgba(232, 220, 196, 0.5);
    letter-spacing: 2px;
  }
  .score-box .value {
    display: block;
    font-size: 17px;
    color: #f5c88a;
    font-weight: bold;
    margin-top: 1px;
  }

  /* Progress bar with realm markers */
  .progress {
    position: relative;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .progress-track {
    height: 3px;
    background: rgba(245, 200, 138, 0.1);
    border-radius: 2px;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a90e2, #f5a623, #b16fff, #f0f4ff, #ffd89b);
    border-radius: 2px;
    width: 0;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(245, 200, 138, 0.6);
  }
  .progress-marker {
    position: absolute;
    top: -3px;
    transform: translateX(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(20, 20, 30, 1);
    border: 1.5px solid rgba(245, 200, 138, 0.4);
    transition: all 0.4s ease;
  }
  .progress-marker.reached {
    background: #f5c88a;
    border-color: #ffd89b;
    box-shadow: 0 0 10px rgba(245, 200, 138, 0.8);
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: rgba(232, 220, 196, 0.4);
    letter-spacing: 1px;
    margin-top: 8px;
    padding: 0 2px;
  }
  .progress-labels span.reached { color: #f5c88a; }

  /* Board */
  .board-wrap {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #14162e 0%, #0a0a18 100%);
    margin-bottom: 12px;
    border: 1px solid rgba(245, 200, 138, 0.15);
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }
  .aura {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, transparent 70%);
  }
  .aura.realm-1 { opacity: 0.4; background: radial-gradient(circle at 50% 50%, rgba(74, 144, 226, 0.3), transparent 65%); }
  .aura.realm-2 { opacity: 0.5; background: radial-gradient(circle at 50% 50%, rgba(245, 166, 35, 0.35), transparent 60%); }
  .aura.realm-3 { opacity: 0.5; background: radial-gradient(circle at 50% 50%, rgba(177, 111, 255, 0.35), transparent 60%); }
  .aura.realm-4 { opacity: 0.6; background: radial-gradient(circle at 50% 50%, rgba(240, 244, 255, 0.3), transparent 55%); }
  .aura.realm-5 { opacity: 0.9; background: radial-gradient(circle at 50% 50%, rgba(255, 216, 155, 0.4), transparent 55%), conic-gradient(from 0deg, transparent, rgba(255, 216, 155, 0.15), transparent, rgba(180, 90, 240, 0.15), transparent); animation: rotate 8s linear infinite; }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* Overlay (start / game over) */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: rgba(10, 10, 20, 0.8);
    backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    font-size: 26px;
    color: #f5c88a;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(245, 200, 138, 0.4);
    line-height: 1.4;
  }
  .overlay p {
    color: rgba(232, 220, 196, 0.7);
    margin-bottom: 22px;
    font-size: 13px;
    letter-spacing: 3px;
    line-height: 1.7;
  }
  .paper-btn {
    background: #e8dcc4;
    color: #3d2f24;
    border: none;
    padding: 10px 26px;
    font-size: 15px;
    letter-spacing: 4px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 2px 12px rgba(245, 200, 138, 0.15);
    transition: all 0.3s;
    position: relative;
  }
  .paper-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid rgba(245, 200, 138, 0.3);
    pointer-events: none;
  }
  .paper-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(245, 200, 138, 0.4);
  }

  /* Breakthrough overlay */
  .breakthrough {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: radial-gradient(ellipse at center, rgba(245, 200, 138, 0.15) 0%, rgba(10, 10, 20, 0.85) 60%);
    animation: btFadeIn 0.5s ease-out;
  }
  .breakthrough.show { display: flex; }
  @keyframes btFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .bt-realm {
    font-size: 34px;
    letter-spacing: 12px;
    color: #f5c88a;
    text-shadow: 0 0 30px rgba(245, 200, 138, 0.8), 0 0 60px rgba(245, 200, 138, 0.4);
    margin-bottom: 16px;
    animation: btPulse 1.6s ease-in-out infinite;
  }
  @keyframes btPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(245, 200, 138, 0.6), 0 0 40px rgba(245, 200, 138, 0.3); }
    50% { text-shadow: 0 0 40px rgba(245, 200, 138, 1), 0 0 80px rgba(245, 200, 138, 0.6); }
  }
  .bt-text {
    font-size: 14px;
    line-height: 2;
    color: rgba(232, 220, 196, 0.85);
    letter-spacing: 4px;
    max-width: 320px;
  }
  .bt-tap {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(232, 220, 196, 0.4);
    letter-spacing: 3px;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .actions button {
    padding: 7px 20px;
    font-size: 12px;
    letter-spacing: 2px;
    background: transparent;
    border: 1px solid rgba(245, 200, 138, 0.3);
    color: rgba(232, 220, 196, 0.85);
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .actions button:hover { background: rgba(245, 200, 138, 0.1); }
  .actions button.primary {
    background: rgba(245, 200, 138, 0.15);
    border-color: rgba(245, 200, 138, 0.6);
  }

  .hint {
    text-align: center;
    color: rgba(232, 220, 196, 0.35);
    font-size: 11px;
    letter-spacing: 1.5px;
    line-height: 1.7;
  }

  /* D-pad for touch / accessibility */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    grid-template-areas:
      ".    up   ."
      "left .    right"
      ".    down .";
    gap: 6px;
    width: min(320px, 92%);
    aspect-ratio: 1;
    margin: 18px auto 8px;
    touch-action: none;
  }
  .dpad-btn {
    background: rgba(245, 200, 138, 0.1);
    border: 1.5px solid rgba(245, 200, 138, 0.35);
    color: rgba(232, 220, 196, 0.9);
    border-radius: 18px;
    font-size: 40px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
    font-family: inherit;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;  /* 命中交给 .dpad 统一按角度分派 */
  }
  .dpad-btn:hover { background: rgba(245, 200, 138, 0.16); color: #f5c88a; }
  .dpad-btn.pressed,
  .dpad-btn:active {
    transform: scale(0.9);
    background: rgba(245, 200, 138, 0.4);
    color: #f5c88a;
    box-shadow: 0 0 20px rgba(245, 200, 138, 0.55), inset 0 0 14px rgba(245, 200, 138, 0.25);
  }
  .dpad-btn.up    { grid-area: up; }
  .dpad-btn.down  { grid-area: down; }
  .dpad-btn.left  { grid-area: left; }
  .dpad-btn.right { grid-area: right; }

  @media (max-width: 480px) {
    .dpad {
      width: min(360px, 96%);
      gap: 5px;
      margin-top: 14px;
    }
    .dpad-btn { font-size: 44px; border-radius: 20px; }
  }

  @media (orientation: landscape) and (max-height: 550px) {
    .container {
      max-width: none;
      padding: 12px 18px;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "back    back"
        "header  header"
        "prog    prog"
        "board   controls";
      gap: 8px 18px;
      align-items: start;
    }
    .back-link { grid-area: back; margin: 0; }
    .header { grid-area: header; margin: 0; }
    .progress { grid-area: prog; margin: 0; }
    .board-wrap { grid-area: board; max-width: 62vh; margin: 0; }
    .actions, .hint { grid-area: controls; }
    .actions { flex-direction: column; margin: 0 0 6px; }
    .hint { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 荔枝游戏</a>

  <div class="header">
    <div class="realm-info">
      <div class="realm-name" id="realmName">凡人</div>
      <div class="realm-desc" id="realmDesc">肉身凡胎，未闻仙音</div>
    </div>
    <div class="scores">
      <div class="score-box"><span class="label">身长</span><span class="value" id="lengthEl">3</span></div>
      <div class="score-box"><span class="label">最长</span><span class="value" id="best">0</span></div>
    </div>
  </div>

  <div class="progress">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-marker" data-idx="1" style="left: 12%"></div>
      <div class="progress-marker" data-idx="2" style="left: 24%"></div>
      <div class="progress-marker" data-idx="3" style="left: 40%"></div>
      <div class="progress-marker" data-idx="4" style="left: 60%"></div>
      <div class="progress-marker" data-idx="5" style="left: 80%"></div>
    </div>
    <div class="progress-labels">
      <span data-idx="0">凡人</span>
      <span data-idx="1">筑基</span>
      <span data-idx="2">金丹</span>
      <span data-idx="3">元婴</span>
      <span data-idx="4">化神</span>
      <span data-idx="5">飞升</span>
    </div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="aura" id="aura"></div>
    <canvas id="board"></canvas>

    <div class="overlay show" id="overlay">
      <h2 id="overlayTitle">什么！？我只是凡人</h2>
      <p id="overlaySub">吃个饭而已 · 怎么就飞升了<br>——一条修行蛇的自白</p>
      <button id="startBtn" class="paper-btn">悟 道</button>
    </div>

    <div class="breakthrough" id="breakthrough">
      <div class="bt-realm" id="btRealm"></div>
      <div class="bt-text" id="btText"></div>
      <div class="bt-tap">— 点击继续 —</div>
    </div>
  </div>

  <div class="actions">
    <button id="pauseBtn">暂停</button>
    <button id="restartBtn" class="primary">重新悟道</button>
  </div>

  <div class="dpad">
    <button class="dpad-btn up"    data-dir="up"    aria-label="上">▲</button>
    <button class="dpad-btn left"  data-dir="left"  aria-label="左">◀</button>
    <button class="dpad-btn right" data-dir="right" aria-label="右">▶</button>
    <button class="dpad-btn down"  data-dir="down"  aria-label="下">▼</button>
  </div>

  <div class="hint">
    键盘方向键 / WASD · 手机<b>点棋盘导向</b> 或滑动 · 空格暂停
  </div>
</div>

<script>
const CELLS = 18;
const REALMS = [
  { name: '凡人',   min: 3,   desc: '肉身凡胎，未闻仙音',
    body: '#8fa650', head: '#a8c060', shadowBlur: 0 },
  { name: '筑基期', min: 30,  desc: '灵气入体，身若微光',
    body: '#4a90e2', head: '#78b0f0', shadowBlur: 8, shadowColor: 'rgba(74,144,226,0.6)',
    poem: '灵气入体，蛇身微光初显。<br>你已是修士。' },
  { name: '金丹期', min: 60,  desc: '结丹于内，纹金浮现',
    body: '#f5a623', head: '#ffd07a', shadowBlur: 12, shadowColor: 'rgba(245,166,35,0.7)',
    poem: '金丹凝成，蛇纹浮金。<br>大千世界，触手可及。' },
  { name: '元婴期', min: 100, desc: '婴出识海，身若琉璃',
    body: '#b16fff', head: '#dbb8ff', shadowBlur: 16, shadowColor: 'rgba(177,111,255,0.7)',
    poem: '元婴出窍，蛇身如玉。<br>灵气自绕，若隐若现。' },
  { name: '化神期', min: 150, desc: '神识凝形，残影流转',
    body: '#f0f4ff', head: '#ffffff', shadowBlur: 20, shadowColor: 'rgba(240,244,255,0.9)',
    poem: '神识凝形，残影流转。<br>一念之间，可跨山海。' },
  { name: '飞升',   min: 200, desc: '登仙——你已成龙',
    body: 'dragon', head: 'dragon', shadowBlur: 30,
    poem: '登仙——你已成龙。<br>紫气东来，天门已开。' },
];

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const lengthEl = document.getElementById('lengthEl');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const restartBtn = document.getElementById('restartBtn');
const realmNameEl = document.getElementById('realmName');
const realmDescEl = document.getElementById('realmDesc');
const progressFill = document.getElementById('progressFill');
const auraEl = document.getElementById('aura');
const breakthroughEl = document.getElementById('breakthrough');
const btRealmEl = document.getElementById('btRealm');
const btTextEl = document.getElementById('btText');

let cellSize;
let snake, food, dir, dirQueue;
let best, ticker, tickMs, running, paused;
let currentRealmIdx;
let seenRealms;
let animFrame = 0;

function fitCanvas() {
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 10) { setTimeout(fitCanvas, 100); return; }
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  cellSize = rect.width / CELLS;  // Use CSS pixels (not physical), since setTransform scales
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 200));

function realmForLen(len) {
  for (let i = REALMS.length - 1; i >= 0; i--) {
    if (len >= REALMS[i].min) return i;
  }
  return 0;
}

function newGame() {
  snake = [{ r: 9, c: 8 }, { r: 9, c: 7 }, { r: 9, c: 6 }];
  dir = { r: 0, c: 1 };
  dirQueue = [];
  spawnFood();
  tickMs = 145;
  running = true;
  paused = false;
  currentRealmIdx = 0;
  seenRealms = new Set([0]);
  updateUI();
  hideOverlay();
  startTicker();
}

function spawnFood() {
  const empty = [];
  for (let r = 0; r < CELLS; r++)
    for (let c = 0; c < CELLS; c++)
      if (!snake.some(s => s.r === r && s.c === c)) empty.push({ r, c });
  food = empty.length ? empty[Math.floor(Math.random() * empty.length)] : null;
}

function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(tick, tickMs);
}

function tick() {
  if (!running || paused) return;
  while (dirQueue.length) {
    const nd = dirQueue.shift();
    if (nd.r === -dir.r && nd.c === -dir.c) continue;
    dir = nd;
    break;
  }
  const head = { r: snake[0].r + dir.r, c: snake[0].c + dir.c };
  if (head.r < 0 || head.r >= CELLS || head.c < 0 || head.c >= CELLS) return gameOver();
  if (snake.some(s => s.r === head.r && s.c === head.c)) return gameOver();
  snake.unshift(head);
  if (food && head.r === food.r && head.c === food.c) {
    if (tickMs > 55) { tickMs = Math.max(55, tickMs - 3); startTicker(); }
    spawnFood();
    checkBreakthrough();
  } else {
    snake.pop();
  }
  updateUI();
  render();
}

function checkBreakthrough() {
  const idx = realmForLen(snake.length);
  if (idx > currentRealmIdx && !seenRealms.has(idx)) {
    seenRealms.add(idx);
    currentRealmIdx = idx;
    showBreakthrough(idx);
  } else if (idx > currentRealmIdx) {
    currentRealmIdx = idx;
  }
}

function showBreakthrough(idx) {
  const r = REALMS[idx];
  paused = true;
  btRealmEl.textContent = r.name;
  btTextEl.innerHTML = r.poem || '';
  breakthroughEl.classList.add('show');
  // Big haptic on breakthrough — level up feel
  if (navigator.vibrate) {
    navigator.vibrate(idx >= 5 ? [40, 60, 40, 60, 120] : [30, 40, 60]);
  }
  const dismiss = () => {
    breakthroughEl.classList.remove('show');
    breakthroughEl.removeEventListener('click', dismiss);
    document.removeEventListener('keydown', keyDismiss);
    clearTimeout(timer);
    if (running) paused = false;
  };
  const keyDismiss = (e) => { if (e.key === ' ' || e.key === 'Enter' || e.key === 'Escape') { dismiss(); e.preventDefault(); } };
  breakthroughEl.addEventListener('click', dismiss);
  document.addEventListener('keydown', keyDismiss);
  const timer = setTimeout(dismiss, 3500);
}

function updateUI() {
  const idx = realmForLen(snake.length);
  const realm = REALMS[idx];
  realmNameEl.textContent = realm.name;
  realmDescEl.textContent = realm.desc;
  lengthEl.textContent = snake.length;
  if (snake.length > best) {
    best = snake.length;
    localStorage.setItem('bestXiuzhen', best);
  }
  bestEl.textContent = best;
  // Progress bar
  const maxLen = 200;
  const pct = Math.min(100, (snake.length / maxLen) * 100);
  progressFill.style.width = pct + '%';
  document.querySelectorAll('.progress-marker').forEach(m => {
    m.classList.toggle('reached', +m.dataset.idx <= idx);
  });
  document.querySelectorAll('.progress-labels span').forEach(s => {
    s.classList.toggle('reached', +s.dataset.idx <= idx);
  });
  // Aura
  auraEl.className = 'aura' + (idx > 0 ? ' realm-' + idx : '');
}

function segmentColor(realm, idx, total, isHead) {
  if (realm.body === 'dragon') {
    // Rainbow cycling based on time and segment index
    const hue = (animFrame * 2 + idx * 8) % 360;
    return `hsl(${hue}, 80%, ${isHead ? 62 : 55}%)`;
  }
  const t = idx / Math.max(total - 1, 1);
  return isHead ? realm.head : shadeColor(realm.body, -t * 12);
}

function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  let r = (num >> 16) + Math.round(2.55 * percent);
  let g = ((num >> 8) & 0xff) + Math.round(2.55 * percent);
  let b = (num & 0xff) + Math.round(2.55 * percent);
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

function render() {
  animFrame++;
  const w = canvas.width / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, w, w);

  // Grid dots
  ctx.fillStyle = 'rgba(245, 200, 138, 0.06)';
  for (let r = 0; r < CELLS; r++) {
    for (let c = 0; c < CELLS; c++) {
      ctx.beginPath();
      ctx.arc(c * cellSize + cellSize/2, r * cellSize + cellSize/2, 0.9, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Food (spirit orb)
  if (food) {
    const t = animFrame / 25;
    const pulse = Math.sin(t) * 0.08 + 0.92;
    const cx = food.c * cellSize + cellSize/2;
    const cy = food.r * cellSize + cellSize/2;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cellSize/2);
    grad.addColorStop(0, '#fff5c8');
    grad.addColorStop(0.5, '#f5c88a');
    grad.addColorStop(1, 'rgba(245, 200, 138, 0.1)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, (cellSize/2 - 1) * pulse, 0, Math.PI * 2);
    ctx.fill();
    // Center highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    ctx.beginPath();
    ctx.arc(cx - 2, cy - 2, cellSize * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Snake
  const idx = realmForLen(snake.length);
  const realm = REALMS[idx];
  ctx.save();
  if (realm.shadowBlur) {
    ctx.shadowBlur = realm.shadowBlur;
    ctx.shadowColor = realm.shadowColor || 'rgba(255,255,255,0.6)';
  }

  const isDragon = realm.body === 'dragon';
  const isHuashen = idx === 4;

  // Trail (残影) for 化神期 and above
  if (idx >= 4) {
    for (let trail = 0; trail < 2; trail++) {
      const alpha = 0.15 - trail * 0.05;
      ctx.globalAlpha = alpha;
      snake.forEach((s, i) => {
        if (i > snake.length - 5) return;
        const offset = trail * 3;
        const x = s.c * cellSize + cellSize/2 - dir.c * offset;
        const y = s.r * cellSize + cellSize/2 - dir.r * offset;
        ctx.fillStyle = segmentColor(realm, i, snake.length, false);
        ctx.beginPath();
        ctx.arc(x, y, cellSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    ctx.globalAlpha = 1;
  }

  // Body (tail-first)
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const isHead = i === 0;
    ctx.fillStyle = segmentColor(realm, i, snake.length, isHead);
    const pad = isDragon ? 0.5 : 1.5;
    const size = cellSize - pad * 2;
    const cornerR = isDragon ? 6 : (idx >= 3 ? 5 : 4);
    roundRect(s.c * cellSize + pad, s.r * cellSize + pad, size, size, cornerR);
    ctx.fill();
    // Dragon: extra glow
    if (isDragon && !isHead) {
      ctx.strokeStyle = `hsl(${(animFrame * 2 + i * 8) % 360}, 90%, 75%)`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
  }
  ctx.restore();

  // Head decorations
  if (snake.length) {
    const h = snake[0];
    const cx = h.c * cellSize + cellSize/2;
    const cy = h.r * cellSize + cellSize/2;

    if (isDragon) {
      // Dragon horns / whiskers (small ornaments)
      ctx.fillStyle = '#fff8c8';
      ctx.strokeStyle = 'rgba(255, 216, 155, 0.9)';
      ctx.lineWidth = 1.5;
      const eyeOff = cellSize * 0.18;
      let ex1 = cx, ey1 = cy, ex2 = cx, ey2 = cy;
      if (dir.c === 1)      { ex1 = cx + eyeOff; ey1 = cy - eyeOff; ex2 = cx + eyeOff; ey2 = cy + eyeOff; }
      else if (dir.c === -1){ ex1 = cx - eyeOff; ey1 = cy - eyeOff; ex2 = cx - eyeOff; ey2 = cy + eyeOff; }
      else if (dir.r === -1){ ex1 = cx - eyeOff; ey1 = cy - eyeOff; ex2 = cx + eyeOff; ey2 = cy - eyeOff; }
      else                  { ex1 = cx - eyeOff; ey1 = cy + eyeOff; ex2 = cx + eyeOff; ey2 = cy + eyeOff; }
      ctx.beginPath();
      ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2);
      ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Golden ring around head
      ctx.strokeStyle = `hsla(${(animFrame * 3) % 360}, 90%, 70%, 0.6)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, cellSize * 0.55, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      // Normal eyes
      ctx.fillStyle = '#fff';
      const eyeOff = cellSize * 0.2;
      let ex1, ey1, ex2, ey2;
      if (dir.c === 1)      { ex1 = cx + eyeOff; ey1 = cy - eyeOff; ex2 = cx + eyeOff; ey2 = cy + eyeOff; }
      else if (dir.c === -1){ ex1 = cx - eyeOff; ey1 = cy - eyeOff; ex2 = cx - eyeOff; ey2 = cy + eyeOff; }
      else if (dir.r === -1){ ex1 = cx - eyeOff; ey1 = cy - eyeOff; ex2 = cx + eyeOff; ey2 = cy - eyeOff; }
      else                  { ex1 = cx - eyeOff; ey1 = cy + eyeOff; ex2 = cx + eyeOff; ey2 = cy + eyeOff; }
      ctx.beginPath();
      ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
      ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
      ctx.fill();
      // Pupil
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(ex1, ey1, 1, 0, Math.PI * 2);
      ctx.arc(ex2, ey2, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function gameOver() {
  running = false;
  clearInterval(ticker);
  // Death haptic — sharp
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  const idx = realmForLen(snake.length);
  const realmName = REALMS[idx].name;
  overlayTitle.textContent = '道 陨';
  overlaySub.innerHTML = `止步于 <b style="color:#f5c88a">${realmName}</b> · 身长 ${snake.length}<br>再来一次？`;
  startBtn.textContent = '再 悟 一 道';
  overlay.classList.add('show');
}

function hideOverlay() { overlay.classList.remove('show'); }

function togglePause() {
  if (!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '继续' : '暂停';
  if (paused) {
    overlayTitle.textContent = '闭 关';
    overlaySub.textContent = '静心，等你归来';
    startBtn.textContent = '出 关';
    overlay.classList.add('show');
  } else {
    hideOverlay();
  }
}

// Input queue helper — dedup + 180° prevention + queue cap
const MAX_QUEUE = 3;
function pushDir(nd) {
  if (!nd) return;
  const last = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
  if (!last) { dirQueue.push(nd); return; }
  // 与上一个相同 → 丢弃（省一个 queue 位）
  if (nd.r === last.r && nd.c === last.c) return;
  // 180° 反转（会立刻撞死自己）→ 丢弃
  if (nd.r === -last.r && nd.c === -last.c) return;
  if (dirQueue.length < MAX_QUEUE) dirQueue.push(nd);
}

// Input
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: {r:-1,c:0}, ArrowDown: {r:1,c:0}, ArrowLeft: {r:0,c:-1}, ArrowRight: {r:0,c:1},
    w: {r:-1,c:0}, s: {r:1,c:0}, a: {r:0,c:-1}, d: {r:0,c:1},
    W: {r:-1,c:0}, S: {r:1,c:0}, A: {r:0,c:-1}, D: {r:0,c:1},
  };
  if (map[e.key]) {
    pushDir(map[e.key]);
    e.preventDefault();
  } else if (e.key === ' ') {
    if (breakthroughEl.classList.contains('show')) return;
    if (running) togglePause();
    else newGame();
    e.preventDefault();
  }
});

// Canvas: 点棋盘 = 蛇头朝那个方向走；滑动仍支持
let touchStart = null;
const TAP_MAX_MOVE = 12;   // 移动 <12px 视为 tap
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  const moved = Math.max(ax, ay);
  let d = null;

  if (moved < TAP_MAX_MOVE) {
    // 短按 → tap-to-direct，根据点位相对蛇头方位选主轴
    if (!snake || !snake.length) { touchStart = null; return; }
    const rect = canvas.getBoundingClientRect();
    const cs = rect.width / CELLS;
    const headX = (snake[0].c + 0.5) * cs + rect.left;
    const headY = (snake[0].r + 0.5) * cs + rect.top;
    const tdx = t.clientX - headX;
    const tdy = t.clientY - headY;
    const tax = Math.abs(tdx), tay = Math.abs(tdy);
    if (Math.max(tax, tay) < cs * 0.4) { touchStart = null; return; }  // 太靠近蛇头 → 忽略
    if (tax > tay) d = tdx > 0 ? {r:0,c:1} : {r:0,c:-1};
    else d = tdy > 0 ? {r:1,c:0} : {r:-1,c:0};
  } else {
    // 长滑 → 滑动方向
    if (ax > ay) d = dx > 0 ? {r:0,c:1} : {r:0,c:-1};
    else d = dy > 0 ? {r:1,c:0} : {r:-1,c:0};
  }
  pushDir(d);
  touchStart = null;
}, { passive: true });

startBtn.addEventListener('click', () => {
  if (paused) togglePause();
  else newGame();
});
pauseBtn.addEventListener('click', togglePause);
restartBtn.addEventListener('click', newGame);

// D-pad —— 整个 D-pad 区域都能点，按角度判方向
// 好处：手指落在按钮之间的缝隙 / 边缘也能识别，没有死区
const DPAD_DIRS = {
  up:    {r:-1, c:0},
  down:  {r:1,  c:0},
  left:  {r:0,  c:-1},
  right: {r:0,  c:1},
};
function haptic(ms = 15) {
  if (navigator.vibrate) navigator.vibrate(ms);
}
const dpadEl = document.querySelector('.dpad');
let dpadCurrentBtn = null;

function dpadDirFromXY(clientX, clientY) {
  const rect = dpadEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = clientX - cx;
  const dy = clientY - cy;
  // 中心死区（半径 ~15% of dpad width）→ 避免误触
  if (Math.sqrt(dx*dx + dy*dy) < rect.width * 0.12) return null;
  // 角度：0=右, 90=下, ±180=左, -90=上（y 向下为正）
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  if (angle >= -45 && angle < 45) return 'right';
  if (angle >= 45 && angle < 135) return 'down';
  if (angle >= -135 && angle < -45) return 'up';
  return 'left';
}
function setDpadPressed(dirName) {
  const btn = dpadEl.querySelector('.dpad-btn.' + dirName);
  if (btn === dpadCurrentBtn) return false;
  if (dpadCurrentBtn) dpadCurrentBtn.classList.remove('pressed');
  if (btn) btn.classList.add('pressed');
  dpadCurrentBtn = btn;
  return true;
}
function clearDpadPressed() {
  if (dpadCurrentBtn) { dpadCurrentBtn.classList.remove('pressed'); dpadCurrentBtn = null; }
}
dpadEl.addEventListener('pointerdown', e => {
  e.preventDefault();
  const dirName = dpadDirFromXY(e.clientX, e.clientY);
  if (!dirName) return;
  try { dpadEl.setPointerCapture(e.pointerId); } catch (_) {}
  setDpadPressed(dirName);
  pushDir(DPAD_DIRS[dirName]);
  haptic(12);
});
dpadEl.addEventListener('pointermove', e => {
  if (!dpadCurrentBtn) return;
  const dirName = dpadDirFromXY(e.clientX, e.clientY);
  if (!dirName) return;
  // 拖到别的方向 → 切换并推入新方向
  if (setDpadPressed(dirName)) {
    pushDir(DPAD_DIRS[dirName]);
    haptic(8);
  }
});
dpadEl.addEventListener('pointerup', clearDpadPressed);
dpadEl.addEventListener('pointercancel', clearDpadPressed);
dpadEl.addEventListener('pointerleave', clearDpadPressed);

// Add haptic to other important buttons
[pauseBtn, restartBtn, startBtn].forEach(b => {
  b.addEventListener('pointerdown', () => haptic(10));
});

// Boot
best = parseInt(localStorage.getItem('bestXiuzhen') || '0', 10);
bestEl.textContent = best;
snake = [{r:9,c:8},{r:9,c:7},{r:9,c:6}];
food = { r: 9, c: 12 };
dir = { r: 0, c: 1 };
dirQueue = [];
currentRealmIdx = 0;
seenRealms = new Set([0]);
running = false;
paused = false;
fitCanvas();
updateUI();

// Idle animation loop for food pulse and dragon
setInterval(() => {
  if (running && !paused && !breakthroughEl.classList.contains('show')) return;
  render();
}, 55);

// Keep dragon animated even while playing
setInterval(() => {
  if (running && !paused && realmForLen(snake?.length || 0) >= 5) render();
}, 60);
</script>
