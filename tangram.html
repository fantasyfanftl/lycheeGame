<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>七巧 · 山水</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', 'Songti TC', Georgia, serif;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .container {
    background: #fefbf5;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(120, 90, 60, 0.2), inset 0 0 40px rgba(200, 170, 130, 0.08);
    padding: 20px;
    max-width: 640px;
    width: 100%;
    border: 1px solid rgba(160, 130, 90, 0.25);
  }
  .back-link {
    display: inline-block;
    color: #a67240;
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .back-link:hover { color: #6b4820; }
  h1 { color: #3d2f24; font-size: 22px; letter-spacing: 6px; margin-bottom: 4px; text-align: center; }
  .subtitle { text-align: center; color: #907050; font-size: 12px; letter-spacing: 3px; margin-bottom: 14px; font-style: italic; }

  .progress {
    text-align: center;
    color: #907050;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .progress b { color: #a67240; font-weight: 700; }

  .target-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 6px;
    margin-bottom: 14px;
  }
  .target-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px;
    background: transparent;
    border: 1.5px solid rgba(160, 130, 90, 0.35);
    color: #6b4820;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
    position: relative;
  }
  .target-btn:hover { background: rgba(200, 170, 130, 0.15); }
  .target-btn.active {
    background: #d4a878;
    border-color: #a67240;
    color: #fff;
  }
  .target-btn.done {
    background: #e8d4a8;
    border-color: #a67240;
  }
  .target-btn.done::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 10px;
    color: #a67240;
    font-weight: bold;
  }
  .target-btn .emoji { font-size: 20px; margin-bottom: 2px; }

  .canvas-wrap {
    position: relative;
    aspect-ratio: 1;
    background:
      linear-gradient(45deg, rgba(200, 170, 130, 0.06) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(200, 170, 130, 0.06) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(200, 170, 130, 0.06) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(200, 170, 130, 0.06) 75%),
      #faf3e6;
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    border: 1px solid rgba(160, 130, 90, 0.3);
    border-radius: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  svg { display: block; width: 100%; height: 100%; }

  .silhouette {
    fill: rgba(80, 55, 30, 0.12);
    stroke: rgba(80, 55, 30, 0.4);
    stroke-width: 2.5;
    stroke-dasharray: 8, 4;
    pointer-events: none;
  }
  .theme-label {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    font-weight: 300;
    color: rgba(120, 90, 40, 0.15);
    letter-spacing: 4px;
    pointer-events: none;
    font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif;
  }

  .piece {
    cursor: grab;
    transition: filter 0.15s;
    filter: drop-shadow(0 2px 4px rgba(80, 50, 20, 0.15));
    will-change: transform;
  }
  .piece.selected {
    filter: drop-shadow(0 0 12px rgba(200, 120, 60, 0.85)) drop-shadow(0 2px 4px rgba(80, 50, 20, 0.2));
    stroke: rgba(200, 120, 60, 0.7);
    stroke-width: 2.5;
  }
  .piece.dragging {
    transition: none;
    filter: drop-shadow(0 0 14px rgba(200, 120, 60, 0.9)) drop-shadow(0 4px 8px rgba(80, 50, 20, 0.3));
  }
  .piece:active { cursor: grabbing; }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .controls button {
    flex: 1;
    min-width: 60px;
    padding: 9px 0;
    font-size: 13px;
    letter-spacing: 2px;
    border: 1px solid #a67240;
    background: transparent;
    color: #6b4820;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .controls button:hover:not(:disabled) { background: #d4a878; color: #fff; }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.primary { background: #a67240; color: #fff; }
  .controls button.primary:hover { background: #6b4820; }

  .hint {
    text-align: center;
    color: #907050;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.6;
  }
  .hint kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(200, 170, 130, 0.2);
    border: 1px solid rgba(160, 130, 90, 0.3);
    border-radius: 3px;
    font-family: monospace;
    font-size: 10px;
    color: #6b4820;
  }

  /* Poem overlay */
  .poem-modal {
    position: fixed;
    inset: 0;
    background: rgba(60, 45, 30, 0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .poem-modal.show { display: flex; opacity: 1; }
  .poem-modal .card {
    background: #fefbf5;
    border: 2px solid #a67240;
    border-radius: 6px;
    padding: 40px 34px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    position: relative;
    animation: cardIn 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .poem-modal .seal {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    background: #a67240;
    color: #fff;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: -1px;
    line-height: 1.2;
    transform: rotate(3deg);
  }
  .poem-modal .theme {
    font-size: 30px;
    letter-spacing: 6px;
    color: #6b4820;
    margin-bottom: 6px;
  }
  .poem-modal .theme-sub {
    font-size: 12px;
    letter-spacing: 3px;
    color: #a67240;
    margin-bottom: 22px;
    font-style: italic;
  }
  .poem-modal .verse {
    font-size: 20px;
    line-height: 2.2;
    color: #3d2f24;
    letter-spacing: 4px;
    padding: 20px 0;
    border-top: 1px solid rgba(160, 130, 90, 0.25);
    border-bottom: 1px solid rgba(160, 130, 90, 0.25);
    margin-bottom: 12px;
    white-space: pre-line;
    font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif;
  }
  .poem-modal .poet {
    font-size: 13px;
    color: #a67240;
    letter-spacing: 2px;
    margin-bottom: 22px;
    font-style: italic;
  }
  .poem-modal .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .poem-modal button {
    padding: 8px 22px;
    background: #a67240;
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
  }
  .poem-modal button:hover { background: #6b4820; }
  .poem-modal button.secondary {
    background: transparent;
    color: #6b4820;
    border: 1px solid #a67240;
  }
  .poem-modal button.secondary:hover { background: rgba(200, 170, 130, 0.2); }

  @media (max-width: 480px) {
    .container { padding: 16px 14px; }
    h1 { font-size: 20px; letter-spacing: 4px; }
    .controls button { min-width: 56px; font-size: 12px; padding: 8px 4px; }
    .target-btn { min-width: 60px; font-size: 10px; }
    .target-btn .emoji { font-size: 18px; }
    .poem-modal .card { padding: 30px 24px; }
    .poem-modal .theme { font-size: 24px; }
    .poem-modal .verse { font-size: 17px; letter-spacing: 3px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <h1>七 巧 · 山 水</h1>
  <div class="subtitle">— 拼一意 · 得一诗 —</div>

  <div class="progress">
    已得诗 <b id="progressCount">0</b> / <b id="progressTotal">6</b>
  </div>

  <div class="target-row" id="targetRow"></div>

  <div class="canvas-wrap">
    <div class="theme-label" id="themeLabel"></div>
    <svg id="canvas" viewBox="0 0 400 400"></svg>
  </div>

  <div class="controls">
    <button id="rotateBtn">↻ 旋转</button>
    <button id="flipBtn">⇋ 翻转</button>
    <button id="resetBtn">摊开</button>
    <button id="poemBtn" class="primary">得 诗</button>
  </div>

  <div class="hint">
    选一景 · 把七片拼成心中的样子 · 满意后点「得诗」得一联
  </div>
</div>

<div class="poem-modal" id="poemModal">
  <div class="card">
    <div class="seal">得<br>诗</div>
    <div class="theme" id="poemTheme"></div>
    <div class="theme-sub" id="poemSub"></div>
    <div class="verse" id="poemVerse"></div>
    <div class="poet" id="poemPoet"></div>
    <div class="actions">
      <button id="nextTargetBtn">下一景</button>
      <button id="closePoemBtn" class="secondary">再赏</button>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById('canvas');

// Piece geometry — centroid-centered
const U = 40;
const SQRT2 = Math.SQRT2;
function centerPts(pts) {
  const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
  return pts.map(([x, y]) => [x - cx, y - cy]);
}
const DEFS = {
  bigTri:   centerPts([[0,0], [2*U, 0], [0, 2*U]]),
  medTri:   centerPts([[0,0], [SQRT2*U, 0], [0, SQRT2*U]]),
  smallTri: centerPts([[0,0], [U, 0], [0, U]]),
  square:   centerPts([[0,0], [U, 0], [U, U], [0, U]]),
  paralle:  centerPts([[0,0], [U, 0], [2*U, U], [U, U]]),
};

const COLORS = ['#e07a5f', '#3d5a80', '#81b29a', '#f2cc8f', '#a08fdc', '#c17b52', '#5b8ba3'];

const INITIAL = [
  { type: 'bigTri',   x: 80,  y: 90,  rot: 0,   flipped: false },
  { type: 'bigTri',   x: 320, y: 90,  rot: 90,  flipped: false },
  { type: 'medTri',   x: 200, y: 60,  rot: 45,  flipped: false },
  { type: 'smallTri', x: 60,  y: 250, rot: 0,   flipped: false },
  { type: 'smallTri', x: 340, y: 250, rot: 180, flipped: false },
  { type: 'square',   x: 200, y: 300, rot: 0,   flipped: false },
  { type: 'paralle',  x: 200, y: 200, rot: 0,   flipped: false },
];

let pieces = INITIAL.map((p, i) => ({ ...p, idx: i, color: COLORS[i] }));
let selectedIdx = null;

// TARGETS — each has a SILHOUETTE PATH (recognizable shape) and a poem
const TARGETS = [
  {
    name: '月', emoji: '🌙',
    silhouette: 'M 240 100 A 130 130 0 1 0 240 300 A 100 100 0 1 1 240 100 Z',
    verse: '举 头 望 明 月\n低 头 思 故 乡',
    poet: '李白 · 静夜思',
    sub: '一片乡愁',
  },
  {
    name: '舟', emoji: '⛵',
    silhouette: 'M 200 100 L 200 260 M 200 260 L 280 260 L 200 100 Z ' +
                'M 90 260 Q 100 285 130 300 L 280 300 Q 310 285 320 260 Z',
    verse: '孤 舟 蓑 笠 翁\n独 钓 寒 江 雪',
    poet: '柳宗元 · 江雪',
    sub: '天地寂寂',
  },
  {
    name: '山', emoji: '⛰',
    silhouette: 'M 60 320 L 140 200 L 200 250 L 250 160 L 340 320 Z',
    verse: '不 识 庐 山 真 面 目\n只 缘 身 在 此 山 中',
    poet: '苏轼 · 题西林壁',
    sub: '身在局中',
  },
  {
    name: '松', emoji: '🌲',
    silhouette: 'M 200 60 L 130 190 L 165 190 L 110 280 L 180 280 L 180 340 L 220 340 L 220 280 L 290 280 L 235 190 L 270 190 Z',
    verse: '岁 寒\n然 后 知 松 柏 之 后 凋 也',
    poet: '孔子 · 论语',
    sub: '傲雪凌霜',
  },
  {
    name: '亭', emoji: '⛩',
    silhouette: 'M 80 200 L 200 90 L 320 200 L 300 220 L 300 320 L 240 320 L 240 240 L 160 240 L 160 320 L 100 320 L 100 220 Z',
    verse: '亭 亭 山 上 松\n瑟 瑟 谷 中 风',
    poet: '刘桢 · 赠从弟',
    sub: '一亭一世界',
  },
  {
    name: '云', emoji: '☁',
    silhouette: 'M 100 250 Q 80 200 130 190 Q 130 140 200 160 Q 240 130 290 170 Q 340 180 330 230 Q 350 270 300 280 L 130 280 Q 80 280 100 250 Z',
    verse: '行 到 水 穷 处\n坐 看 云 起 时',
    poet: '王维 · 终南别业',
    sub: '闲云自舒',
  },
];

let currentTargetIdx = -1;
let completedTargets = new Set(JSON.parse(localStorage.getItem('qixiaoBanPoems2') || '[]'));

const themeLabel = document.getElementById('themeLabel');

// ============ Render ============
function pointsStr(pts) {
  return pts.map(([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
}
function pieceTransform(p) {
  const flipScale = p.flipped ? -1 : 1;
  return `translate(${p.x} ${p.y}) rotate(${p.rot}) scale(${flipScale} 1)`;
}

function render() {
  let html = '';
  // Silhouette background
  if (currentTargetIdx >= 0) {
    const t = TARGETS[currentTargetIdx];
    html += `<path class="silhouette" d="${t.silhouette}" />`;
  }
  // Pieces
  for (const p of pieces) {
    const pts = pointsStr(DEFS[p.type]);
    const cls = 'piece' + (p.idx === selectedIdx ? ' selected' : '');
    html += `<polygon class="${cls}" points="${pts}"
                      fill="${p.color}"
                      stroke="rgba(0,0,0,0.15)" stroke-width="1"
                      transform="${pieceTransform(p)}"
                      data-idx="${p.idx}" />`;
  }
  svg.innerHTML = html;
}
function updateDraggedTransform(p) {
  const el = svg.querySelector(`[data-idx="${p.idx}"]`);
  if (el) el.setAttribute('transform', pieceTransform(p));
}

// ============ Target row ============
function initTargetRow() {
  const row = document.getElementById('targetRow');
  document.getElementById('progressTotal').textContent = TARGETS.length;
  updateProgress();
  row.innerHTML = TARGETS.map((t, i) => {
    const doneCls = completedTargets.has(t.name) ? 'done' : '';
    return `<button class="target-btn ${doneCls}" data-idx="${i}">
      <span class="emoji">${t.emoji}</span>
      <span>${t.name}</span>
    </button>`;
  }).join('');
  row.addEventListener('click', e => {
    const btn = e.target.closest('.target-btn');
    if (!btn) return;
    const idx = +btn.dataset.idx;
    setTarget(idx === currentTargetIdx ? -1 : idx);
  });
}

function updateProgress() {
  document.getElementById('progressCount').textContent = completedTargets.size;
}
function refreshTargetButtons() {
  document.querySelectorAll('.target-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentTargetIdx);
    b.classList.toggle('done', completedTargets.has(TARGETS[i].name));
  });
}
function setTarget(idx) {
  currentTargetIdx = idx;
  refreshTargetButtons();
  themeLabel.textContent = idx >= 0 ? TARGETS[idx].name : '';
  render();
}

// ============ Poem modal ============
const poemModal = document.getElementById('poemModal');
function showPoem(target) {
  document.getElementById('poemTheme').textContent = target.name;
  document.getElementById('poemSub').textContent = target.sub;
  document.getElementById('poemVerse').textContent = target.verse;
  document.getElementById('poemPoet').textContent = '— ' + target.poet;
  poemModal.classList.add('show');
  if (navigator.vibrate) navigator.vibrate([15, 30, 15]);
}
function hidePoem() { poemModal.classList.remove('show'); }
document.getElementById('closePoemBtn').addEventListener('click', hidePoem);
document.getElementById('nextTargetBtn').addEventListener('click', () => {
  hidePoem();
  const next = TARGETS.findIndex((t, i) => i > currentTargetIdx && !completedTargets.has(t.name));
  const wrap = TARGETS.findIndex(t => !completedTargets.has(t.name));
  const targetIdx = next >= 0 ? next : (wrap >= 0 ? wrap : (currentTargetIdx + 1) % TARGETS.length);
  resetPieces();
  setTarget(targetIdx);
});
poemModal.addEventListener('click', e => { if (e.target === poemModal) hidePoem(); });

function resetPieces() {
  pieces = INITIAL.map((p, i) => ({ ...p, idx: i, color: COLORS[i] }));
  selectedIdx = null;
}

// ============ Interaction ============
let dragging = null;
let dragStart = null;
let lastTapTime = 0;
let lastTapIdx = null;

function svgCoords(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const sx = 400 / rect.width;
  const sy = 400 / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}

svg.addEventListener('pointerdown', e => {
  const idx = e.target.dataset ? e.target.dataset.idx : undefined;
  if (idx === undefined || idx === '') {
    selectedIdx = null;
    render();
    return;
  }
  const i = +idx;
  const now = Date.now();
  if (lastTapIdx === i && now - lastTapTime < 350) {
    pieces[i].rot = (pieces[i].rot + 45) % 360;
    lastTapTime = 0; lastTapIdx = null;
    selectedIdx = i;
    render();
    return;
  }
  lastTapTime = now;
  lastTapIdx = i;
  selectedIdx = i;
  const svgPos = svgCoords(e.clientX, e.clientY);
  dragStart = { svgX: svgPos.x, svgY: svgPos.y, pieceX: pieces[i].x, pieceY: pieces[i].y };
  dragging = pieces[i];
  try { svg.setPointerCapture(e.pointerId); } catch (_) {}
  pieces = pieces.filter(p => p !== dragging).concat([dragging]);
  render();
});

svg.addEventListener('pointermove', e => {
  if (!dragging) return;
  const svgPos = svgCoords(e.clientX, e.clientY);
  dragging.x = dragStart.pieceX + (svgPos.x - dragStart.svgX);
  dragging.y = dragStart.pieceY + (svgPos.y - dragStart.svgY);
  updateDraggedTransform(dragging);
});

svg.addEventListener('pointerup', e => {
  if (dragging) {
    try { svg.releasePointerCapture(e.pointerId); } catch (_) {}
    dragging = null;
    dragStart = null;
  }
});
svg.addEventListener('pointercancel', () => { dragging = null; dragStart = null; });

// Controls
document.getElementById('rotateBtn').addEventListener('click', () => {
  if (selectedIdx === null) return;
  pieces[selectedIdx].rot = (pieces[selectedIdx].rot + 45) % 360;
  render();
});
document.getElementById('flipBtn').addEventListener('click', () => {
  if (selectedIdx === null) return;
  pieces[selectedIdx].flipped = !pieces[selectedIdx].flipped;
  render();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  resetPieces();
  render();
});
document.getElementById('poemBtn').addEventListener('click', () => {
  if (currentTargetIdx < 0) {
    alert('先在上面选一景');
    return;
  }
  const target = TARGETS[currentTargetIdx];
  completedTargets.add(target.name);
  localStorage.setItem('qixiaoBanPoems2', JSON.stringify([...completedTargets]));
  updateProgress();
  refreshTargetButtons();
  showPoem(target);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (selectedIdx === null) return;
  if (e.key === 'r' || e.key === 'R') {
    document.getElementById('rotateBtn').click();
  } else if (e.key === 'f' || e.key === 'F') {
    document.getElementById('flipBtn').click();
  } else if (e.key === 'Escape') {
    selectedIdx = null; render();
  }
});

// Boot
initTargetRow();
render();
</script>
</body>
</html>
