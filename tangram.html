<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>七巧 · 山水</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', 'Songti TC', Georgia, serif;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .container {
    background: #fefbf5;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(120, 90, 60, 0.2), inset 0 0 40px rgba(200, 170, 130, 0.08);
    padding: 20px;
    max-width: 640px;
    width: 100%;
    border: 1px solid rgba(160, 130, 90, 0.25);
  }
  .back-link {
    display: inline-block;
    color: #a67240;
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .back-link:hover { color: #6b4820; }
  h1 { color: #3d2f24; font-size: 22px; letter-spacing: 6px; margin-bottom: 4px; text-align: center; }
  .subtitle { text-align: center; color: #907050; font-size: 12px; letter-spacing: 3px; margin-bottom: 14px; font-style: italic; }

  .progress {
    text-align: center;
    color: #907050;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .progress b { color: #a67240; font-weight: 700; }

  .target-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 6px;
    margin-bottom: 14px;
  }
  .target-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px;
    background: transparent;
    border: 1.5px solid rgba(160, 130, 90, 0.35);
    color: #6b4820;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
    position: relative;
  }
  .target-btn:hover { background: rgba(200, 170, 130, 0.15); }
  .target-btn.active {
    background: #d4a878;
    border-color: #a67240;
    color: #fff;
  }
  .target-btn.done {
    background: #e8d4a8;
    border-color: #a67240;
  }
  .target-btn.done::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 10px;
    color: #a67240;
    font-weight: bold;
  }
  .target-btn .emoji { font-size: 20px; margin-bottom: 2px; }

  .canvas-wrap {
    position: relative;
    aspect-ratio: 1;
    background:
      radial-gradient(ellipse 80% 60% at 40% 30%, #fdf5e3 0%, #ecd7ae 65%, #cfb083 100%);
    border: 1px solid rgba(160, 130, 90, 0.35);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: inset 0 0 28px rgba(120, 80, 40, 0.16);
  }
  svg { display: block; width: 100%; height: 100%; }

  .silhouette {
    fill: rgba(60, 40, 20, 0.14);
    stroke: rgba(60, 40, 20, 0.38);
    stroke-width: 2;
    stroke-dasharray: 6, 4;
    pointer-events: none;
  }
  .theme-label {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    font-weight: 300;
    color: rgba(120, 90, 40, 0.16);
    letter-spacing: 4px;
    pointer-events: none;
    font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif;
  }

  /* Faux-3D piece layers */
  .piece { cursor: grab; }
  .piece .face-top {
    stroke: rgba(0,0,0,0.22);
    stroke-width: 0.8;
    stroke-linejoin: round;
  }
  .piece .face-side {
    stroke: rgba(0,0,0,0.18);
    stroke-width: 0.5;
    stroke-linejoin: round;
  }
  .piece .face-back {
    opacity: 0.9;
  }
  .piece .highlight {
    fill: rgba(255,255,255,0.18);
    pointer-events: none;
  }
  .shadow-poly {
    fill: rgba(40, 25, 10, 0.32);
    filter: blur(3.5px);
    pointer-events: none;
  }
  .piece.selected .face-top {
    stroke: #ff8a3d;
    stroke-width: 2.4;
  }
  .piece.selected + .highlight-glow, .piece.selected .highlight { fill: rgba(255,200,120,0.28); }
  .piece.dragging { cursor: grabbing; }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .controls button {
    flex: 1;
    min-width: 60px;
    padding: 9px 0;
    font-size: 13px;
    letter-spacing: 2px;
    border: 1px solid #a67240;
    background: transparent;
    color: #6b4820;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .controls button:hover:not(:disabled) { background: #d4a878; color: #fff; }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.primary { background: #a67240; color: #fff; }
  .controls button.primary:hover { background: #6b4820; }

  .hint {
    text-align: center;
    color: #907050;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.6;
  }

  /* Poem overlay */
  .poem-modal {
    position: fixed;
    inset: 0;
    background: rgba(60, 45, 30, 0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .poem-modal.show { display: flex; opacity: 1; }
  .poem-modal .card {
    background: #fefbf5;
    border: 2px solid #a67240;
    border-radius: 6px;
    padding: 40px 34px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    position: relative;
    animation: cardIn 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .poem-modal .seal {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    background: #a67240;
    color: #fff;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: -1px;
    line-height: 1.2;
    transform: rotate(3deg);
  }
  .poem-modal .theme {
    font-size: 30px;
    letter-spacing: 6px;
    color: #6b4820;
    margin-bottom: 6px;
  }
  .poem-modal .theme-sub {
    font-size: 12px;
    letter-spacing: 3px;
    color: #a67240;
    margin-bottom: 22px;
    font-style: italic;
  }
  .poem-modal .verse {
    font-size: 20px;
    line-height: 2.2;
    color: #3d2f24;
    letter-spacing: 4px;
    padding: 20px 0;
    border-top: 1px solid rgba(160, 130, 90, 0.25);
    border-bottom: 1px solid rgba(160, 130, 90, 0.25);
    margin-bottom: 12px;
    white-space: pre-line;
    font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif;
  }
  .poem-modal .poet {
    font-size: 13px;
    color: #a67240;
    letter-spacing: 2px;
    margin-bottom: 22px;
    font-style: italic;
  }
  .poem-modal .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .poem-modal button {
    padding: 8px 22px;
    background: #a67240;
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
  }
  .poem-modal button:hover { background: #6b4820; }
  .poem-modal button.secondary {
    background: transparent;
    color: #6b4820;
    border: 1px solid #a67240;
  }
  .poem-modal button.secondary:hover { background: rgba(200, 170, 130, 0.2); }

  @media (max-width: 480px) {
    .container { padding: 16px 14px; }
    h1 { font-size: 20px; letter-spacing: 4px; }
    .controls button { min-width: 56px; font-size: 12px; padding: 8px 4px; }
    .target-btn { min-width: 60px; font-size: 10px; }
    .target-btn .emoji { font-size: 18px; }
    .poem-modal .card { padding: 30px 24px; }
    .poem-modal .theme { font-size: 24px; }
    .poem-modal .verse { font-size: 17px; letter-spacing: 3px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <h1>七 巧 · 山 水</h1>
  <div class="subtitle">— 拼一意 · 得一诗 · 立体版 —</div>

  <div class="progress">
    已得诗 <b id="progressCount">0</b> / <b id="progressTotal">6</b>
  </div>

  <div class="target-row" id="targetRow"></div>

  <div class="canvas-wrap">
    <div class="theme-label" id="themeLabel"></div>
    <svg id="canvas" viewBox="0 0 400 400"></svg>
  </div>

  <div class="controls">
    <button id="rotateBtn">↻ 旋转</button>
    <button id="flipBtn">⇋ 翻转</button>
    <button id="resetBtn">摊开</button>
    <button id="poemBtn" class="primary">得 诗</button>
  </div>

  <div class="hint">
    选一景 · 点击选中 · 拖动摆放 · 双击旋转 · 满意后点「得诗」
  </div>
</div>

<div class="poem-modal" id="poemModal">
  <div class="card">
    <div class="seal">得<br>诗</div>
    <div class="theme" id="poemTheme"></div>
    <div class="theme-sub" id="poemSub"></div>
    <div class="verse" id="poemVerse"></div>
    <div class="poet" id="poemPoet"></div>
    <div class="actions">
      <button id="nextTargetBtn">下一景</button>
      <button id="closePoemBtn" class="secondary">再赏</button>
    </div>
  </div>
</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('canvas');

// ============ Piece geometry (centroid-centered, unit U) ============
const U = 40;
const SQRT2 = Math.SQRT2;
function centerPts(pts) {
  const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
  return pts.map(([x, y]) => [x - cx, y - cy]);
}
const DEFS = {
  bigTri:   centerPts([[0,0], [2*U, 0], [0, 2*U]]),
  medTri:   centerPts([[0,0], [SQRT2*U, 0], [0, SQRT2*U]]),
  smallTri: centerPts([[0,0], [U, 0], [0, U]]),
  square:   centerPts([[0,0], [U, 0], [U, U], [0, U]]),
  paralle:  centerPts([[0,0], [U, 0], [2*U, U], [U, U]]),
};

const COLORS = ['#e07a5f', '#3d5a80', '#81b29a', '#f2cc8f', '#a08fdc', '#c17b52', '#5b8ba3'];

// ============ 3D extrusion params ============
// Bottom face is drawn LEFT and DOWN of top face → piece appears raised UP-RIGHT.
// Camera implied above-front-left.
const BOTTOM_DX = -3;   // bottom shifted 3px LEFT of top (screen space)
const BOTTOM_DY = 10;   // bottom shifted 10px DOWN of top (larger y = down)
const SHADOW_DX = -5;   // ground shadow slightly further
const SHADOW_DY = 14;

const INITIAL = [
  { type: 'bigTri',   x: 80,  y: 90,  rot: 0,   flipped: false },
  { type: 'bigTri',   x: 320, y: 90,  rot: 90,  flipped: false },
  { type: 'medTri',   x: 200, y: 60,  rot: 45,  flipped: false },
  { type: 'smallTri', x: 60,  y: 250, rot: 0,   flipped: false },
  { type: 'smallTri', x: 340, y: 250, rot: 180, flipped: false },
  { type: 'square',   x: 200, y: 310, rot: 0,   flipped: false },
  { type: 'paralle',  x: 200, y: 210, rot: 0,   flipped: false },
];

let pieces = INITIAL.map((p, i) => ({ ...p, idx: i, color: COLORS[i] }));
let selectedIdx = null;

// ============ Targets & poems ============
// All silhouettes are pure straight-line polygons with area ≈ 8U² = 12800
// (equal to the total area of the 7 tangram pieces).
const TARGETS = [
  {
    name: '山', emoji: '⛰',
    silhouette: 'M 90 300 L 160 200 L 210 240 L 260 180 L 320 300 Z',
    verse: '不 识 庐 山 真 面 目\n只 缘 身 在 此 山 中',
    poet: '苏轼 · 题西林壁',
    sub: '身在局中',
  },
  {
    name: '松', emoji: '🌲',
    silhouette: 'M 200 100 L 150 195 L 175 195 L 130 275 L 190 275 L 190 315 L 210 315 L 210 275 L 270 275 L 225 195 L 250 195 Z',
    verse: '岁 寒\n然 后 知 松 柏 之 后 凋 也',
    poet: '孔子 · 论语',
    sub: '傲雪凌霜',
  },
  {
    name: '舟', emoji: '⛵',
    silhouette: 'M 200 125 L 220 240 L 90 240 Z ' +
                'M 70 240 L 330 240 L 300 295 L 100 295 Z',
    verse: '孤 舟 蓑 笠 翁\n独 钓 寒 江 雪',
    poet: '柳宗元 · 江雪',
    sub: '天地寂寂',
  },
  {
    name: '月', emoji: '🌕',
    silhouette: 'M 175 140 L 225 140 L 265 180 L 265 240 L 225 280 L 175 280 L 135 240 L 135 180 Z',
    verse: '举 头 望 明 月\n低 头 思 故 乡',
    poet: '李白 · 静夜思',
    sub: '一轮乡愁',
  },
  {
    name: '亭', emoji: '⛩',
    silhouette: 'M 130 210 L 200 140 L 270 210 L 255 225 L 255 290 L 220 290 L 220 240 L 180 240 L 180 290 L 145 290 L 145 225 Z',
    verse: '亭 亭 山 上 松\n瑟 瑟 谷 中 风',
    poet: '刘桢 · 赠从弟',
    sub: '一亭一世界',
  },
  {
    name: '云', emoji: '☁',
    silhouette: 'M 90 250 L 90 225 L 120 225 L 120 200 L 170 200 L 170 175 L 270 175 L 270 200 L 310 200 L 310 225 L 340 225 L 340 250 Z',
    verse: '行 到 水 穷 处\n坐 看 云 起 时',
    poet: '王维 · 终南别业',
    sub: '闲云自舒',
  },
];

let currentTargetIdx = -1;
let completedTargets = new Set(JSON.parse(localStorage.getItem('qixiaoBanPoems2') || '[]'));

const themeLabel = document.getElementById('themeLabel');

// ============ Color helpers ============
function hexToRgb(hex) {
  return [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16));
}
function shade(hex, factor) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.round(r*factor)}, ${Math.round(g*factor)}, ${Math.round(b*factor)})`;
}

// ============ Geometry ============
function worldPoints(p) {
  const cs = Math.cos(p.rot * Math.PI / 180);
  const sn = Math.sin(p.rot * Math.PI / 180);
  const sx = p.flipped ? -1 : 1;
  return DEFS[p.type].map(([x, y]) => {
    const fx = x * sx;
    return [fx * cs - y * sn + p.x, fx * sn + y * cs + p.y];
  });
}
function offsetPts(pts, dx, dy) {
  return pts.map(([x, y]) => [x + dx, y + dy]);
}
function ptsStr(pts) {
  return pts.map(([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
}

// ============ Rendering ============
function renderShadowSVG(p) {
  const top = worldPoints(p);
  const shadow = offsetPts(top, SHADOW_DX, SHADOW_DY);
  return `<polygon class="shadow-poly" points="${ptsStr(shadow)}" data-shadow-idx="${p.idx}" />`;
}

function renderPieceSVG(p) {
  const top = worldPoints(p);
  const bot = offsetPts(top, BOTTOM_DX, BOTTOM_DY);
  const sideColor = shade(p.color, 0.72);
  const backColor = shade(p.color, 0.55);
  const cls = 'piece' + (p.idx === selectedIdx ? ' selected' : '');

  let html = `<g class="${cls}" data-idx="${p.idx}">`;
  // Back face (bottom polygon, darker) — mostly hidden but shows at edges
  html += `<polygon class="face-back" points="${ptsStr(bot)}" fill="${backColor}" />`;
  // Side quads: each edge (a→b) at top connects to (a', b') at bottom
  for (let i = 0; i < top.length; i++) {
    const a  = top[i], b  = top[(i + 1) % top.length];
    const aB = bot[i], bB = bot[(i + 1) % bot.length];
    html += `<polygon class="face-side" points="${ptsStr([a, b, bB, aB])}" fill="${sideColor}" />`;
  }
  // Top face (base color)
  html += `<polygon class="face-top" points="${ptsStr(top)}" fill="${p.color}" />`;
  // Subtle highlight strip on top face (fake specular)
  const hlPts = top.map(([x, y]) => [x + 1, y - 1.5]);
  html += `<polygon class="highlight" points="${ptsStr(hlPts)}" />`;
  html += `</g>`;
  return html;
}

function render() {
  let html = '';
  html += `<g class="silhouette-layer">`;
  if (currentTargetIdx >= 0) {
    html += `<path class="silhouette" d="${TARGETS[currentTargetIdx].silhouette}" />`;
  }
  html += `</g>`;
  html += `<g class="shadow-layer">`;
  for (const p of pieces) html += renderShadowSVG(p);
  html += `</g>`;
  html += `<g class="piece-layer">`;
  for (const p of pieces) html += renderPieceSVG(p);
  html += `</g>`;
  svg.innerHTML = html;
}

function updateSelectionOnly(newIdx) {
  selectedIdx = newIdx;
  svg.querySelectorAll('.piece.selected').forEach(el => el.classList.remove('selected'));
  if (newIdx !== null) {
    const el = svg.querySelector(`.piece[data-idx="${newIdx}"]`);
    if (el) el.classList.add('selected');
  }
}

// Live drag translate on the g + its shadow
function setDragTransform(pieceIdx, dx, dy) {
  const g = svg.querySelector(`.piece[data-idx="${pieceIdx}"]`);
  const s = svg.querySelector(`[data-shadow-idx="${pieceIdx}"]`);
  const t = `translate(${dx} ${dy})`;
  if (g) g.setAttribute('transform', t);
  if (s) s.setAttribute('transform', t);
}
function clearDragTransform(pieceIdx) {
  const g = svg.querySelector(`.piece[data-idx="${pieceIdx}"]`);
  const s = svg.querySelector(`[data-shadow-idx="${pieceIdx}"]`);
  if (g) g.removeAttribute('transform');
  if (s) s.removeAttribute('transform');
}
function raiseToTop(pieceIdx) {
  const layer = svg.querySelector('.piece-layer');
  const shadowLayer = svg.querySelector('.shadow-layer');
  const g = svg.querySelector(`.piece[data-idx="${pieceIdx}"]`);
  const s = svg.querySelector(`[data-shadow-idx="${pieceIdx}"]`);
  if (layer && g) layer.appendChild(g);
  if (shadowLayer && s) shadowLayer.appendChild(s);
}

// ============ Target row ============
function initTargetRow() {
  const row = document.getElementById('targetRow');
  document.getElementById('progressTotal').textContent = TARGETS.length;
  updateProgress();
  row.innerHTML = TARGETS.map((t, i) => {
    const doneCls = completedTargets.has(t.name) ? 'done' : '';
    return `<button class="target-btn ${doneCls}" data-idx="${i}">
      <span class="emoji">${t.emoji}</span>
      <span>${t.name}</span>
    </button>`;
  }).join('');
  row.addEventListener('click', e => {
    const btn = e.target.closest('.target-btn');
    if (!btn) return;
    const idx = +btn.dataset.idx;
    setTarget(idx === currentTargetIdx ? -1 : idx);
  });
}
function updateProgress() {
  document.getElementById('progressCount').textContent = completedTargets.size;
}
function refreshTargetButtons() {
  document.querySelectorAll('.target-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentTargetIdx);
    b.classList.toggle('done', completedTargets.has(TARGETS[i].name));
  });
}
function setTarget(idx) {
  currentTargetIdx = idx;
  refreshTargetButtons();
  themeLabel.textContent = idx >= 0 ? TARGETS[idx].name : '';
  render();
}

// ============ Poem modal ============
const poemModal = document.getElementById('poemModal');
function showPoem(target) {
  document.getElementById('poemTheme').textContent = target.name;
  document.getElementById('poemSub').textContent = target.sub;
  document.getElementById('poemVerse').textContent = target.verse;
  document.getElementById('poemPoet').textContent = '— ' + target.poet;
  poemModal.classList.add('show');
  if (navigator.vibrate) navigator.vibrate([15, 30, 15]);
}
function hidePoem() { poemModal.classList.remove('show'); }
document.getElementById('closePoemBtn').addEventListener('click', hidePoem);
document.getElementById('nextTargetBtn').addEventListener('click', () => {
  hidePoem();
  const next = TARGETS.findIndex((t, i) => i > currentTargetIdx && !completedTargets.has(t.name));
  const wrap = TARGETS.findIndex(t => !completedTargets.has(t.name));
  const targetIdx = next >= 0 ? next : (wrap >= 0 ? wrap : (currentTargetIdx + 1) % TARGETS.length);
  resetPieces();
  setTarget(targetIdx);
});
poemModal.addEventListener('click', e => { if (e.target === poemModal) hidePoem(); });

function resetPieces() {
  pieces = INITIAL.map((p, i) => ({ ...p, idx: i, color: COLORS[i] }));
  selectedIdx = null;
}

// ============ Interaction ============
let dragging = null;
let pending = null;
let lastTapTime = 0;
let lastTapIdx = null;
const DRAG_THRESHOLD = 5;

function svgCoords(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const sx = 400 / rect.width;
  const sy = 400 / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}

svg.addEventListener('pointerdown', e => {
  const g = e.target.closest('.piece');
  if (!g) {
    updateSelectionOnly(null);
    return;
  }
  const i = +g.dataset.idx;

  // Double-tap → rotate 45°
  const now = Date.now();
  if (lastTapIdx === i && now - lastTapTime < 350) {
    pieces[i].rot = (pieces[i].rot + 45) % 360;
    render();
    updateSelectionOnly(i);
    lastTapTime = 0; lastTapIdx = null;
    return;
  }
  lastTapTime = now;
  lastTapIdx = i;

  updateSelectionOnly(i);
  raiseToTop(i);

  const svgPos = svgCoords(e.clientX, e.clientY);
  pending = {
    piece: pieces[i],
    idx: i,
    startClientX: e.clientX,
    startClientY: e.clientY,
    pieceX: pieces[i].x,
    pieceY: pieces[i].y,
    startSvgX: svgPos.x,
    startSvgY: svgPos.y,
  };
  try { svg.setPointerCapture(e.pointerId); } catch (_) {}
});

svg.addEventListener('pointermove', e => {
  if (!pending) return;
  const dxRaw = e.clientX - pending.startClientX;
  const dyRaw = e.clientY - pending.startClientY;

  if (!dragging) {
    if (Math.sqrt(dxRaw * dxRaw + dyRaw * dyRaw) < DRAG_THRESHOLD) return;
    dragging = pending.piece;
    const g = svg.querySelector(`.piece[data-idx="${pending.idx}"]`);
    if (g) g.classList.add('dragging');
  }

  const svgPos = svgCoords(e.clientX, e.clientY);
  const dSvgX = svgPos.x - pending.startSvgX;
  const dSvgY = svgPos.y - pending.startSvgY;
  setDragTransform(pending.idx, dSvgX, dSvgY);
});

function endInteraction(pointerId) {
  try { svg.releasePointerCapture(pointerId); } catch (_) {}
  if (dragging && pending) {
    // Commit the drag translate into piece.x/y, re-render
    const g = svg.querySelector(`.piece[data-idx="${pending.idx}"]`);
    const t = g ? g.getAttribute('transform') : null;
    const m = t && t.match(/translate\(([-\d.]+)\s+([-\d.]+)\)/);
    if (m) {
      dragging.x = Math.round((pending.pieceX + parseFloat(m[1])) / 5) * 5;
      dragging.y = Math.round((pending.pieceY + parseFloat(m[2])) / 5) * 5;
    }
    clearDragTransform(pending.idx);
    // Move dragged to end of pieces array (top of stack)
    pieces = pieces.filter(p => p !== dragging).concat([dragging]);
    if (g) g.classList.remove('dragging');
    render();
    updateSelectionOnly(dragging.idx);
  }
  dragging = null;
  pending = null;
}
svg.addEventListener('pointerup', e => endInteraction(e.pointerId));
svg.addEventListener('pointercancel', e => endInteraction(e.pointerId));

// Controls
document.getElementById('rotateBtn').addEventListener('click', () => {
  if (selectedIdx === null) return;
  pieces[selectedIdx].rot = (pieces[selectedIdx].rot + 45) % 360;
  render();
  updateSelectionOnly(selectedIdx);
});
document.getElementById('flipBtn').addEventListener('click', () => {
  if (selectedIdx === null) return;
  pieces[selectedIdx].flipped = !pieces[selectedIdx].flipped;
  render();
  updateSelectionOnly(selectedIdx);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  resetPieces();
  render();
});
document.getElementById('poemBtn').addEventListener('click', () => {
  if (currentTargetIdx < 0) { alert('先在上面选一景'); return; }
  const target = TARGETS[currentTargetIdx];
  completedTargets.add(target.name);
  localStorage.setItem('qixiaoBanPoems2', JSON.stringify([...completedTargets]));
  updateProgress();
  refreshTargetButtons();
  showPoem(target);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (selectedIdx === null) return;
  if (e.key === 'r' || e.key === 'R') document.getElementById('rotateBtn').click();
  else if (e.key === 'f' || e.key === 'F') document.getElementById('flipBtn').click();
  else if (e.key === 'Escape') { selectedIdx = null; render(); }
});

// Boot
initTargetRow();
render();
</script>
</body>
</html>
