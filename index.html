<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荔枝游戏</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 20px;
    color: #333;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 50px;
    color: #fff;
  }
  header .logo {
    width: 110px;
    height: 110px;
    border-radius: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    margin-bottom: 18px;
    object-fit: cover;
    display: inline-block;
  }
  header h1 {
    font-size: clamp(32px, 5vw, 48px);
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.15);
    font-weight: 700;
  }
  header p {
    font-size: 16px;
    opacity: 0.92;
    letter-spacing: 0.3px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(102,126,234,0.06));
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.18);
  }
  .card .emoji {
    font-size: 56px;
    line-height: 1;
  }
  .card h2 {
    font-size: 22px;
    color: #222;
    font-weight: 700;
  }
  .card p {
    font-size: 14px;
    color: #666;
    line-height: 1.55;
    flex-grow: 1;
  }
  .card .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: -4px;
  }
  .card .tags span {
    font-size: 11px;
    padding: 3px 10px;
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .card .play {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #764ba2;
    font-weight: 600;
    font-size: 14px;
    margin-top: 8px;
  }
  .card .play::after {
    content: '→';
    transition: transform 0.2s;
  }
  .card:hover .play::after {
    transform: translateX(4px);
  }
  .card .status {
    position: absolute;
    top: 16px;
    right: 16px;
    background: linear-gradient(135deg, #ffd89b, #f5a76b);
    color: #7a3a10;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px rgba(245, 167, 107, 0.3);
  }
  footer {
    text-align: center;
    margin-top: 60px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }
  footer a {
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,255,255,0.4);
  }

  /* ===== Landscape (compact vertical space) ===== */
  @media (orientation: landscape) and (max-height: 550px) {
    body { padding: 16px 20px; }
    header {
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: left;
    }
    header .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 0;
      flex-shrink: 0;
    }
    header .title-text { display: flex; flex-direction: column; align-items: flex-start; }
    header h1 { font-size: 26px; margin-bottom: 2px; }
    header p { font-size: 13px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { padding: 20px 18px; }
    .card .emoji { font-size: 42px; }
    .card h2 { font-size: 18px; }
    .card p { font-size: 13px; }
    footer { margin-top: 30px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <img src="lychee-logo.png" alt="荔枝" class="logo">
    <div class="title-text">
      <h1>荔枝游戏</h1>
      <p>放松一下，选一个玩</p>
    </div>
  </header>

  <div class="grid">

    <a href="sudoku.html" class="card">
      <div class="emoji">🔢</div>
      <h2>数独</h2>
      <p>经典 9×9 数字谜题，四种难度可选，支持提示、检查、错误标记。</p>
      <div class="tags">
        <span>益智</span>
        <span>数字</span>
        <span>经典</span>
      </div>
      <span class="play">开始玩</span>
    </a>

    <a href="2048.html" class="card">
      <div class="emoji">🧩</div>
      <h2>2048</h2>
      <p>滑动合并相同数字，凑出 2048。支持键盘和触屏，记录最高分。</p>
      <div class="tags">
        <span>益智</span>
        <span>数字</span>
        <span>休闲</span>
      </div>
      <span class="play">开始玩</span>
    </a>

    <a href="midnight-store.html" class="card">
      <span class="status">开发中</span>
      <div class="emoji">🌙</div>
      <h2>凌晨两点的便利店</h2>
      <p>凌晨两点，便利店里四个陌生人擦肩的一晚。</p>
      <div class="tags">
        <span>剧情</span>
        <span>视觉小说</span>
        <span>群像</span>
      </div>
      <span class="play">开始玩</span>
    </a>

    <!-- 更多游戏卡片可以在这里添加 -->

  </div>

  <footer>
    <p>由 <a href="https://github.com/fantasyfanftl/lycheeGame" target="_blank">fantasyfanftl</a> 制作</p>
  </footer>
</div>
</body>
</html>
