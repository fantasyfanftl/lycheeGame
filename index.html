<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏中心</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 20px;
    color: #333;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 50px;
    color: #fff;
  }
  header h1 {
    font-size: clamp(32px, 5vw, 48px);
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.15);
    font-weight: 700;
  }
  header p {
    font-size: 16px;
    opacity: 0.92;
    letter-spacing: 0.3px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(102,126,234,0.06));
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.18);
  }
  .card .emoji {
    font-size: 56px;
    line-height: 1;
  }
  .card h2 {
    font-size: 22px;
    color: #222;
    font-weight: 700;
  }
  .card p {
    font-size: 14px;
    color: #666;
    line-height: 1.55;
    flex-grow: 1;
  }
  .card .play {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #764ba2;
    font-weight: 600;
    font-size: 14px;
    margin-top: 8px;
  }
  .card .play::after {
    content: '→';
    transition: transform 0.2s;
  }
  .card:hover .play::after {
    transform: translateX(4px);
  }
  .card .tag {
    position: absolute;
    top: 16px;
    right: 16px;
    background: linear-gradient(135deg, #ffd89b, #f5a76b);
    color: #7a3a10;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px rgba(245, 167, 107, 0.3);
  }
  footer {
    text-align: center;
    margin-top: 60px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }
  footer a {
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎮 游戏中心</h1>
    <p>放松一下，选一个玩</p>
  </header>

  <div class="grid">

    <a href="sudoku.html" class="card">
      <div class="emoji">🔢</div>
      <h2>数独</h2>
      <p>经典 9×9 数字谜题，四种难度可选，支持提示、检查、错误标记。</p>
      <span class="play">开始玩</span>
    </a>

    <a href="midnight-store.html" class="card">
      <span class="tag">开发中</span>
      <div class="emoji">🌙</div>
      <h2>凌晨两点的便利店</h2>
      <p>凌晨两点，便利店里四个陌生人擦肩的一晚。</p>
      <span class="play">开始玩</span>
    </a>

    <!-- 更多游戏卡片可以在这里添加 -->

  </div>

  <footer>
    <p>由 <a href="https://github.com/fantasyfanftl/lycheeGame" target="_blank">fantasyfanftl</a> 制作</p>
  </footer>
</div>
</body>
</html>
