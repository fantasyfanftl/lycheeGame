<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合体 · 破阵</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', Georgia, serif;
    background: linear-gradient(135deg, #2c1e14 0%, #1a1108 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    color: #e8dcc4;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .container {
    max-width: 500px;
    width: 100%;
    background: #3d2f1e;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    padding: 20px;
    border: 1px solid rgba(200, 160, 100, 0.25);
  }
  .back-link {
    display: inline-block;
    color: rgba(220, 180, 140, 0.6);
    text-decoration: none;
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .back-link:hover { color: #ddb887; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  h1 {
    color: #ddb887;
    font-size: 26px;
    letter-spacing: 6px;
    text-shadow: 0 0 15px rgba(220, 180, 140, 0.3);
  }
  .scores {
    display: flex;
    gap: 8px;
  }
  .score-box {
    background: #5c4224;
    border: 1px solid rgba(200, 160, 100, 0.25);
    border-radius: 4px;
    padding: 6px 12px;
    text-align: center;
    min-width: 62px;
  }
  .score-box .label {
    display: block;
    font-size: 10px;
    color: rgba(232, 220, 196, 0.55);
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .score-box .value {
    display: block;
    font-size: 18px;
    color: #ffd48a;
    font-weight: 700;
  }

  .info {
    color: rgba(232, 220, 196, 0.65);
    font-size: 12px;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .info b { color: #ffd48a; }

  .board-wrap {
    position: relative;
    aspect-ratio: 1;
    background: #5c4224;
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 12px;
    border: 1px solid rgba(200, 160, 100, 0.2);
    overflow: hidden;
  }
  .board-wrap.expand { animation: expandFlash 700ms ease-out; }
  @keyframes expandFlash {
    0%   { box-shadow: 0 0 0 rgba(255, 212, 138, 0), inset 0 0 0 rgba(255, 212, 138, 0); }
    30%  { box-shadow: 0 0 40px rgba(255, 212, 138, 0.6), inset 0 0 30px rgba(255, 212, 138, 0.25); }
    100% { box-shadow: 0 0 0 rgba(255, 212, 138, 0), inset 0 0 0 rgba(255, 212, 138, 0); }
  }
  .cell-bg.fresh { animation: freshCell 600ms ease-out; }
  @keyframes freshCell {
    0%   { background: rgba(255, 212, 138, 0.55); transform: scale(0.7); }
    60%  { background: rgba(255, 212, 138, 0.25); transform: scale(1.05); }
    100% { background: rgba(232, 220, 196, 0.06); transform: scale(1); }
  }
  .board-hint {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(50, 30, 15, 0.92);
    color: #ffd48a;
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 1.5px;
    border: 1px solid rgba(220, 180, 140, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms, transform 220ms;
    z-index: 15;
    white-space: nowrap;
    max-width: 90%;
    text-align: center;
  }
  .board-hint.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .grid-bg {
    position: absolute;
    inset: 8px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 4px;
  }
  .cell-bg {
    background: rgba(232, 220, 196, 0.06);
    border-radius: 3px;
  }
  .tiles {
    position: absolute;
    inset: 8px;
    pointer-events: none;
  }
  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    font-weight: 700;
    font-family: 'Georgia', 'STHeiti', sans-serif;
    letter-spacing: -1px;
    transition: transform 130ms ease-out, width 130ms ease-out, height 130ms ease-out;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
  }
  .tile.pop { animation: pop 200ms ease-out; }
  .tile.appear { animation: appear 200ms ease-out; }
  .tile.shake-x { animation: shakeX 320ms ease-out; }
  .tile.shake-y { animation: shakeY 320ms ease-out; }
  @keyframes pop { 0%{transform:var(--pos) scale(1);} 50%{transform:var(--pos) scale(1.1);} 100%{transform:var(--pos) scale(1);} }
  @keyframes appear { 0%{transform:var(--pos) scale(0); opacity:0;} 100%{transform:var(--pos) scale(1); opacity:1;} }
  @keyframes shakeX {
    0%,100% { transform: var(--pos); }
    15%,45%,75% { transform: var(--pos) translateX(-5px); }
    30%,60%,90% { transform: var(--pos) translateX(5px); }
  }
  @keyframes shakeY {
    0%,100% { transform: var(--pos); }
    15%,45%,75% { transform: var(--pos) translateY(-5px); }
    30%,60%,90% { transform: var(--pos) translateY(5px); }
  }
  .tile.sweeping { animation: sweepOut 420ms ease-out forwards; z-index: 5; }
  @keyframes sweepOut {
    0%   { opacity: 1; transform: var(--pos) scale(1); filter: brightness(1); }
    30%  { opacity: 1; transform: var(--pos) scale(1.1); filter: brightness(1.6) drop-shadow(0 0 8px #ff8848); }
    100% { opacity: 0; transform: var(--pos) scale(0.3); filter: brightness(2) drop-shadow(0 0 12px #ff5522); }
  }

  /* 1×1 colors (2-16) — bright */
  .tile-2    { background: #eee4da; color: #776e65; }
  .tile-4    { background: #ede0c8; color: #776e65; }
  .tile-8    { background: #f2b179; color: #f9f6f2; }
  .tile-16   { background: #f59563; color: #f9f6f2; }
  /* 2×1 (32-64) — horizontal bronze */
  .tile-32   { background: linear-gradient(90deg, #f67c5f, #c65a35); color: #f9f6f2; }
  .tile-64   { background: linear-gradient(90deg, #f65e3b, #a83f1c); color: #f9f6f2; }
  /* 2×2 (128-1024) — warm gold */
  .tile-128  { background: linear-gradient(135deg, #edcf72, #d4a544); color: #4a2f0f; }
  .tile-256  { background: linear-gradient(135deg, #edcc61, #c99632); color: #4a2f0f; }
  .tile-512  { background: linear-gradient(135deg, #edc850, #b8862a); color: #fff; }
  .tile-1024 { background: linear-gradient(180deg, #edc53f, #8a5a1e); color: #fff; }
  /* 3×3 (2048) — royal */
  .tile-2048 { background: linear-gradient(135deg, #ffd48a, #c17b52 60%, #7a3a10); color: #fff;
               box-shadow: 0 0 30px rgba(255, 200, 130, 0.6), 0 2px 8px rgba(0,0,0,0.4); }
  .tile-super { background: #3c3a32; color: #f9f6f2; }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .actions button {
    flex: 1;
    padding: 9px 0;
    background: transparent;
    border: 1px solid rgba(220, 180, 140, 0.35);
    color: rgba(232, 220, 196, 0.85);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .actions button:hover:not(:disabled) { background: rgba(220, 180, 140, 0.1); }
  .actions button:disabled { opacity: 0.35; cursor: not-allowed; }
  .actions button.primary { background: #ddb887; color: #2c1e14; border-color: #ddb887; font-weight: 700; }

  .hint {
    text-align: center;
    color: rgba(232, 220, 196, 0.4);
    font-size: 11px;
    letter-spacing: 1.5px;
    line-height: 1.6;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 8px;
    background: rgba(50, 30, 15, 0.85);
    backdrop-filter: blur(4px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    z-index: 20;
    border-radius: 3px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { color: #ffd48a; font-size: 28px; letter-spacing: 8px; margin-bottom: 10px; }
  .overlay p { color: rgba(232, 220, 196, 0.8); font-size: 13px; letter-spacing: 2px; margin-bottom: 20px; line-height: 1.7; }
  .overlay button {
    padding: 10px 22px;
    background: #ddb887;
    color: #2c1e14;
    border: none;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 3px;
    font-weight: 700;
  }
  .overlay button:hover { background: #c19b6a; }
  .overlay button.secondary { background: transparent; border: 1px solid #ddb887; color: #ddb887; }
  .overlay button.secondary:hover { background: rgba(220, 180, 140, 0.15); }
  .overlay-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  @media (max-width: 480px) {
    .container { padding: 16px 14px; }
    h1 { font-size: 22px; letter-spacing: 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <div class="header">
    <h1>合体·破阵</h1>
    <div class="scores">
      <div class="score-box"><span class="label">得分</span><span class="value" id="score">0</span></div>
      <div class="score-box"><span class="label">最高</span><span class="value" id="best">0</span></div>
    </div>
  </div>

  <div class="info" id="info">
    数字越大 · 占地越大 · <b>32</b>→2×1 · <b>128</b>→2×2 · <b>2048</b>→3×3 通关
  </div>

  <div class="actions">
    <button id="undoBtn" disabled>↩ 撤销</button>
    <button id="shuffleBtn" disabled title="随机重排所有方块（需要 256+）">洗 牌</button>
    <button id="sweepBtn" disabled title="清掉所有 ≤8 的小方块（需要 1024+）">焚 卒</button>
    <button id="restartBtn" class="primary">重开</button>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="grid-bg" id="gridBg"></div>
    <div class="tiles" id="tiles"></div>
    <div class="board-hint" id="boardHint"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">合体·破阵</h2>
      <p id="overlaySub">数字块滑动合并<br>合到 2048 通关</p>
      <div class="overlay-btns">
        <button id="continueBtn" class="secondary" style="display:none">继 续</button>
        <button id="startBtn">开 局</button>
      </div>
    </div>
  </div>

  <div class="hint">
    方向键 / WASD · 手机滑动棋盘
  </div>
</div>

<script>
const TUTORIAL_SIZE = 4;
const INITIAL_SIZE = 5;
const MAX_SIZE = 7;
const EXPAND_AT = { 128: 6, 512: 7 };  // value → new board size when this value first appears
let SIZE = INITIAL_SIZE;

// Tile size for a value
function sizeForValue(v) {
  if (v >= 2048) return { w: 3, h: 3 };
  if (v >= 1024) return { w: 2, h: 3 };
  if (v >= 128)  return { w: 2, h: 2 };
  if (v >= 32)   return { w: 2, h: 1 };
  return { w: 1, h: 1 };
}
function classForValue(v) {
  if (v > 2048) return 'tile-super';
  return `tile-${v}`;
}

// ============ State ============
let tiles;      // list of active tile objects
let grid;       // SIZE x SIZE array of tile refs (each cell)
let nextId;
let score, best;
let animating;
let won;        // "win overlay pending / active" — cleared when player picks 继续
let wonEver;    // "2048 has been reached this game" — prevents re-showing win overlay
let inTutorial; // first-time player is on the tutorial board
let history;    // for undo (snapshot before each move)

const boardWrap = document.getElementById('boardWrap');
const gridBg = document.getElementById('gridBg');
const tilesEl = document.getElementById('tiles');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const undoBtn = document.getElementById('undoBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const sweepBtn = document.getElementById('sweepBtn');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const startBtn = document.getElementById('startBtn');
const continueBtn = document.getElementById('continueBtn');
const infoEl = document.getElementById('info');
const boardHint = document.getElementById('boardHint');

let hintTimer = null;
function showHint(text, duration = 1600) {
  boardHint.textContent = text;
  boardHint.classList.add('show');
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => boardHint.classList.remove('show'), duration);
}
function hideHint() {
  boardHint.classList.remove('show');
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
}

function updateInfoText() {
  if (inTutorial) {
    infoEl.innerHTML = '教学·合出 <b>32</b> 结业&nbsp;·&nbsp;<span style="opacity:.65">数字变大占地更大，注意留空间</span>';
  } else {
    infoEl.innerHTML = '数字越大 · 占地越大 · <b>32</b>→2×1 · <b>128</b>→2×2 · <b>1024</b>→2×3 · <b>2048</b>→3×3 通关';
  }
}

function setBoardSize(freshFrom = null) {
  gridBg.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
  gridBg.style.gridTemplateRows = `repeat(${SIZE}, 1fr)`;
  gridBg.innerHTML = '';
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const c = document.createElement('div');
      c.className = 'cell-bg';
      if (freshFrom !== null && (x >= freshFrom || y >= freshFrom)) c.classList.add('fresh');
      gridBg.appendChild(c);
    }
  }
}

function expandBoard(targetSize) {
  if (SIZE >= targetSize) return;
  const oldSize = SIZE;
  SIZE = targetSize;
  // Preserve existing tile refs; grid grows to the right and bottom.
  const newGrid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  for (let y = 0; y < oldSize; y++)
    for (let x = 0; x < oldSize; x++)
      newGrid[y][x] = grid[y][x];
  grid = newGrid;
  setBoardSize(oldSize);
  boardWrap.classList.remove('expand');
  void boardWrap.offsetHeight;
  boardWrap.classList.add('expand');
}

function emptyGrid() {
  return Array.from({length: SIZE}, () => Array(SIZE).fill(null));
}

// ============ Grid ops ============
function placeOnGrid(t) {
  for (let dy = 0; dy < t.h; dy++)
    for (let dx = 0; dx < t.w; dx++)
      grid[t.y + dy][t.x + dx] = t;
}
function removeFromGrid(t) {
  for (let dy = 0; dy < t.h; dy++)
    for (let dx = 0; dx < t.w; dx++)
      if (grid[t.y + dy][t.x + dx] === t) grid[t.y + dy][t.x + dx] = null;
}
function canOccupy(x, y, w, h) {
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      const cx = x + dx, cy = y + dy;
      if (cx < 0 || cx >= SIZE || cy < 0 || cy >= SIZE) return false;
      if (grid[cy][cx]) return false;
    }
  }
  return true;
}

// Get the same-value tile in front of `t` in direction (dx, dy).
// Relaxed twice:
//   1. empty cells in the front row/col are skipped;
//   2. different-value tiles in the front are treated as "not the merge partner" — we
//      still merge as long as there is exactly one mergeable tile touching our edge.
// Walls still fail the whole check (an out-of-bounds front cell means we're at the edge).
function getFrontTile(t, dx, dy) {
  const cells = [];
  if (dx === 1) {
    for (let dyi = 0; dyi < t.h; dyi++) cells.push([t.x + t.w, t.y + dyi]);
  } else if (dx === -1) {
    for (let dyi = 0; dyi < t.h; dyi++) cells.push([t.x - 1, t.y + dyi]);
  } else if (dy === 1) {
    for (let dxi = 0; dxi < t.w; dxi++) cells.push([t.x + dxi, t.y + t.h]);
  } else if (dy === -1) {
    for (let dxi = 0; dxi < t.w; dxi++) cells.push([t.x + dxi, t.y - 1]);
  }
  const seen = new Set();
  for (const [cx, cy] of cells) {
    if (cx < 0 || cx >= SIZE || cy < 0 || cy >= SIZE) return null;  // wall
    const c = grid[cy][cx];
    if (c) seen.add(c);
  }
  const matches = [...seen].filter(c => canMerge(t, c));
  return matches.length === 1 ? matches[0] : null;
}

function canMerge(a, b) {
  return a.value === b.value && a.w === b.w && a.h === b.h;
}

// Find valid anchor for merged tile (size nw×nh) that covers frontTile's cells.
// Prefers keeping the collision-side edge pinned and growing back into the
// space the pusher came from, so the merge visually happens where you'd expect.
function pickAnchor(front, nw, nh, dx, dy) {
  const dxRange = nw - front.w;
  const dyRange = nh - front.h;
  // Parallel axis: pin the edge on the movement side (right edge when pushing right, etc.)
  // Perpendicular axis: default to front's top-left; fallback ranking handles the rest.
  const preferX = dx > 0 ? front.x + front.w - nw : front.x;
  const preferY = dy > 0 ? front.y + front.h - nh : front.y;
  if (canOccupy(preferX, preferY, nw, nh)) return { x: preferX, y: preferY };

  const candidates = [];
  for (let ay = front.y - dyRange; ay <= front.y; ay++) {
    for (let ax = front.x - dxRange; ax <= front.x; ax++) {
      if (ax === preferX && ay === preferY) continue;
      candidates.push({ x: ax, y: ay });
    }
  }
  candidates.sort((a, b) =>
    (Math.abs(a.x - preferX) + Math.abs(a.y - preferY)) -
    (Math.abs(b.x - preferX) + Math.abs(b.y - preferY))
  );
  for (const c of candidates) {
    if (canOccupy(c.x, c.y, nw, nh)) return c;
  }
  return null;
}

// ============ Move ============
const DIR_VECS = {
  up:    { dx: 0, dy: -1 },
  down:  { dx: 0, dy: 1 },
  left:  { dx: -1, dy: 0 },
  right: { dx: 1, dy: 0 },
};

function move(dir) {
  if (animating || overlay.classList.contains('show')) return;
  const { dx, dy } = DIR_VECS[dir];
  saveState();

  // Sort tiles: those "leading" the slide direction move first
  const sorted = [...tiles].sort((a, b) => {
    if (dx === 1)  return (b.x + b.w) - (a.x + a.w);
    if (dx === -1) return a.x - b.x;
    if (dy === 1)  return (b.y + b.h) - (a.y + a.h);
    if (dy === -1) return a.y - b.y;
    return 0;
  });

  let moved = false;
  let gain = 0;
  const mergedIds = new Set();  // survivors of a merge this turn (can't merge again)
  const failedMergeIds = new Set();  // tiles that tried to merge but no room for new size
  let triggerExpand = 0;  // 0 = no expand; otherwise the target board size
  let tutorialGraduated = false;

  for (const t of sorted) {
    if (t._removed) continue;
    let didMove = false;
    // Slide as far as possible
    while (true) {
      removeFromGrid(t);
      if (canOccupy(t.x + dx, t.y + dy, t.w, t.h)) {
        t.x += dx; t.y += dy;
        placeOnGrid(t);
        didMove = true;
      } else {
        placeOnGrid(t);
        break;
      }
    }
    // Try merge with front
    const front = getFrontTile(t, dx, dy);
    if (front && !front._removed && !mergedIds.has(front.id) && canMerge(t, front)) {
      const newV = t.value * 2;
      const ns = sizeForValue(newV);
      // Temporarily remove both from grid to check anchor
      removeFromGrid(t);
      removeFromGrid(front);
      const anchor = pickAnchor(front, ns.w, ns.h, dx, dy);
      if (anchor) {
        // Merge!
        t._removed = true;
        front.value = newV;
        front.w = ns.w;
        front.h = ns.h;
        front.x = anchor.x;
        front.y = anchor.y;
        placeOnGrid(front);
        mergedIds.add(front.id);
        gain += newV;
        didMove = true;
        if (EXPAND_AT[newV] && SIZE < EXPAND_AT[newV]) triggerExpand = EXPAND_AT[newV];
        if (newV === 2048 && !wonEver) { won = true; wonEver = true; }
        if (inTutorial && newV === 32) tutorialGraduated = true;
      } else {
        // Merge fails, put them back and mark for shake feedback
        placeOnGrid(t);
        placeOnGrid(front);
        failedMergeIds.add(t.id);
        failedMergeIds.add(front.id);
      }
    }
    if (didMove) moved = true;
  }

  tiles = tiles.filter(t => !t._removed);

  // Don't shake tiles that ended up successfully merging via another pairing
  for (const id of mergedIds) failedMergeIds.delete(id);
  const shake = failedMergeIds.size
    ? { ids: failedMergeIds, axis: dx !== 0 ? 'x' : 'y' }
    : null;

  if (!moved) {
    history.pop();
    updateUndoBtn();
    if (shake) {
      renderTiles(new Set(), false, shake);
      haptic(25);
      showHint('空间不足 · 升级需要更大空隙');
    }
    return;
  }

  score += gain;

  animating = true;
  renderTiles(mergedIds, false, shake);
  if (shake) { haptic(25); showHint('空间不足 · 升级需要更大空隙'); }
  updateScore();
  updateUndoBtn();

  setTimeout(() => {
    if (triggerExpand) expandBoard(triggerExpand);
    spawn();
    renderTiles(new Set(), true);  // second render to show new spawn
    animating = false;
    updateUndoBtn();
    updateItemBtns();
    if (won) showWin();
    else if (tutorialGraduated) showTutorialDone();
    else if (!hasMovesLeft()) showLose();
  }, 140);
}

function spawn() {
  const empties = [];
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (!grid[y][x]) empties.push({ x, y });
  if (empties.length === 0) return null;
  const { x, y } = empties[Math.floor(Math.random() * empties.length)];
  const value = Math.random() < 0.9 ? 2 : 4;
  const t = { id: nextId++, value, x, y, w: 1, h: 1, _new: true };
  tiles.push(t);
  placeOnGrid(t);
  return t;
}

function hasMovesLeft() {
  // Any empty cell?
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (!grid[y][x]) return true;
  // Any possible merge?
  for (const t of tiles) {
    for (const [dxs, dys] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const f = getFrontTile(t, dxs, dys);
      if (f && canMerge(t, f)) return true;
    }
  }
  return false;
}

// ============ Render ============
function renderTiles(mergedIds = new Set(), forceRefresh = false, shake = null) {
  const wrap = boardWrap.getBoundingClientRect();
  const boardW = wrap.width - 16;  // minus padding
  const cellSize = (boardW - (SIZE - 1) * 4) / SIZE;  // 4px gap
  const gap = 4;

  // Preserve existing DOM elements when possible
  const existing = new Map();
  tilesEl.querySelectorAll('.tile').forEach(el => existing.set(el.dataset.id, el));

  const seen = new Set();
  for (const t of tiles) {
    let el = existing.get(String(t.id));
    if (!el) {
      el = document.createElement('div');
      el.dataset.id = t.id;
      tilesEl.appendChild(el);
    }
    el.className = 'tile ' + classForValue(t.value);
    el.textContent = t.value;
    const tileW = t.w * cellSize + (t.w - 1) * gap;
    const tileH = t.h * cellSize + (t.h - 1) * gap;
    const px = t.x * (cellSize + gap);
    const py = t.y * (cellSize + gap);
    el.style.width = tileW + 'px';
    el.style.height = tileH + 'px';
    const minDim = Math.min(t.w, t.h);
    el.style.fontSize = Math.floor(cellSize * (minDim === 1 ? 0.5 : minDim === 2 ? 0.42 : 0.36)) + 'px';
    const posTr = `translate(${px}px, ${py}px)`;
    el.style.setProperty('--pos', posTr);
    el.style.transform = posTr;
    if (mergedIds.has(t.id)) {
      el.classList.remove('pop');
      void el.offsetHeight;
      el.classList.add('pop');
    }
    if (shake && shake.ids.has(t.id)) {
      el.classList.remove('shake-x', 'shake-y');
      void el.offsetHeight;
      el.classList.add('shake-' + shake.axis);
    }
    if (t._new) {
      el.classList.remove('appear');
      void el.offsetHeight;
      el.classList.add('appear');
      t._new = false;
    }
    seen.add(String(t.id));
  }
  // Remove elements for tiles that are gone
  for (const [id, el] of existing) {
    if (!seen.has(id)) el.remove();
  }
}

function updateScore() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('bestMerge', best);
  }
  bestEl.textContent = best;
}

function updateUndoBtn() {
  undoBtn.disabled = !history.length || animating;
}

function updateItemBtns() {
  const maxVal = tiles ? tiles.reduce((m, t) => Math.max(m, t.value), 0) : 0;
  shuffleBtn.disabled = animating || maxVal < 256;
  sweepBtn.disabled = animating || maxVal < 1024 || !tiles || !tiles.some(t => t.value <= 8);
}

// ============ Save / Undo ============
function saveState() {
  history.push({
    tiles: tiles.map(t => ({ id: t.id, value: t.value, x: t.x, y: t.y, w: t.w, h: t.h })),
    score,
    nextId,
    won,
    wonEver,
    size: SIZE,
  });
  if (history.length > 12) history.shift();
}
function undo() {
  if (!history.length || animating) return;
  const s = history.pop();
  tilesEl.innerHTML = '';
  if (s.size !== SIZE) {
    SIZE = s.size;
    setBoardSize();
  }
  grid = emptyGrid();
  tiles = s.tiles.map(t => ({...t}));
  for (const t of tiles) placeOnGrid(t);
  score = s.score;
  nextId = s.nextId;
  won = s.won;
  wonEver = s.wonEver;
  updateScore();
  renderTiles();
  updateUndoBtn();
  updateItemBtns();
  overlay.classList.remove('show');
}

// ============ Items ============
function sweep() {
  if (sweepBtn.disabled || animating) return;
  const doomed = tiles.filter(t => t.value <= 8);
  if (doomed.length === 0) return;
  saveState();
  animating = true;
  updateUndoBtn();
  updateItemBtns();
  for (const t of doomed) {
    const el = tilesEl.querySelector(`[data-id="${t.id}"]`);
    if (el) el.classList.add('sweeping');
  }
  haptic(20);
  setTimeout(() => {
    for (const t of doomed) removeFromGrid(t);
    tiles = tiles.filter(t => t.value > 8);
    animating = false;
    renderTiles();
    updateUndoBtn();
    updateItemBtns();
  }, 420);
}

function shuffle() {
  if (shuffleBtn.disabled || animating) return;
  // Dry-run placement on a scratch grid so we don't corrupt state on failure.
  const sorted = [...tiles].sort((a, b) => b.w * b.h - a.w * a.h);
  const scratch = emptyGrid();
  const newPos = new Map();
  for (const t of sorted) {
    const spots = [];
    for (let y = 0; y <= SIZE - t.h; y++) {
      for (let x = 0; x <= SIZE - t.w; x++) {
        let ok = true;
        for (let dy = 0; dy < t.h && ok; dy++)
          for (let dx = 0; dx < t.w && ok; dx++)
            if (scratch[y + dy][x + dx]) ok = false;
        if (ok) spots.push([x, y]);
      }
    }
    if (!spots.length) return;  // impossible; abort silently
    const [nx, ny] = spots[Math.floor(Math.random() * spots.length)];
    newPos.set(t.id, [nx, ny]);
    for (let dy = 0; dy < t.h; dy++)
      for (let dx = 0; dx < t.w; dx++)
        scratch[ny + dy][nx + dx] = t;
  }
  saveState();
  for (const t of tiles) {
    const [nx, ny] = newPos.get(t.id);
    t.x = nx;
    t.y = ny;
  }
  grid = scratch;
  haptic(15);
  renderTiles();
  updateUndoBtn();
  updateItemBtns();
}

// ============ Game control ============
function newGame() {
  inTutorial = !localStorage.getItem('mergeTutorialDone');
  SIZE = inTutorial ? TUTORIAL_SIZE : INITIAL_SIZE;
  setBoardSize();
  tiles = [];
  grid = emptyGrid();
  nextId = 1;
  score = 0;
  won = false;
  wonEver = false;
  history = [];
  animating = false;
  tilesEl.innerHTML = '';
  hideHint();
  spawn();
  spawn();
  renderTiles();
  updateScore();
  updateUndoBtn();
  updateItemBtns();
  updateInfoText();
  overlay.classList.remove('show');
}

function showTutorialDone() {
  overlayTitle.textContent = '出 师';
  overlaySub.innerHTML = `合出 <b style="color:#ffd48a">32</b>！<br>32 是 2×1，之后的升级会占更大空间<br>进入正式游戏 · 5×5 起`;
  startBtn.textContent = '开 始';
  startBtn.className = '';
  continueBtn.style.display = 'none';
  overlay.classList.add('show');
  localStorage.setItem('mergeTutorialDone', '1');
}

function showWin() {
  overlayTitle.textContent = '功 成';
  overlaySub.innerHTML = `你合出了 <b style="color:#ffd48a">2048 · 曹操</b><br>得分 ${score}<br>继续挑战更高分？`;
  startBtn.textContent = '再 来 一 局';
  startBtn.className = 'secondary';
  continueBtn.style.display = '';
  overlay.classList.add('show');
}
function showLose() {
  overlayTitle.textContent = '阵 破 我 败';
  overlaySub.innerHTML = `无路可走 · 得分 ${score}<br>再来一局？`;
  startBtn.textContent = '再 来 一 局';
  startBtn.className = '';
  continueBtn.style.display = 'none';
  overlay.classList.add('show');
}

// ============ Input ============
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
    w:'up', s:'down', a:'left', d:'right',
    W:'up', S:'down', A:'left', D:'right',
  };
  if (map[e.key]) { move(map[e.key]); e.preventDefault(); }
});
let touchStart = null;
boardWrap.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
boardWrap.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 24) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, { passive: true });

function haptic(ms = 12) { if (navigator.vibrate) navigator.vibrate(ms); }

document.getElementById('restartBtn').addEventListener('click', () => {
  if (tiles && tiles.length > 2 && !confirm('重开一局？')) return;
  newGame();
});
document.getElementById('undoBtn').addEventListener('click', undo);
shuffleBtn.addEventListener('click', shuffle);
sweepBtn.addEventListener('click', sweep);
startBtn.addEventListener('click', newGame);
continueBtn.addEventListener('click', () => {
  won = false;
  overlay.classList.remove('show');
});

window.addEventListener('resize', () => renderTiles());

// Boot
best = parseInt(localStorage.getItem('bestMerge') || '0', 10);
bestEl.textContent = best;
newGame();
</script>
