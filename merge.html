<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合体 · 破阵</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    background: #ede5d1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #3a3020;
    user-select: none;
    -webkit-user-select: none;
  }
  .container {
    max-width: 580px;
    width: 100%;
    background: #f7f1de;
    border-radius: 14px;
    padding: 24px 22px;
    border: 1px solid #e0d5b8;
  }
  .back-link {
    display: inline-block;
    color: #a89b7a;
    text-decoration: none;
    font-size: 12px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .back-link:hover { color: #5a4a2a; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  h1 {
    color: #3a3020;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .scores {
    display: flex;
    gap: 6px;
  }
  .score-box {
    background: #ede2c4;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    min-width: 58px;
  }
  .score-box .label {
    display: block;
    font-size: 9px;
    color: #9a8a68;
    letter-spacing: 1px;
    margin-bottom: 1px;
    text-transform: uppercase;
  }
  .score-box .value {
    display: block;
    font-size: 16px;
    color: #3a3020;
    font-weight: 700;
  }

  .info {
    color: #a08e6a;
    font-size: 11px;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .info b { color: #3a3020; font-weight: 600; }

  .board-wrap {
    position: relative;
    aspect-ratio: 1;
    background: #e5d9b4;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
    touch-action: none;
    transition: background-color 300ms ease, box-shadow 200ms ease, border-color 300ms ease;
  }
  .board-wrap.expand { animation: expandFlash 700ms ease-out; }
  @keyframes expandFlash {
    0%   { box-shadow: 0 0 0 rgba(0,0,0,0), inset 0 0 0 rgba(255,255,255,0); }
    30%  { box-shadow: 0 0 24px rgba(240, 180, 120, 0.35), inset 0 0 18px rgba(255, 240, 220, 0.55); }
    100% { box-shadow: 0 0 0 rgba(0,0,0,0), inset 0 0 0 rgba(255,255,255,0); }
  }
  .cell-bg.fresh { animation: freshCell 600ms ease-out; }
  @keyframes freshCell {
    0%   { background: rgba(240, 180, 120, 0.5); transform: scale(0.7); }
    60%  { background: rgba(240, 180, 120, 0.25); transform: scale(1.05); }
    100% { background: rgba(0, 0, 0, 0.05); transform: scale(1); }
  }
  .board-hint {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: #2a2a2a;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms, transform 220ms;
    z-index: 15;
    white-space: nowrap;
    max-width: 90%;
    text-align: center;
  }
  .board-hint.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .grid-bg {
    position: absolute;
    inset: 18px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 4px;
  }
  .cell-bg {
    background: rgba(255, 250, 235, 0.65);
    border-radius: 6px;
    box-shadow: inset 0 0 0 1px rgba(120, 90, 40, 0.14);
  }
  .tiles {
    position: absolute;
    inset: 18px;
    pointer-events: none;
  }
  .tile {
    position: absolute;
    transition: transform 150ms ease-out, width 150ms ease-out, height 150ms ease-out;
  }
  .tile-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .tile-num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 700;
    font-family: inherit;
    letter-spacing: -0.5px;
    pointer-events: none;
    z-index: 2;
  }
  .tile.pop { animation: pop 200ms ease-out; }
  .tile.appear { animation: appear 200ms ease-out; }
  .tile.shake-x { animation: shakeX 320ms ease-out; }
  .tile.shake-y { animation: shakeY 320ms ease-out; }
  @keyframes pop { 0%{transform:var(--pos) scale(1);} 50%{transform:var(--pos) scale(1.1);} 100%{transform:var(--pos) scale(1);} }
  @keyframes appear { 0%{transform:var(--pos) scale(0); opacity:0;} 100%{transform:var(--pos) scale(1); opacity:1;} }
  @keyframes shakeX {
    0%,100% { transform: var(--pos); }
    15%,45%,75% { transform: var(--pos) translateX(-5px); }
    30%,60%,90% { transform: var(--pos) translateX(5px); }
  }
  @keyframes shakeY {
    0%,100% { transform: var(--pos); }
    15%,45%,75% { transform: var(--pos) translateY(-5px); }
    30%,60%,90% { transform: var(--pos) translateY(5px); }
  }
  .tile.sweeping { animation: sweepOut 420ms ease-out forwards; z-index: 5; }
  @keyframes sweepOut {
    0%   { opacity: 1; transform: var(--pos) scale(1); filter: brightness(1); }
    30%  { opacity: 1; transform: var(--pos) scale(1.1); filter: brightness(1.6) drop-shadow(0 0 8px #ff8848); }
    100% { opacity: 0; transform: var(--pos) scale(0.3); filter: brightness(2) drop-shadow(0 0 12px #ff5522); }
  }

  /* Invalid-direction board shake — different keyframes per axis */
  .board-wrap.bump-left  { animation: bumpLeft  180ms ease-out; }
  .board-wrap.bump-right { animation: bumpRight 180ms ease-out; }
  .board-wrap.bump-up    { animation: bumpUp    180ms ease-out; }
  .board-wrap.bump-down  { animation: bumpDown  180ms ease-out; }
  @keyframes bumpLeft  { 0%,100%{transform:translateX(0);} 40%{transform:translateX(-3px);} 70%{transform:translateX(1px);} }
  @keyframes bumpRight { 0%,100%{transform:translateX(0);} 40%{transform:translateX(3px);} 70%{transform:translateX(-1px);} }
  @keyframes bumpUp    { 0%,100%{transform:translateY(0);} 40%{transform:translateY(-3px);} 70%{transform:translateY(1px);} }
  @keyframes bumpDown  { 0%,100%{transform:translateY(0);} 40%{transform:translateY(3px);} 70%{transform:translateY(-1px);} }

  /* Full-board warning: level 1 pulse (few empties left) */
  .board-wrap.warn-pulse { animation: warnPulse 1600ms ease-in-out infinite; }
  @keyframes warnPulse {
    0%,100% { box-shadow: 0 0 0 rgba(200, 80, 60, 0); }
    50%     { box-shadow: 0 0 22px rgba(200, 80, 60, 0.35), inset 0 0 18px rgba(200, 80, 60, 0.15); }
  }

  /* Score reflection */
  .score-fly {
    position: absolute;
    pointer-events: none;
    font-family: inherit;
    font-weight: 800;
    font-size: 18px;
    color: #c94a2a;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7), 0 0 8px rgba(255, 220, 160, 0.6);
    z-index: 20;
    animation: scoreFly 700ms ease-out forwards;
    letter-spacing: 0;
  }
  @keyframes scoreFly {
    0%   { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
    20%  { opacity: 1; transform: translate(-50%, -6px) scale(1.05); }
    100% { opacity: 0; transform: translate(-50%, -40px) scale(0.95); }
  }
  .score-box.flash-record {
    animation: recordFlash 520ms ease-out;
  }
  @keyframes recordFlash {
    0%   { transform: scale(1); box-shadow: 0 0 0 rgba(255, 200, 130, 0); background: #ede2c4; }
    40%  { transform: scale(1.14); box-shadow: 0 0 20px rgba(255, 200, 130, 0.7); background: #ffe8b8; }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 200, 130, 0); background: #ede2c4; }
  }

  /* Only 2048 keeps a special glow — colors otherwise come from SVG fills */
  .tile-2048 { filter: drop-shadow(0 0 20px rgba(240, 180, 120, 0.5)); }

  /* Small single-item tiles feel too big at native scale — pull them in */
  .tile-2 .tile-img { transform: scale(0.72); }
  .tile-4 .tile-img { transform: scale(0.75); }
  .tile-8 .tile-img { transform: scale(0.8); }
  .tile-128 .tile-img { transform: scale(0.85); }

  .actions {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .actions button {
    flex: 1;
    padding: 10px 0;
    background: #faf4e0;
    border: 1px solid #d8ccae;
    color: #5a4a2a;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.12s;
  }
  .actions button:hover:not(:disabled) { background: #f0e6c8; border-color: #b8a878; }
  .actions button:disabled { opacity: 0.35; cursor: not-allowed; }
  .actions button.primary {
    background: #5a4a2a;
    color: #f7f1de;
    border-color: #5a4a2a;
    font-weight: 600;
  }
  .actions button.primary:hover:not(:disabled) { background: #3a3020; }

  .hint {
    text-align: center;
    color: #b8a878;
    font-size: 11px;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 18px;
    background: rgba(247, 241, 222, 0.94);
    backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    z-index: 20;
    border-radius: 6px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { color: #3a3020; font-size: 26px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
  .overlay p { color: #7a6a4a; font-size: 13px; letter-spacing: 0.5px; margin-bottom: 22px; line-height: 1.7; }
  .overlay button {
    padding: 10px 22px;
    background: #5a4a2a;
    color: #f7f1de;
    border: none;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
  }
  .overlay button:hover { background: #3a3020; }
  .overlay button.secondary { background: transparent; border: 1px solid #5a4a2a; color: #5a4a2a; }
  .overlay button.secondary:hover { background: #f0e6c8; }
  .overlay-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* ============ 3D mode (isometric image tiles) ============ */
  .tile-img {
    display: block;
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  .tile-label {
    position: absolute;
    top: 3px;
    left: 5px;
    background: rgba(58, 48, 32, 0.78);
    color: #faf5e8;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 8px;
    pointer-events: none;
    letter-spacing: 0.5px;
    z-index: 3;
  }

  /* Mode picker overlay content */
  .mode-picker {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .mode-card {
    background: #faf4e0;
    border: 2px solid #d8ccae;
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 120px;
    text-align: center;
    color: #3a3020;
  }
  .mode-card:hover { border-color: #5a4a2a; background: #f0e6c8; transform: translateY(-2px); }
  .mode-card h3 { font-size: 16px; margin-bottom: 6px; font-weight: 700; letter-spacing: 2px; }
  .mode-card p { font-size: 11px; color: #7a6a4a; letter-spacing: 0.5px; margin: 0; }

  /* Topbar with back link + mode toggle */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .mode-toggle {
    color: #a89b7a;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .mode-toggle:hover { color: #5a4a2a; }

  @media (max-width: 480px) {
    body { padding: 8px 0 0; background: #f7f1de; align-items: flex-start; }
    .container {
      padding: 10px 10px 12px;
      border-radius: 0;
      border: none;
      max-width: 100%;
    }
    .topbar { margin-bottom: 4px; }
    .back-link, .mode-toggle { font-size: 11px; }
    .header { margin-bottom: 8px; }
    h1 { font-size: 17px; letter-spacing: 1px; }
    .score-box { padding: 4px 8px; min-width: 52px; }
    .score-box .label { font-size: 8px; }
    .score-box .value { font-size: 14px; }
    .actions { margin-bottom: 8px; gap: 5px; }
    .actions button { padding: 8px 0; font-size: 12px; letter-spacing: 0.5px; }
    .board-wrap { border-radius: 6px; margin-bottom: 6px; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="index.html" class="back-link">← 返回荔枝游戏</a>
    <a href="javascript:void(0)" id="modeToggle" class="mode-toggle">切换视觉</a>
  </div>
  <div class="header">
    <h1>合体·破阵</h1>
    <div class="scores">
      <div class="score-box"><span class="label">得分</span><span class="value" id="score">0</span></div>
      <div class="score-box"><span class="label">最高</span><span class="value" id="best">0</span></div>
    </div>
  </div>

  <div class="actions">
    <button id="undoBtn" disabled>↩ 撤销</button>
    <button id="shuffleBtn" disabled title="随机重排所有方块（需要 256+）">洗 牌</button>
    <button id="sweepBtn" disabled title="清掉所有 ≤8 的小方块（需要 1024+）">焚 卒</button>
    <button id="restartBtn" class="primary">重开</button>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="grid-bg" id="gridBg"></div>
    <div class="tiles" id="tiles"></div>
    <div class="board-hint" id="boardHint"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">合体·破阵</h2>
      <p id="overlaySub">数字块滑动合并<br>合到 2048 通关</p>
      <div class="overlay-btns" id="overlayBtns">
        <button id="continueBtn" class="secondary" style="display:none">继 续</button>
        <button id="startBtn">开 局</button>
      </div>
      <div class="mode-picker" id="modePickerBox" style="display:none">
        <div class="mode-card" data-mode="flat">
          <h3>扁 平</h3>
          <p>拼图 · 极简</p>
        </div>
        <div class="mode-card" data-mode="3d">
          <h3>人 间</h3>
          <p>三国建筑</p>
        </div>
        <div class="mode-card" data-mode="immortal">
          <h3>仙 界</h3>
          <p>修仙场景</p>
        </div>
        <div class="mode-card" data-mode="suzhou">
          <h3>苏 州</h3>
          <p>园林水乡</p>
        </div>
        <div class="mode-card" data-mode="shop">
          <h3>小 店</h3>
          <p>老街商铺</p>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    方向键 / WASD · 手机滑动棋盘
  </div>
</div>

<script>
const TUTORIAL_SIZE = 4;
const INITIAL_SIZE = 5;
const MAX_SIZE = 8;
const EXPAND_AT = { 128: 6, 512: 7 };  // value → new board size when this value first appears
let SIZE = INITIAL_SIZE;

// Tile size for a value
function sizeForValue(v) {
  if (v >= 2048) return { w: 3, h: 3 };
  if (v >= 1024) return { w: 2, h: 3 };
  if (v >= 128)  return { w: 2, h: 2 };
  if (v >= 32)   return { w: 2, h: 1 };
  if (v >= 16)   return { w: 1, h: 2 };
  return { w: 1, h: 1 };
}
function classForValue(v) {
  if (v > 2048) return 'tile-super';
  return `tile-${v}`;
}

// ============ Jigsaw-piece rendering ============
const TIER_STYLE = {
  2:    { c1:'#e8e4d8', txt:'#6b6455' },
  4:    { c1:'#dcd0b3', txt:'#6b6455' },
  8:    { c1:'#f4b382', txt:'#ffffff' },
  16:   { c1:'#ef9557', txt:'#ffffff' },
  32:   { c1:'#ea7a3f', txt:'#ffffff' },
  64:   { c1:'#d5522a', txt:'#ffffff' },
  128:  { c1:'#f5cc4d', txt:'#5a3f0f' },
  256:  { c1:'#eeba28', txt:'#5a3f0f' },
  512:  { c1:'#d9a422', txt:'#ffffff' },
  1024: { c1:'#b88618', txt:'#ffffff' },
  2048: { c1:'#c94a2a', txt:'#ffffff' },
};
const SUPER_STYLE = { c1:'#2a2a2a', txt:'#ffffff' };
function tierStyleFor(v) { return TIER_STYLE[v] || SUPER_STYLE; }

// Per-value knob/slot pattern so identical values look identical, adjacent values differ.
// +1 = knob out, -1 = slot in.
const SIDES_TABLE = [
  { top:+1, right:-1, bottom:+1, left:-1 },
  { top:-1, right:+1, bottom:-1, left:+1 },
  { top:+1, right:+1, bottom:-1, left:-1 },
  { top:-1, right:-1, bottom:+1, left:+1 },
];
function sidesForValue(v) {
  if (v >= 2048) return null;  // smooth "completed puzzle" edge
  return SIDES_TABLE[Math.log2(v) % SIDES_TABLE.length];
}

function piecePath(w, h, sides, cells, K, N) {
  if (!sides) {
    const r = Math.min(w, h) * 0.09;
    return `M ${r} 0 L ${w-r} 0 Q ${w} 0, ${w} ${r} L ${w} ${h-r} Q ${w} ${h}, ${w-r} ${h} L ${r} ${h} Q 0 ${h}, 0 ${h-r} L 0 ${r} Q 0 0, ${r} 0 Z`;
  }
  const parts = ['M 0 0'];
  // TOP: cells.w bumps, left-to-right
  for (let i = 0; i < cells.w; i++) {
    const cx = w * (i + 0.5) / cells.w;
    parts.push(`L ${cx - N} 0`);
    parts.push(`C ${cx - N} ${-sides.top*K}, ${cx + N} ${-sides.top*K}, ${cx + N} 0`);
  }
  parts.push(`L ${w} 0`);
  // RIGHT: cells.h bumps, top-to-bottom
  for (let i = 0; i < cells.h; i++) {
    const cy = h * (i + 0.5) / cells.h;
    parts.push(`L ${w} ${cy - N}`);
    parts.push(`C ${w + sides.right*K} ${cy - N}, ${w + sides.right*K} ${cy + N}, ${w} ${cy + N}`);
  }
  parts.push(`L ${w} ${h}`);
  // BOTTOM: cells.w bumps, right-to-left
  for (let i = cells.w - 1; i >= 0; i--) {
    const cx = w * (i + 0.5) / cells.w;
    parts.push(`L ${cx + N} ${h}`);
    parts.push(`C ${cx + N} ${h + sides.bottom*K}, ${cx - N} ${h + sides.bottom*K}, ${cx - N} ${h}`);
  }
  parts.push(`L 0 ${h}`);
  // LEFT: cells.h bumps, bottom-to-top
  for (let i = cells.h - 1; i >= 0; i--) {
    const cy = h * (i + 0.5) / cells.h;
    parts.push(`L 0 ${cy + N}`);
    parts.push(`C ${-sides.left*K} ${cy + N}, ${-sides.left*K} ${cy - N}, 0 ${cy - N}`);
  }
  parts.push('Z');
  return parts.join(' ');
}

function buildTileSVG(t, tileW, tileH) {
  const style = tierStyleFor(t.value);
  const sides = sidesForValue(t.value);
  const isSmooth = !sides;
  // Knob size derived from a single cell so all tiles have consistent bumps
  const cellUnit = Math.min(tileW / t.w, tileH / t.h);
  const K = isSmooth ? 0 : cellUnit * 0.10;
  const N = cellUnit * 0.07;
  const inset = isSmooth ? 3 : Math.ceil(K);
  const bodyW = tileW - inset * 2;
  const bodyH = tileH - inset * 2;
  const path = piecePath(bodyW, bodyH, isSmooth ? null : sides, {w: t.w, h: t.h}, K, N);
  return `<svg class="tile-svg" viewBox="0 0 ${tileW} ${tileH}" preserveAspectRatio="none">`
    + `<g transform="translate(${inset} ${inset})">`
    + `<path d="${path}" fill="${style.c1}"/>`
    + `</g></svg>`;
}

// ============ State ============
let tiles;      // list of active tile objects
let grid;       // SIZE x SIZE array of tile refs (each cell)
let nextId;
let score, best;
let animating;
let won;        // "win overlay pending / active" — cleared when player picks 继续
let wonEver;    // "2048 has been reached this game" — prevents re-showing win overlay
let inTutorial; // first-time player is on the tutorial board
let renderMode; // 'flat' (SVG jigsaw) | '3d' (isometric image tiles)
let history;    // for undo (snapshot before each move)

const boardWrap = document.getElementById('boardWrap');
const gridBg = document.getElementById('gridBg');
const tilesEl = document.getElementById('tiles');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const undoBtn = document.getElementById('undoBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const sweepBtn = document.getElementById('sweepBtn');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const startBtn = document.getElementById('startBtn');
const continueBtn = document.getElementById('continueBtn');
const infoEl = null;

function updateInfoText() { /* info bar removed for cleaner UI */ }
const boardHint = document.getElementById('boardHint');

let hintTimer = null;
function showHint(text, duration = 1600) {
  boardHint.textContent = text;
  boardHint.classList.add('show');
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => boardHint.classList.remove('show'), duration);
}
function hideHint() {
  boardHint.classList.remove('show');
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
}


function setBoardSize(freshFrom = null) {
  gridBg.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
  gridBg.style.gridTemplateRows = `repeat(${SIZE}, 1fr)`;
  gridBg.innerHTML = '';
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const c = document.createElement('div');
      c.className = 'cell-bg';
      if (freshFrom !== null && (x >= freshFrom || y >= freshFrom)) c.classList.add('fresh');
      gridBg.appendChild(c);
    }
  }
}

function expandBoard(targetSize) {
  if (SIZE >= targetSize) return;
  const oldSize = SIZE;
  SIZE = targetSize;
  // Preserve existing tile refs; grid grows to the right and bottom.
  const newGrid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  for (let y = 0; y < oldSize; y++)
    for (let x = 0; x < oldSize; x++)
      newGrid[y][x] = grid[y][x];
  grid = newGrid;
  setBoardSize(oldSize);
  boardWrap.classList.remove('expand');
  void boardWrap.offsetHeight;
  boardWrap.classList.add('expand');
}

function emptyGrid() {
  return Array.from({length: SIZE}, () => Array(SIZE).fill(null));
}

// ============ Grid ops ============
function placeOnGrid(t) {
  for (let dy = 0; dy < t.h; dy++)
    for (let dx = 0; dx < t.w; dx++)
      grid[t.y + dy][t.x + dx] = t;
}
function removeFromGrid(t) {
  for (let dy = 0; dy < t.h; dy++)
    for (let dx = 0; dx < t.w; dx++)
      if (grid[t.y + dy][t.x + dx] === t) grid[t.y + dy][t.x + dx] = null;
}
function canOccupy(x, y, w, h) {
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      const cx = x + dx, cy = y + dy;
      if (cx < 0 || cx >= SIZE || cy < 0 || cy >= SIZE) return false;
      if (grid[cy][cx]) return false;
    }
  }
  return true;
}

// Get the same-value tile in front of `t` in direction (dx, dy).
// Relaxed twice:
//   1. empty cells in the front row/col are skipped;
//   2. different-value tiles in the front are treated as "not the merge partner" — we
//      still merge as long as there is exactly one mergeable tile touching our edge.
// Walls still fail the whole check (an out-of-bounds front cell means we're at the edge).
function getFrontTile(t, dx, dy) {
  const cells = [];
  if (dx === 1) {
    for (let dyi = 0; dyi < t.h; dyi++) cells.push([t.x + t.w, t.y + dyi]);
  } else if (dx === -1) {
    for (let dyi = 0; dyi < t.h; dyi++) cells.push([t.x - 1, t.y + dyi]);
  } else if (dy === 1) {
    for (let dxi = 0; dxi < t.w; dxi++) cells.push([t.x + dxi, t.y + t.h]);
  } else if (dy === -1) {
    for (let dxi = 0; dxi < t.w; dxi++) cells.push([t.x + dxi, t.y - 1]);
  }
  const seen = new Set();
  for (const [cx, cy] of cells) {
    if (cx < 0 || cx >= SIZE || cy < 0 || cy >= SIZE) return null;  // wall
    const c = grid[cy][cx];
    if (c) seen.add(c);
  }
  const matches = [...seen].filter(c => canMerge(t, c));
  return matches.length === 1 ? matches[0] : null;
}

function canMerge(a, b) {
  return a.value === b.value && a.w === b.w && a.h === b.h;
}

// Find valid anchor for merged tile (size nw×nh) covering (at least part of) frontTile.
// Handles any shape transition: growth, shrinkage on some axis, or rotation
// (e.g. 1×2 + 1×2 → 2×1). Prefers pinning the collision-side edge of the front.
function pickAnchor(front, nw, nh, dx, dy) {
  // Anchor range where the new tile OVERLAPS with the front (integer positions).
  const xMin = front.x - nw + 1;
  const xMax = front.x + front.w - 1;
  const yMin = front.y - nh + 1;
  const yMax = front.y + front.h - 1;

  // Preferred anchor: pin the edge on the movement side.
  let preferX, preferY;
  if (dx > 0)      preferX = front.x + front.w - nw;
  else if (dx < 0) preferX = front.x;
  else             preferX = front.x;
  // Vertical: if the shape shrinks vertically (e.g. 1×2 → 2×1), always
  // land at the bottom of the merge zone regardless of push direction.
  if (nh < front.h) preferY = front.y + front.h - nh;
  else if (dy > 0)  preferY = front.y + front.h - nh;
  else if (dy < 0)  preferY = front.y;
  else              preferY = front.y;
  // Clamp preferred into the overlap range (needed for shape changes that shrink an axis).
  preferX = Math.max(xMin, Math.min(xMax, preferX));
  preferY = Math.max(yMin, Math.min(yMax, preferY));

  if (canOccupy(preferX, preferY, nw, nh)) return { x: preferX, y: preferY };

  const candidates = [];
  for (let ay = yMin; ay <= yMax; ay++) {
    for (let ax = xMin; ax <= xMax; ax++) {
      if (ax === preferX && ay === preferY) continue;
      candidates.push({ x: ax, y: ay });
    }
  }
  candidates.sort((a, b) =>
    (Math.abs(a.x - preferX) + Math.abs(a.y - preferY)) -
    (Math.abs(b.x - preferX) + Math.abs(b.y - preferY))
  );
  for (const c of candidates) {
    if (canOccupy(c.x, c.y, nw, nh)) return c;
  }
  return null;
}

// ============ Move ============
const DIR_VECS = {
  up:    { dx: 0, dy: -1 },
  down:  { dx: 0, dy: 1 },
  left:  { dx: -1, dy: 0 },
  right: { dx: 1, dy: 0 },
};

function move(dir) {
  if (animating || overlay.classList.contains('show')) return;
  const { dx, dy } = DIR_VECS[dir];
  saveState();

  // Sort tiles: those "leading" the slide direction move first
  const sorted = [...tiles].sort((a, b) => {
    if (dx === 1)  return (b.x + b.w) - (a.x + a.w);
    if (dx === -1) return a.x - b.x;
    if (dy === 1)  return (b.y + b.h) - (a.y + a.h);
    if (dy === -1) return a.y - b.y;
    return 0;
  });

  let moved = false;
  let gain = 0;
  const mergedIds = new Set();  // survivors of a merge this turn (can't merge again)
  const failedMergeIds = new Set();  // tiles that tried to merge but no room for new size
  const mergeEvents = [];  // {x, y, w, h, gain, value} — for score fly-ups & max tracking
  let triggerExpand = 0;  // 0 = no expand; otherwise the target board size
  let tutorialGraduated = false;

  for (const t of sorted) {
    if (t._removed) continue;
    let didMove = false;
    // Slide as far as possible
    while (true) {
      removeFromGrid(t);
      if (canOccupy(t.x + dx, t.y + dy, t.w, t.h)) {
        t.x += dx; t.y += dy;
        placeOnGrid(t);
        didMove = true;
      } else {
        placeOnGrid(t);
        break;
      }
    }
    // Try merge with front
    const front = getFrontTile(t, dx, dy);
    if (front && !front._removed && !mergedIds.has(front.id) && canMerge(t, front)) {
      const newV = t.value * 2;
      const ns = sizeForValue(newV);
      // Temporarily remove both from grid to check anchor
      removeFromGrid(t);
      removeFromGrid(front);
      const anchor = pickAnchor(front, ns.w, ns.h, dx, dy);
      if (anchor) {
        // Merge!
        t._removed = true;
        front.value = newV;
        front.w = ns.w;
        front.h = ns.h;
        front.x = anchor.x;
        front.y = anchor.y;
        placeOnGrid(front);
        mergedIds.add(front.id);
        gain += newV;
        mergeEvents.push({ x: anchor.x, y: anchor.y, w: ns.w, h: ns.h, gain: newV, value: newV });
        didMove = true;
        if (EXPAND_AT[newV] && SIZE < EXPAND_AT[newV]) triggerExpand = EXPAND_AT[newV];
        if (newV === 2048 && !wonEver) { won = true; wonEver = true; }
        if (inTutorial && newV === 32) tutorialGraduated = true;
      } else {
        // Merge fails, put them back and mark for shake feedback
        placeOnGrid(t);
        placeOnGrid(front);
        failedMergeIds.add(t.id);
        failedMergeIds.add(front.id);
      }
    }
    if (didMove) moved = true;
  }

  tiles = tiles.filter(t => !t._removed);

  // Don't shake tiles that ended up successfully merging via another pairing
  for (const id of mergedIds) failedMergeIds.delete(id);
  const shake = failedMergeIds.size
    ? { ids: failedMergeIds, axis: dx !== 0 ? 'x' : 'y' }
    : null;

  if (!moved) {
    history.pop();
    updateUndoBtn();
    if (shake) {
      renderTiles(new Set(), false, shake);
      haptic(25);
      showHint('空间不足 · 升级需要更大空隙');
    } else {
      // Nothing moved AND nothing tried to merge → block direction, bump the board
      bumpBoard(dir);
    }
    return;
  }

  score += gain;

  animating = true;
  renderTiles(mergedIds, false, shake);

  // Fly-up "+N" scores at each merge location + tiered haptic
  const wrap = boardWrap.getBoundingClientRect();
  const boardW = wrap.width - 36;
  const cellSize = (boardW - (SIZE - 1) * 4) / SIZE;
  const gap = 4;
  for (const ev of mergeEvents) {
    flyScore(ev.gain, ev.x + ev.w / 2 - 0.5, ev.y + ev.h / 2 - 0.5, cellSize, gap);
  }
  // Haptic tiers: 10ms per merge, 30ms if multi (2+), 50ms if any merge ≥ 128
  if (mergeEvents.length) {
    const maxThisTurn = Math.max(...mergeEvents.map(e => e.value));
    if (maxThisTurn >= 128) haptic(50);
    else if (mergeEvents.length >= 2) haptic(30);
    else haptic(10);
  }

  if (shake) { haptic(25); showHint('空间不足 · 升级需要更大空隙'); }
  updateScore();
  updateUndoBtn();

  setTimeout(() => {
    if (triggerExpand) expandBoard(triggerExpand);
    spawn();
    renderTiles(new Set(), true);  // second render to show new spawn
    animating = false;
    updateUndoBtn();
    updateItemBtns();
    updateBoardWarning();
    if (won) showWin();
    else if (tutorialGraduated) showTutorialDone();
    else if (!hasMovesLeft()) { haptic(50); showLose(); }
  }, 140);
}

function spawn() {
  const empties = [];
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (!grid[y][x]) empties.push({ x, y });
  if (empties.length === 0) return null;
  const { x, y } = empties[Math.floor(Math.random() * empties.length)];
  // After 2048 has been reached, spawns include occasional 8s for a stronger late game.
  let value;
  if (wonEver) {
    const r = Math.random();
    value = r < 0.6 ? 2 : r < 0.85 ? 4 : 8;
  } else {
    value = Math.random() < 0.9 ? 2 : 4;
  }
  const t = { id: nextId++, value, x, y, w: 1, h: 1, _new: true };
  tiles.push(t);
  placeOnGrid(t);
  return t;
}

function hasMovesLeft() {
  // Any empty cell?
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (!grid[y][x]) return true;
  // Any possible merge?
  for (const t of tiles) {
    for (const [dxs, dys] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const f = getFrontTile(t, dxs, dys);
      if (f && canMerge(t, f)) return true;
    }
  }
  return false;
}

// Count empty cells (for the full-board warning)
function countEmptyCells() {
  let n = 0;
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (!grid[y][x]) n++;
  return n;
}
function updateBoardWarning() {
  // Level-1 warning: crowded (≤ 2 empty cells) but game not yet lost
  const empties = countEmptyCells();
  const crowded = empties <= 2 && empties > 0 && hasMovesLeft();
  boardWrap.classList.toggle('warn-pulse', crowded);
}

// ============ Render ============
function renderTiles(mergedIds = new Set(), forceRefresh = false, shake = null) {
  const wrap = boardWrap.getBoundingClientRect();
  const boardW = wrap.width - 36;  // minus board padding on both sides
  const cellSize = (boardW - (SIZE - 1) * 4) / SIZE;  // 4px gap
  const gap = 4;

  // Preserve existing DOM elements when possible
  const existing = new Map();
  tilesEl.querySelectorAll('.tile').forEach(el => existing.set(el.dataset.id, el));

  const seen = new Set();
  for (const t of tiles) {
    let el = existing.get(String(t.id));
    if (!el) {
      el = document.createElement('div');
      el.dataset.id = t.id;
      tilesEl.appendChild(el);
    }
    el.className = 'tile ' + classForValue(t.value);
    const tileW = t.w * cellSize + (t.w - 1) * gap;
    const tileH = t.h * cellSize + (t.h - 1) * gap;
    const minDim = Math.min(t.w, t.h);
    const fs = Math.floor(cellSize * (minDim === 1 ? 0.55 : minDim === 2 ? 0.48 : 0.42));

    // Regenerate content only when value/shape/rendered-size/mode changes.
    const rk = `${renderMode}|${t.value}|${t.w}|${t.h}|${Math.round(tileW)}|${Math.round(tileH)}`;
    if (el.dataset.rk !== rk) {
      if (renderMode === '3d' || renderMode === 'immortal' || renderMode === 'suzhou' || renderMode === 'shop') {
        const dir = renderMode === 'immortal' ? 'merge-immortal-assets'
                  : renderMode === 'suzhou'   ? 'merge-suzhou-assets'
                  : renderMode === 'shop'     ? 'merge-shop-assets'
                  : 'merge3d-assets';
        const MAX_IMG_TIER = 8192;
        const imgVal = t.value <= MAX_IMG_TIER ? t.value : MAX_IMG_TIER;
        el.innerHTML = `<img class="tile-img" src="${dir}/tile-${imgVal}.webp?v=26" draggable="false" alt="${t.value}"><span class="tile-label">${t.value}</span>`;
      } else {
        el.innerHTML = buildTileSVG(t, tileW, tileH) + '<span class="tile-num"></span>';
      }
      el.dataset.rk = rk;
    }
    if (renderMode !== '3d' && renderMode !== 'immortal' && renderMode !== 'suzhou' && renderMode !== 'shop') {
      const style = tierStyleFor(t.value);
      const numEl = el.querySelector('.tile-num');
      numEl.textContent = t.value;
      numEl.style.color = style.txt;
      numEl.style.fontSize = fs + 'px';
    }

    const px = t.x * (cellSize + gap);
    const py = t.y * (cellSize + gap);
    el.style.width = tileW + 'px';
    el.style.height = tileH + 'px';
    const posTr = `translate(${px}px, ${py}px)`;
    el.style.setProperty('--pos', posTr);
    el.style.transform = posTr;
    if (mergedIds.has(t.id)) {
      el.classList.remove('pop');
      void el.offsetHeight;
      el.classList.add('pop');
    }
    if (shake && shake.ids.has(t.id)) {
      el.classList.remove('shake-x', 'shake-y');
      void el.offsetHeight;
      el.classList.add('shake-' + shake.axis);
    }
    if (t._new) {
      el.classList.remove('appear');
      void el.offsetHeight;
      el.classList.add('appear');
      t._new = false;
    }
    seen.add(String(t.id));
  }
  // Remove elements for tiles that are gone
  for (const [id, el] of existing) {
    if (!seen.has(id)) el.remove();
  }
}

// ============ Score reflection (rolling + floating +N + record flash) ============
let displayedScore = 0;
let scoreAnimHandle = null;
function updateScore() {
  // Roll displayed score toward `score` (200 ms lerp)
  if (scoreAnimHandle) cancelAnimationFrame(scoreAnimHandle);
  const from = displayedScore;
  const to = score;
  const start = performance.now();
  const dur = 200;
  const step = (now) => {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 2);
    const val = Math.round(from + (to - from) * eased);
    scoreEl.textContent = val;
    if (t < 1) scoreAnimHandle = requestAnimationFrame(step);
    else { displayedScore = to; scoreAnimHandle = null; }
  };
  scoreAnimHandle = requestAnimationFrame(step);

  // Record break — flash the "最高" box the moment we surpass it
  if (score > best) {
    best = score;
    localStorage.setItem('bestMerge', best);
    bestEl.textContent = best;
    const bestBox = bestEl.closest('.score-box');
    if (bestBox) {
      bestBox.classList.remove('flash-record');
      void bestBox.offsetHeight;
      bestBox.classList.add('flash-record');
    }
  } else {
    bestEl.textContent = best;
  }
}

function flyScore(gain, cellX, cellY, cellSize, gap) {
  if (!gain) return;
  const wrap = boardWrap.getBoundingClientRect();
  const boardRect = tilesEl.getBoundingClientRect();
  const originX = boardRect.left - wrap.left + cellX * (cellSize + gap) + cellSize / 2;
  const originY = boardRect.top  - wrap.top  + cellY * (cellSize + gap) + cellSize / 2;
  const fly = document.createElement('div');
  fly.className = 'score-fly';
  fly.textContent = '+' + gain;
  fly.style.left = originX + 'px';
  fly.style.top = originY + 'px';
  boardWrap.appendChild(fly);
  setTimeout(() => fly.remove(), 720);
}

function updateUndoBtn() {
  undoBtn.disabled = !history.length || animating;
}

function updateItemBtns() {
  const maxVal = tiles ? tiles.reduce((m, t) => Math.max(m, t.value), 0) : 0;
  shuffleBtn.disabled = animating || maxVal < 256;
  sweepBtn.disabled = animating || maxVal < 1024 || !tiles || !tiles.some(t => t.value <= 8);
}

// ============ Save / Undo ============
function saveState() {
  history.push({
    tiles: tiles.map(t => ({ id: t.id, value: t.value, x: t.x, y: t.y, w: t.w, h: t.h })),
    score,
    nextId,
    won,
    wonEver,
    size: SIZE,
  });
  if (history.length > 12) history.shift();
}
function undo() {
  if (!history.length || animating) return;
  const s = history.pop();
  tilesEl.innerHTML = '';
  if (s.size !== SIZE) {
    SIZE = s.size;
    setBoardSize();
  }
  grid = emptyGrid();
  tiles = s.tiles.map(t => ({...t}));
  for (const t of tiles) placeOnGrid(t);
  score = s.score;
  nextId = s.nextId;
  won = s.won;
  wonEver = s.wonEver;
  updateScore();
  renderTiles();
  updateUndoBtn();
  updateItemBtns();
  overlay.classList.remove('show');
}

// ============ Items ============
function sweep() {
  if (sweepBtn.disabled || animating) return;
  const doomed = tiles.filter(t => t.value <= 8);
  if (doomed.length === 0) return;
  saveState();
  animating = true;
  updateUndoBtn();
  updateItemBtns();
  for (const t of doomed) {
    const el = tilesEl.querySelector(`[data-id="${t.id}"]`);
    if (el) el.classList.add('sweeping');
  }
  haptic(20);
  setTimeout(() => {
    for (const t of doomed) removeFromGrid(t);
    tiles = tiles.filter(t => t.value > 8);
    animating = false;
    renderTiles();
    updateUndoBtn();
    updateItemBtns();
  }, 420);
}

function shuffle() {
  if (shuffleBtn.disabled || animating) return;
  // Dry-run placement on a scratch grid so we don't corrupt state on failure.
  const sorted = [...tiles].sort((a, b) => b.w * b.h - a.w * a.h);
  const scratch = emptyGrid();
  const newPos = new Map();
  for (const t of sorted) {
    const spots = [];
    for (let y = 0; y <= SIZE - t.h; y++) {
      for (let x = 0; x <= SIZE - t.w; x++) {
        let ok = true;
        for (let dy = 0; dy < t.h && ok; dy++)
          for (let dx = 0; dx < t.w && ok; dx++)
            if (scratch[y + dy][x + dx]) ok = false;
        if (ok) spots.push([x, y]);
      }
    }
    if (!spots.length) return;  // impossible; abort silently
    const [nx, ny] = spots[Math.floor(Math.random() * spots.length)];
    newPos.set(t.id, [nx, ny]);
    for (let dy = 0; dy < t.h; dy++)
      for (let dx = 0; dx < t.w; dx++)
        scratch[ny + dy][nx + dx] = t;
  }
  saveState();
  for (const t of tiles) {
    const [nx, ny] = newPos.get(t.id);
    t.x = nx;
    t.y = ny;
  }
  grid = scratch;
  haptic(15);
  renderTiles();
  updateUndoBtn();
  updateItemBtns();
}

// ============ Game control ============
function newGame() {
  inTutorial = !localStorage.getItem('mergeTutorialDone');
  SIZE = inTutorial ? TUTORIAL_SIZE : INITIAL_SIZE;  setBoardSize();
  tiles = [];
  grid = emptyGrid();
  nextId = 1;
  score = 0;
  displayedScore = 0;
  won = false;
  wonEver = false;
  history = [];
  animating = false;
  tilesEl.innerHTML = '';
  hideHint();
  boardWrap.classList.remove('warn-pulse');
  spawn();
  spawn();
  renderTiles();
  updateScore();
  updateUndoBtn();
  updateItemBtns();
  updateBoardWarning();
  updateInfoText();
  overlay.classList.remove('show');
}

function showTutorialDone() {
  overlayTitle.textContent = '出 师';
  overlaySub.innerHTML = `合出 <b style="color:#c94a2a">32</b>！<br>32 是 2×1，之后的升级会占更大空间<br>进入正式游戏 · 5×5 起`;
  startBtn.textContent = '开 始';
  startBtn.className = '';
  continueBtn.style.display = 'none';
  overlay.classList.add('show');
  localStorage.setItem('mergeTutorialDone', '1');
}

function showWin() {
  overlayTitle.textContent = '功 成';
  overlaySub.innerHTML = `你合出了 <b style="color:#c94a2a">2048 · 曹操</b><br>得分 ${score}<br>继续挑战：棋盘扩至 <b>8×8</b>，随机出 2/4/8`;
  startBtn.textContent = '再 来 一 局';
  startBtn.className = 'secondary';
  continueBtn.style.display = '';
  overlay.classList.add('show');
}
function showLose() {
  overlayTitle.textContent = '阵 破 我 败';
  overlaySub.innerHTML = `无路可走 · 得分 ${score}<br>再来一局？`;
  startBtn.textContent = '再 来 一 局';
  startBtn.className = '';
  continueBtn.style.display = 'none';
  overlay.classList.add('show');
}

// ============ Input ============
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
    w:'up', s:'down', a:'left', d:'right',
    W:'up', S:'down', A:'left', D:'right',
  };
  if (map[e.key]) { move(map[e.key]); e.preventDefault(); }
});
let touchStart = null;
boardWrap.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
boardWrap.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 24) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, { passive: true });

function haptic(ms = 12) { if (navigator.vibrate) navigator.vibrate(ms); }

function bumpBoard(dir) {
  const cls = 'bump-' + dir;
  boardWrap.classList.remove('bump-up', 'bump-down', 'bump-left', 'bump-right');
  void boardWrap.offsetHeight;
  boardWrap.classList.add(cls);
  haptic(15);
}

document.getElementById('restartBtn').addEventListener('click', () => {
  if (tiles && tiles.length > 2 && !confirm('重开一局？')) return;
  newGame();
});
document.getElementById('undoBtn').addEventListener('click', undo);
shuffleBtn.addEventListener('click', shuffle);
sweepBtn.addEventListener('click', sweep);
startBtn.addEventListener('click', newGame);
continueBtn.addEventListener('click', () => {
  won = false;
  overlay.classList.remove('show');
  if (SIZE < MAX_SIZE) {
    expandBoard(MAX_SIZE);
    renderTiles();
  }
});

window.addEventListener('resize', () => renderTiles());

// ============ Mode picker ============
function showModePicker() {
  overlayTitle.textContent = '选 择 视 觉';
  overlaySub.innerHTML = '两种风格 · 之后可切换';
  document.getElementById('overlayBtns').style.display = 'none';
  const box = document.getElementById('modePickerBox');
  box.style.display = 'flex';
  overlay.classList.add('show');
  box.querySelectorAll('.mode-card').forEach(card => {
    card.onclick = () => {
      setRenderMode(card.dataset.mode);
      box.style.display = 'none';
      document.getElementById('overlayBtns').style.display = 'flex';
      overlay.classList.remove('show');
      if (!tiles || !tiles.length) newGame();
    };
  });
}
function setRenderMode(mode) {
  renderMode = mode;
  localStorage.setItem('mergeRenderMode', mode);
  // Invalidate render caches so every tile rebuilds in the new mode
  tilesEl.querySelectorAll('.tile').forEach(el => delete el.dataset.rk);
  if (tiles && tiles.length) renderTiles();
}
document.getElementById('modeToggle').addEventListener('click', () => {
  showModePicker();
});

// Boot
best = parseInt(localStorage.getItem('bestMerge') || '0', 10);
bestEl.textContent = best;
renderMode = localStorage.getItem('mergeRenderMode');
if (!renderMode) {
  showModePicker();
} else {
  newGame();
}
</script>
