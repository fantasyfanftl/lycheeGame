<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想法池 · 荔枝游戏</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, "PingFang SC", "Microsoft YaHei", Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #333;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  /* Left · idea list */
  .sidebar {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(10px);
    padding: 20px 14px;
    border-right: 1px solid rgba(255,255,255,0.1);
    position: sticky; top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }

  /* SOP 板块 */
  .sop-card {
    background: rgba(255,216,155,0.08);
    border: 1px solid rgba(255,216,155,0.25);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .sop-title {
    color: #ffd89b;
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .sop-steps {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .sop-step {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255,255,255,0.85);
  }
  .sop-step .sop-num {
    font-size: 14px;
    line-height: 1.2;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }
  .sop-step .sop-body {
    flex: 1;
  }
  .sop-step .sop-name {
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
  }
  .sop-step .sop-desc {
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .sop-tail {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    padding-top: 10px;
    margin-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.15);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }
  .back-link {
    display: inline-block;
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    font-size: 13px;
    padding: 4px 8px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .back-link:hover { color: #fff; }
  .brand {
    color: #fff;
    padding: 4px 8px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .brand-emoji { font-size: 26px; }
  .brand-title { font-size: 17px; letter-spacing: 3px; font-weight: 600; }

  .add-idea {
    display: flex; gap: 6px;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .add-idea input {
    flex: 1;
    padding: 9px 12px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .add-idea input::placeholder { color: rgba(255,255,255,0.4); }
  .add-idea input:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
  .add-idea button {
    padding: 9px 14px;
    background: #ffd89b;
    color: #4a3d6b;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .idea-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .idea-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: rgba(255,255,255,0.8);
    font-family: inherit;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.4;
  }
  .idea-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }
  .idea-item.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    font-weight: 500;
  }
  .idea-item .idea-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .idea-item .idea-status {
    flex-shrink: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .idea-item.filled .idea-status { background: #ffd89b; }
  .idea-item.done .idea-status { background: #7bd88f; }

  .idea-item.pinned {
    background: rgba(255,216,155,0.08);
    border-color: rgba(255,216,155,0.3);
  }
  .idea-item.pinned .idea-title { color: #ffd89b; font-weight: 600; }
  .pin-icon {
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0.9;
  }

  .sidebar-footer {
    padding: 10px 4px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .btn-mini {
    flex: 1;
    padding: 7px 8px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.65);
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-mini:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

  /* Right · detail */
  .main {
    padding: 30px 40px 60px;
    min-width: 0;
    overflow-x: hidden;
  }
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
  }

  .detail-header {
    color: #fff;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-title-input {
    flex: 1;
    min-width: 200px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid transparent;
    color: #fff;
    font-family: inherit;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
    outline: none;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .detail-title-input:hover, .detail-title-input:focus {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }
  .detail-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn.danger:hover { background: rgba(255,80,80,0.35); color: #fff; }

  .fields {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .field {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    transition: all 0.2s;
  }
  .field:focus-within {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,216,155,0.4);
  }
  .field-label {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field-label .en {
    font-size: 10px;
    color: #ffd89b;
    letter-spacing: 3px;
    font-weight: 700;
    font-family: "SF Mono", monospace;
  }
  .field-label .cn {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
  }
  .field-label .hint {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
  }
  .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    outline: none;
    resize: none;
    min-height: 60px;
    letter-spacing: 0.3px;
  }
  .field textarea::placeholder { color: rgba(255,255,255,0.25); }

  .save-hint {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 20px;
  }
  .save-hint.saved { color: #ffd89b; }

  /* 发散区 */
  .brainstorm {
    margin-top: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 18px;
    transition: all 0.2s;
  }
  .brainstorm:focus-within {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,216,155,0.4);
  }
  .brainstorm-label {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .brainstorm-label .emoji {
    font-size: 15px;
  }
  .brainstorm-label .name {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 3px;
    font-weight: 600;
  }
  .brainstorm-label .hint {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
    letter-spacing: 1px;
  }
  .brainstorm textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.75;
    outline: none;
    resize: none;
    min-height: 120px;
    letter-spacing: 0.3px;
  }
  .brainstorm textarea::placeholder { color: rgba(255,255,255,0.25); }

  /* Modal · 导出 */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-box {
    background: linear-gradient(135deg, #4a3d6b 0%, #6b4a8b 100%);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    color: #fff;
  }
  .modal-title {
    font-size: 15px;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  .modal p {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .modal textarea {
    width: 100%;
    min-height: 300px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    outline: none;
    resize: vertical;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 16px;
  }

  /* Mobile */
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative;
      height: auto;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .main { padding: 20px 16px 40px; }
    .fields { grid-template-columns: 1fr; gap: 10px; }
    .detail-title-input { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <a href="index.html" class="back-link">← 返回荔枝游戏</a>
    <div class="brand">
      <span class="brand-emoji">💡</span>
      <span class="brand-title">想 法 池</span>
    </div>

    <div class="add-idea">
      <input id="add-input" placeholder="打一个想法..." spellcheck="false" autocomplete="off">
      <button id="add-btn">+</button>
    </div>

    <div class="idea-list" id="idea-list"></div>

    <div class="sidebar-footer">
      <button class="btn-mini" id="export-btn">导出</button>
      <button class="btn-mini" id="clear-btn">清空</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state" id="empty">左边加一个想法 · 或点击列表选一个开始填 5W1H</div>
  </main>
</div>

<!-- Export modal -->
<div class="modal" id="export-modal">
  <div class="modal-box">
    <div class="modal-title">📤 导出所有想法</div>
    <p>复制下方文本 · 发给 GitHub Claude 或其他 AI · 让它帮你分析 / 落地。</p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeExport()">关闭</button>
      <button class="btn" onclick="copyExport()">复制</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'lychee_ideapool_v1';
const DATA_VERSION = 3;  // v3 · SOP 改为文档模式(docMode) · 不显示 6 字段
const FIELDS = [
  { key: 'what',  en: 'WHAT',  cn: '做什么',    hint: '一句话说清楚' },
  { key: 'why',   en: 'WHY',   cn: '为什么',    hint: '解决什么问题 / 满足什么欲' },
  { key: 'who',   en: 'WHO',   cn: '给谁玩',    hint: '目标玩家 / 使用场景' },
  { key: 'when',  en: 'WHEN',  cn: '什么时候玩',  hint: '什么心情 / 什么时机' },
  { key: 'where', en: 'WHERE', cn: '在哪玩',    hint: '手机 / 电脑 / 单人 / 联机' },
  { key: 'how',   en: 'HOW',   cn: '怎么做',    hint: '玩法核心 · 关键机制' }
];

// 权威 SOP · 文档模式 · 不用 5W1H
const CANONICAL_SOP = {
  id: 'sop_canonical',
  title: '做游戏 SOP',
  pinned: true,
  docMode: true,
  subtitle: '个人专属 · 7 步闭环游戏开发 SOP · v2.0',
  intro: '核心底层原则:发散方向→先验证玩法→定视觉→强制收尾→沉淀经验·最终无损返工\n适配人群:视觉驱动·容易改方案·容易无限打磨·容易项目烂尾·容易推倒重来的创作者',
  doc: [
    {
      step: 'Step 1',
      name: '起念锁定',
      why: '定方向·下空想',
      goal: '终结文字空想 · 必须补出完整画面或简迅',
      dos: [
        '一句话核心概念(精练·标示语)',
        '参考坐标(跨品类亦可·不用硬找同款)',
        '核心玩法定义(唯一核心·不散射)',
        '首屏视觉形成锁定(最重要·必须能补绘画面)'
      ],
      verify: '起念锁定信息清单',
      warn: '不描绘细节效果·不描绘附加功能'
    },
    {
      step: 'Step 2',
      name: '边界钉死',
      why: '防溢流·防超载·防越做越乱',
      goal: '解决最大痛点 —— 功能乱加·项目失控·反复推翻',
      dos: [
        '锁定"发散最小核心玩法循环"(最简易活动链·缺一不可)',
        '制定"v1.0 绝对不做清单"(硬边界)',
        '分区 v1.0必做 / v1.1迭代 / v1.2迭代 功能池',
        '设定游戏成功钩子体系(基础钩子+核心钩子+续加钩子)'
      ],
      verify: '版本边界清单 + 功能迭代池清单 + 游戏钩子体系清单'
    },
    {
      step: 'Step 3',
      name: '裸玩法验证',
      why: '防美化包装玩法差',
      goal: '先验证玩法好不好玩 · 再包装 · 最终大批过工',
      dos: [
        '制作"零美化·默认UI·极简功能版本"',
        '纯功能闭环试玩 3 轮以上',
        '隔离画面干扰·只判断玩法本身有没有乐趣',
        '给出下阶段结论:可继续 / 需要微调 / 终止项目'
      ],
      verify: '裸玩法验收清单'
    },
    {
      step: 'Step 4',
      name: '视觉定样',
      why: '治你视觉反复推翻',
      goal: '把"视觉反复推翻"杀在小样阶段 · 统一在开发前风格',
      dos: [
        '出 2 版差异化视觉小样(快速试错·不精修)',
        '锁定唯一持续视觉大方向',
        '制作 1 页绘稿级核心界面样本',
        '钉死视觉规范:颜色·字体·按钮·间距等'
      ],
      verify: '视觉风格定样清单 + 视觉规范清单',
      warn: '小样阶段可随便改 · 绘稿后只允许细节微调'
    },
    {
      step: 'Step 5',
      name: '完整开发',
      why: '纯执行·不发散',
      goal: '只能小的·不加数·不加新玩法 · 防止开发中途言逸',
      dos: [
        '严格按已定玩法 + 视觉规范批量转小',
        '打磨操作手感·跟手度·点击反馈',
        '手机端手指区域优化·防误触',
        '全难路走通闭环 · 无 bug · 无卡点'
      ],
      verify: '开发转小验收清单'
    },
    {
      step: 'Step 6',
      name: '上线发布',
      why: '强制收尾·根治完美主义的尾',
      goal: '不追求完美 · 追求"稳定·闭环·可交付"',
      dos: [
        '完整部署 · 可正常进入游玩',
        '补齐封面·简介·基础说明',
        '全难路重新测试',
        '正式收尾定稿:v1.0 声明冻结(但迭代池随时打开 v1.1)'
      ],
      verify: '上线验收清单'
    },
    {
      step: 'Step 7',
      name: '复盘归档',
      why: '沉淀本次经验成永久能力',
      goal: '不再重复踩坑 · 越做越顺',
      dos: [
        '记录本次所有返工点·纠结点·踩坑点',
        '沉淀可复用模板·规则·组件',
        '判断迭代方向:剪切 / 维新 / 升级 v1.1',
        '反哺优化自己的 SOP 流程'
      ],
      verify: '项目复盘清单'
    }
  ],
  bottomRules: [
    '不追完美 — 每一步"可用"就上',
    '不并行铺 — 一个游戏一条线',
    '不预设用户 — 我玩得爽就是成功'
  ],
  brainstorm: '',
  createdAt: '2026-07-22'
};

let ideas = [];
let currentId = null;
let saveTimer = null;

function loadIdeas() {
  let raw = null;
  let version = 1;
  try {
    raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    version = parseInt(localStorage.getItem(STORAGE_KEY + '_v') || '1', 10);
  } catch (e) { raw = null; }

  if (Array.isArray(raw)) {
    ideas = raw;
  } else {
    ideas = [];
  }

  // 权威 SOP · 永远存在且置顶
  const sopIdx = ideas.findIndex(i => i.id === 'sop_canonical' || i.title === '做游戏 SOP');
  if (version < DATA_VERSION || sopIdx < 0) {
    // 升级 · 移除任何旧的 SOP 条目 · 塞入新版 · 置顶
    ideas = ideas.filter(i => i.id !== 'sop_canonical' && i.title !== '做游戏 SOP');
    ideas.unshift({ ...CANONICAL_SOP });
    localStorage.setItem(STORAGE_KEY + '_v', String(DATA_VERSION));
  } else {
    // 已经有 SOP · 确保置顶(不动内容 · 用户可能自己改过)
    const sop = ideas.splice(sopIdx, 1)[0];
    sop.pinned = true;
    ideas.unshift(sop);
  }

  // 如果完全没有其他条目 · 塞几个占位例子
  if (ideas.length === 1) {
    ideas.push(
      {
        id: uid(),
        title: '构图裁切',
        what: '一个训练构图审美的轻科普小游戏。给你一张原图 · 拖动矩形裁切框到你觉得"最佳构图"的位置 · 提交后得分 + 系统对比 + 讲解为什么这样裁好',
        why: '天蓝想训练自己的画面判断力 · 但看理论记不住。市面上没有"直接练构图直觉"的东西',
        who: '天蓝自己 · 摄影/设计入门者',
        when: '碎片时间 · 通勤 · 出去拍照前想复习构图逻辑时',
        where: '手机竖屏优先 · 触屏拖框最直观',
        how: 'v1.0 核心循环 · 拖动/缩放裁切框 → 提交 → 得分 + 裁切解析 + 参考对比',
        brainstorm: '',
        createdAt: '2026-07-23'
      },
      {
        id: uid(),
        title: '产品脑',
        what: '产品思维训练游戏 · 每关一个情境 · 4 选 1 · 揭晓最产品思维选项 + 3 段讲解',
        why: '天蓝做游戏做多了 · 但缺产品经理式的判断力',
        who: '天蓝自己 · 想学产品思维但看不进书的人',
        when: '通勤 · 睡前',
        where: '手机竖屏为主',
        how: '15 个情境题 · 每题独立点评 4 选项 · 累积解锁 10 条产品原则图鉴',
        brainstorm: '',
        createdAt: '2026-07-23'
      }
    );
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
}

function uid() {
  return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function ideaFillLevel(idea) {
  const filled = FIELDS.filter(f => (idea[f.key] || '').trim()).length;
  if (filled === 0 && !(idea.title || '').trim()) return 'empty';
  if (filled >= 5) return 'done';
  if (filled >= 1) return 'filled';
  return 'empty';
}

function renderSidebar() {
  const listEl = document.getElementById('idea-list');
  listEl.innerHTML = ideas.map(idea => {
    const status = ideaFillLevel(idea);
    const title = (idea.title || '').trim() || '（未命名）';
    const active = idea.id === currentId ? ' active' : '';
    const pinned = idea.pinned ? ' pinned' : '';
    const pinIcon = idea.pinned ? '<span class="pin-icon">📌</span>' : '';
    const cls = 'idea-item' + active + pinned + ' ' + status;
    return `<button class="${cls}" data-id="${idea.id}">
      ${pinIcon}
      <span class="idea-status"></span>
      <span class="idea-title">${escapeHtml(title)}</span>
    </button>`;
  }).join('');
  listEl.querySelectorAll('.idea-item').forEach(btn => {
    btn.addEventListener('click', () => {
      currentId = btn.dataset.id;
      renderSidebar();
      renderDetail();
    });
  });
}

function renderDetail() {
  const main = document.getElementById('main');
  const idea = ideas.find(i => i.id === currentId);
  if (!idea) {
    main.innerHTML = `<div class="empty-state" id="empty">左边加一个想法 · 或点击列表选一个开始填 5W1H</div>`;
    return;
  }

  main.innerHTML = `
    <div class="detail-header">
      <input class="detail-title-input" id="title-input" value="${escapeAttr(idea.title || '')}" placeholder="给这个想法起个名字...">
      <div class="detail-actions">
        <button class="btn danger" id="del-btn">删 除</button>
      </div>
    </div>
    <div class="fields">
      ${FIELDS.map(f => `
        <div class="field">
          <div class="field-label">
            <span class="en">${f.en}</span>
            <span class="cn">${f.cn}</span>
            <span class="hint">${f.hint}</span>
          </div>
          <textarea data-key="${f.key}" placeholder="${f.hint}">${escapeHtml(idea[f.key] || '')}</textarea>
        </div>
      `).join('')}
    </div>

    <div class="brainstorm">
      <div class="brainstorm-label">
        <span class="emoji">💭</span>
        <span class="name">发 散 区</span>
        <span class="hint">随便写 · 想到就加 · 未来归纳</span>
      </div>
      <textarea data-key="brainstorm" placeholder="讨论时冒出来的碎片直接粗暴塞这&#10;不用管结构 不用管顺序 想到就写&#10;GitHub Claude 说的、你自己想的、突然联想到的&#10;导出时也会带出去">${escapeHtml(idea.brainstorm || '')}</textarea>
    </div>

    <div class="save-hint" id="save-hint">自动保存 · 每次编辑即存</div>
  `;

  // 自动高度
  main.querySelectorAll('textarea').forEach(ta => {
    autoResize(ta);
    ta.addEventListener('input', () => {
      autoResize(ta);
      const key = ta.dataset.key;
      idea[key] = ta.value;
      queueSave();
    });
  });

  const titleInput = document.getElementById('title-input');
  titleInput.addEventListener('input', () => {
    idea.title = titleInput.value;
    queueSave();
    renderSidebar();
  });

  document.getElementById('del-btn').addEventListener('click', () => {
    if (idea.pinned) {
      alert('这条是置顶权威内容 · 不能删。');
      return;
    }
    if (!confirm('删除这个想法？不可撤销。')) return;
    ideas = ideas.filter(i => i.id !== idea.id);
    currentId = ideas[0]?.id || null;
    save();
    renderSidebar();
    renderDetail();
  });
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(60, ta.scrollHeight) + 'px';
}

function queueSave() {
  clearTimeout(saveTimer);
  const hint = document.getElementById('save-hint');
  if (hint) hint.textContent = '编辑中...';
  saveTimer = setTimeout(() => {
    save();
    renderSidebar();
    const hint2 = document.getElementById('save-hint');
    if (hint2) {
      hint2.textContent = '已保存 ✓';
      hint2.classList.add('saved');
      setTimeout(() => {
        if (hint2) {
          hint2.classList.remove('saved');
          hint2.textContent = '自动保存 · 每次编辑即存';
        }
      }, 1500);
    }
  }, 400);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function escapeAttr(s) {
  return escapeHtml(s);
}

// ============ 添加 ============
function addIdea(title) {
  const t = (title || '').trim();
  const newIdea = {
    id: uid(),
    title: t,
    what: '', why: '', who: '', when: '', where: '', how: '',
    brainstorm: '',
    createdAt: new Date().toISOString().split('T')[0]
  };
  // 找到最后一个 pinned 之后插入 · 保证 pinned 永远在最上
  let insertAt = 0;
  for (let i = 0; i < ideas.length; i++) {
    if (ideas[i].pinned) insertAt = i + 1;
    else break;
  }
  ideas.splice(insertAt, 0, newIdea);
  currentId = newIdea.id;
  save();
  renderSidebar();
  renderDetail();
  setTimeout(() => {
    const t2 = document.getElementById('title-input');
    if (t2 && !t2.value) t2.focus();
  }, 50);
}

document.getElementById('add-btn').addEventListener('click', () => {
  const input = document.getElementById('add-input');
  addIdea(input.value);
  input.value = '';
});
document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addIdea(e.target.value);
    e.target.value = '';
  }
});

// ============ 导出 ============
function buildExport() {
  return ideas.map((idea, i) => {
    const title = (idea.title || '（未命名）').trim();
    const lines = [`【想法 ${i+1}】${title}`, `创建: ${idea.createdAt || ''}`];
    FIELDS.forEach(f => {
      const val = (idea[f.key] || '').trim();
      if (val) lines.push(`${f.en} · ${f.cn}: ${val}`);
    });
    const bs = (idea.brainstorm || '').trim();
    if (bs) lines.push(`\n💭 发散区:\n${bs}`);
    return lines.join('\n');
  }).join('\n\n───\n\n');
}
function openExport() {
  document.getElementById('export-text').value = buildExport();
  document.getElementById('export-modal').classList.add('show');
}
function closeExport() {
  document.getElementById('export-modal').classList.remove('show');
}
function copyExport() {
  const ta = document.getElementById('export-text');
  ta.select();
  document.execCommand('copy');
  const btn = event.target;
  const t = btn.textContent;
  btn.textContent = '已复制 ✓';
  setTimeout(() => { btn.textContent = t; }, 1200);
}
document.getElementById('export-btn').addEventListener('click', openExport);
document.getElementById('export-modal').addEventListener('click', e => {
  if (e.target.id === 'export-modal') e.target.classList.remove('show');
});

// ============ 清空 ============
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('清空所有想法？不可撤销。请确认已导出重要内容。（置顶的 SOP 会保留）')) return;
  ideas = ideas.filter(i => i.pinned);
  currentId = ideas[0]?.id || null;
  save();
  renderSidebar();
  renderDetail();
});

// ============ Boot ============
loadIdeas();
currentId = ideas[0]?.id || null;
renderSidebar();
renderDetail();
</script>
</body>
</html>
