<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想法池 · 荔枝游戏</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, "PingFang SC", "Microsoft YaHei", Tahoma, sans-serif;
    background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 50%, #333333 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #333;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }

  /* Left · idea list */
  .sidebar {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(10px);
    padding: 20px 14px;
    border-right: 1px solid rgba(255,255,255,0.1);
    position: sticky; top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .back-link {
    display: inline-block;
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    font-size: 13px;
    padding: 4px 8px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .back-link:hover { color: #fff; }
  .brand {
    color: #fff;
    padding: 4px 8px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .brand-emoji { font-size: 26px; }
  .brand-title { font-size: 17px; letter-spacing: 3px; font-weight: 600; }

  .add-idea {
    display: flex; gap: 6px;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .add-idea input {
    flex: 1;
    padding: 9px 12px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .add-idea input::placeholder { color: rgba(255,255,255,0.4); }
  .add-idea input:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
  .add-idea button {
    padding: 9px 14px;
    background: #ffd89b;
    color: #4a3d6b;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .idea-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .idea-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: rgba(255,255,255,0.8);
    font-family: inherit;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.4;
  }
  .idea-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }
  .idea-item.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    font-weight: 500;
  }
  .idea-item .idea-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .idea-item .progress-mini {
    flex-shrink: 0;
    font-size: 10px;
    color: rgba(255,216,155,0.7);
    font-family: "SF Mono", monospace;
    letter-spacing: 0;
    background: rgba(255,216,155,0.1);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .idea-item.pinned {
    background: rgba(255,216,155,0.08);
    border-color: rgba(255,216,155,0.3);
  }
  .idea-item.pinned .idea-title { color: #ffd89b; font-weight: 600; }
  .pin-icon {
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0.9;
  }

  .sidebar-footer {
    padding: 10px 4px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .btn-mini {
    flex: 1;
    padding: 7px 8px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.65);
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-mini:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

  /* Right · detail */
  .main {
    padding: 30px 40px 60px;
    min-width: 0;
    overflow-x: hidden;
  }
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
  }

  .detail-header {
    color: #fff;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-title-input {
    flex: 1;
    min-width: 200px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid transparent;
    color: #fff;
    font-family: inherit;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
    outline: none;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .detail-title-input:hover, .detail-title-input:focus {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }
  .detail-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn.danger:hover { background: rgba(255,80,80,0.35); color: #fff; }

  /* 双栏布局 · 左 SOP 流程 · 右 发散区 */
  .step-mode-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .step-mode-left {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .step-mode-right {
    position: sticky;
    top: 20px;
  }

  /* 7 步 SOP 卡片 */
  .step-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .step-card:focus-within {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,216,155,0.3);
  }
  .step-card.filled {
    border-color: rgba(255,216,155,0.4);
  }
  .step-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 12px 16px 8px;
    color: rgba(255,255,255,0.85);
  }
  .step-num {
    font-size: 10px;
    color: #ffd89b;
    letter-spacing: 2px;
    font-family: "SF Mono", monospace;
    font-weight: 700;
    background: rgba(255,216,155,0.15);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .step-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #fff;
  }
  .step-why {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-left: auto;
  }
  .step-goal {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    padding: 0 16px 10px;
    letter-spacing: 0.3px;
    line-height: 1.6;
    font-style: italic;
  }
  .step-fields {
    padding: 4px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .step-field-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .step-field-label .hint {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px;
    margin-left: auto;
  }
  .step-field textarea, .step-field input {
    width: 100%;
    background: rgba(0,0,0,0.15);
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 6px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    outline: none;
    resize: none;
    min-height: 40px;
    letter-spacing: 0.3px;
  }
  .step-field textarea::placeholder,
  .step-field input::placeholder {
    color: rgba(255,255,255,0.25);
  }
  .step-field textarea:focus,
  .step-field input:focus {
    border-color: rgba(255,216,155,0.4);
    background: rgba(0,0,0,0.25);
  }
  .step-warn {
    font-size: 11px;
    color: #ff9a76;
    padding: 6px 16px 12px;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }
  .step-warn::before { content: '⚠ '; }

  /* 发散区 · 右栏专用 · 通高 */
  .brainstorm {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 18px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 100px);
    max-height: calc(100vh - 100px);
  }
  .brainstorm:focus-within {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,216,155,0.4);
  }
  .brainstorm-label {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .brainstorm-label .emoji {
    font-size: 15px;
  }
  .brainstorm-label .name {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 3px;
    font-weight: 600;
  }
  .brainstorm-label .hint {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
    letter-spacing: 1px;
  }
  .brainstorm textarea {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.75;
    outline: none;
    resize: none;
    letter-spacing: 0.3px;
    min-height: 0;
  }
  .brainstorm textarea::placeholder { color: rgba(255,255,255,0.25); }

  .save-hint {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 20px;
  }
  .save-hint.saved { color: #ffd89b; }

  /* SOP 文档模式 · S 型蛇行流程图 */
  .sop-doc {
    color: #fff;
  }
  .sop-doc-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-style: italic;
  }
  .sop-doc-intro {
    font-size: 13px;
    line-height: 1.9;
    color: rgba(255,255,255,0.85);
    padding: 12px 16px;
    background: rgba(255,216,155,0.08);
    border-left: 3px solid #ffd89b;
    border-radius: 4px;
    margin-bottom: 24px;
    white-space: pre-line;
    letter-spacing: 0.3px;
  }
  .sop-flow {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px 40px;
    position: relative;
  }
  .sop-flow-cell {
    position: relative;
  }
  .sop-step-doc {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 16px;
    height: 100%;
    position: relative;
    z-index: 2;
  }
  .sop-step-doc .sd-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .sop-step-doc .sd-num {
    font-size: 10px;
    color: #ffd89b;
    letter-spacing: 2px;
    font-family: "SF Mono", monospace;
    font-weight: 700;
    background: rgba(255,216,155,0.15);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .sop-step-doc .sd-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
  }
  .sop-step-doc .sd-why {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    display: block;
    margin-top: 2px;
  }
  .sop-step-doc .sd-goal {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    margin: 8px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px dashed rgba(255,255,255,0.15);
    letter-spacing: 0.3px;
    line-height: 1.5;
  }
  .sop-step-doc .sd-dos-label {
    font-size: 10px;
    color: rgba(255,216,155,0.7);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .sop-step-doc .sd-dos {
    list-style: none;
    padding: 0;
    margin: 0 0 8px;
  }
  .sop-step-doc .sd-dos li {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255,255,255,0.82);
    padding: 3px 0 3px 14px;
    position: relative;
    letter-spacing: 0.2px;
  }
  .sop-step-doc .sd-dos li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: #ffd89b;
    font-weight: bold;
  }
  .sop-step-doc .sd-dos li b {
    color: rgba(255,255,255,0.95);
  }
  .sop-step-doc .sd-verify {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    padding-top: 8px;
    border-top: 1px dashed rgba(255,255,255,0.12);
    margin-top: 8px;
  }
  .sop-step-doc .sd-verify::before {
    content: '📋 ';
    color: #a5d88a;
  }
  .sop-step-doc .sd-warn {
    font-size: 10px;
    color: #ff9a76;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }
  .sop-step-doc .sd-warn::before { content: '⚠ '; }

  /* S 型箭头连接 */
  .sop-flow-arrow {
    position: absolute;
    color: #a5d88a;
    font-size: 24px;
    z-index: 1;
    line-height: 1;
    text-shadow: 0 0 6px rgba(165,216,138,0.6);
    pointer-events: none;
  }
  /* 水平箭头 · 在两个 cell 之间 */
  .sop-flow-arrow.h {
    top: 50%;
    transform: translateY(-50%);
  }
  .sop-flow-arrow.h.right { right: -30px; }
  .sop-flow-arrow.h.left { left: -30px; transform: translateY(-50%) rotate(180deg); }
  /* 垂直下折箭头 · 在末端往下走 */
  .sop-flow-arrow.down {
    right: 50%;
    bottom: -34px;
    transform: translateX(50%);
    font-size: 28px;
  }

  .sop-doc-rules {
    margin-top: 28px;
    padding: 14px 18px;
    background: rgba(255,100,100,0.06);
    border: 1px solid rgba(255,100,100,0.2);
    border-radius: 12px;
  }
  .sop-doc-rules .rules-title {
    font-size: 12px;
    color: #ff9a76;
    letter-spacing: 3px;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .sop-doc-rules ul {
    list-style: none;
    padding: 0;
  }
  .sop-doc-rules li {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    padding: 4px 0 4px 22px;
    position: relative;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }
  .sop-doc-rules li::before {
    content: '✗';
    position: absolute;
    left: 4px;
    color: #ff9a76;
    font-weight: bold;
  }

  @media (max-width: 900px) {
    .sop-flow {
      grid-template-columns: 1fr 1fr;
      gap: 14px 30px;
    }
    .sop-flow-arrow.h.right, .sop-flow-arrow.h.left { display: none; }
    .sop-flow-arrow.down { display: none; }
  }
  @media (max-width: 560px) {
    .sop-flow { grid-template-columns: 1fr; gap: 12px; }
  }

  /* Modal · 导出 */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-box {
    background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    color: #fff;
  }
  .modal-title {
    font-size: 15px;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  .modal p {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .modal textarea {
    width: 100%;
    min-height: 300px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    outline: none;
    resize: vertical;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 16px;
  }

  /* Mobile */
  @media (max-width: 960px) {
    .step-mode-layout { grid-template-columns: 1fr; }
    .step-mode-right { position: static; }
    .brainstorm { height: auto; min-height: 240px; }
  }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative;
      height: auto;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .main { padding: 20px 16px 40px; }
    .detail-title-input { font-size: 20px; }
    .sop-step-doc .sd-name { font-size: 14px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <a href="index.html" class="back-link">← 返回荔枝游戏</a>
    <div class="brand">
      <span class="brand-emoji">💡</span>
      <span class="brand-title">想 法 池</span>
    </div>

    <div class="add-idea">
      <input id="add-input" placeholder="打一个想法..." spellcheck="false" autocomplete="off">
      <button id="add-btn">+</button>
    </div>

    <div class="idea-list" id="idea-list"></div>

    <div class="sidebar-footer">
      <button class="btn-mini" id="export-btn">导出</button>
      <button class="btn-mini" id="clear-btn">清空</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state">左边加一个想法 · 或点击列表选一个开始按 7 步 SOP 走</div>
  </main>
</div>

<!-- Export modal -->
<div class="modal" id="export-modal">
  <div class="modal-box">
    <div class="modal-title">📤 导出所有想法</div>
    <p>复制下方文本 · 发给 GitHub Claude 或其他 AI · 让它帮你分析 / 落地。</p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeExport()">关闭</button>
      <button class="btn" onclick="copyExport()">复制</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'lychee_ideapool_v1';
const DATA_VERSION = 3;  // v3 · 彻底切换 7 步 SOP · 删掉 5W1H

// 7 步 SOP 结构定义
const SOP_STEPS = [
  {
    step: 'Step 1',
    key: 's1',
    name: '起念锁定',
    why: '定方向·下空想',
    goal: '终结文字空想 · 必须补出完整画面或简迅',
    fields: [
      { k: 'concept',    label: '核心概念',   hint: '一句话·精练·标示语' },
      { k: 'refs',       label: '参考坐标',   hint: '跨品类亦可·不用硬找同款' },
      { k: 'gameplay',   label: '核心玩法定义', hint: '唯一核心·不散射' },
      { k: 'firstScreen',label: '首屏视觉',   hint: '最重要·能补绘画面' }
    ],
    warn: '不描绘细节效果 · 不描绘附加功能'
  },
  {
    step: 'Step 2',
    key: 's2',
    name: '边界钉死',
    why: '防溢流·防超载',
    goal: '解决最大痛点 —— 功能乱加·项目失控·反复推翻',
    fields: [
      { k: 'minLoop',   label: '最小玩法循环', hint: '最简易活动链·缺一不可' },
      { k: 'dontDo',    label: 'v1.0 绝对不做', hint: '硬边界·防止溢流' },
      { k: 'iterPool',  label: '迭代池', hint: 'v1.1 / v1.2 待做功能' },
      { k: 'hooks',     label: '钩子体系', hint: '基础+核心+续加钩子' }
    ]
  },
  {
    step: 'Step 3',
    key: 's3',
    name: '裸玩法验证',
    why: '防美化包装玩法差',
    goal: '零美化 · 默认UI · 极简功能 · 试 3 轮以上',
    fields: [
      { k: 'verifyNote', label: '试玩记录', hint: '玩了几轮·什么感觉·卡在哪' },

    fields: [
      { k: 'style',   label: '视觉风格大方向', hint: '一句话说清·可截图参考' },
      { k: 'spec',    label: '视觉规范', hint: '颜色·字体·按钮·间距等' }
    ],
    warn: '小样阶段可随便改 · 绘稿后只允许细节微调'
  },
  {
    step: 'Step 5',
    key: 's5',
    name: '完整开发',
    why: '纯执行·不发散',
    goal: '严格按玩法+视觉规范批量转小 · 全难路走通',
    fields: [
      { k: 'devNote', label: '开发进度/踩坑', hint: '记录 bug·手感调整·手指区域优化等' }
    ]
  },
  {
    step: 'Step 6',
    key: 's6',
    name: '上线发布',
    why: '强制收尾·根治完美主义',
    goal: '不追求完美 · 追求稳定·闭环·可交付',
    fields: [
      { k: 'url',    label: '公网 URL', hint: 'https://fantasyfanftl.github.io/lycheeGame/xxx.html' },
      { k: 'status', label: '上线状态', hint: '未部署 / 已部署 / v1.0 冻结' }
    ]
  },
  {
    step: 'Step 7',
    key: 's7',
    name: '复盘归档',
    why: '沉淀经验成永久能力',
    goal: '记录返工点 · 沉淀可复用模板 · 反哺 SOP',
    fields: [
      { k: 'reflection', label: '本次踩坑/纠结', hint: '记录所有让你返工的点' },
      { k: 'reusable',   label: '可复用沉淀', hint: '组件·规则·模板·反哺 SOP' },
      { k: 'nextMove',   label: '迭代方向', hint: '砍掉 / 维持 / 升级 v1.1' }
    ]
  }
];

// 权威 SOP · 文档模式
const CANONICAL_SOP = {
  id: 'sop_canonical',
  title: '做游戏 SOP',
  pinned: true,
  docMode: true,
  subtitle: '个人专属 · 7 步闭环游戏开发 SOP · v2.0',
  intro: '核心底层原则:发散方向→先验证玩法→定视觉→强制收尾→沉淀经验·最终无损返工\n适配人群:视觉驱动·容易改方案·容易无限打磨·容易项目烂尾·容易推倒重来的创作者',
  createdAt: '2026-07-22'
};

let ideas = [];
let currentId = null;
let saveTimer = null;

function loadIdeas() {
  let raw = null;
  let version = 1;
  try {
    raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    version = parseInt(localStorage.getItem(STORAGE_KEY + '_v') || '1', 10);
  } catch (e) { raw = null; }

  if (Array.isArray(raw)) {
    ideas = raw;
  } else {
    ideas = [];
  }

  // 升级到 v3:剥离 5W1H · 迁移旧数据到 brainstorm
  if (version < 3) {
    ideas.forEach(idea => {
      if (idea.id === 'sop_canonical' || idea.title === '做游戏 SOP') return;
      // 把旧的 what/why/who/when/where/how 合并进 brainstorm 顶部
      const parts = [];
      if (idea.what) parts.push('WHAT · 做什么: ' + idea.what);
      if (idea.why) parts.push('WHY · 为什么: ' + idea.why);
      if (idea.who) parts.push('WHO · 给谁: ' + idea.who);
      if (idea.when) parts.push('WHEN · 时机: ' + idea.when);
      if (idea.where) parts.push('WHERE · 载体: ' + idea.where);
      if (idea.how) parts.push('HOW · 怎么做: ' + idea.how);
      if (parts.length) {
        const legacyText = '【旧 5W1H · 未按 7 步整理】\n' + parts.join('\n') + '\n\n' + '─────\n\n';
        idea.brainstorm = legacyText + (idea.brainstorm || '');
      }
      // 清掉旧字段
      delete idea.what;
      delete idea.why;
      delete idea.who;
      delete idea.when;
      delete idea.where;
      delete idea.how;
      // 初始化 7 步字段
      SOP_STEPS.forEach(s => {
        if (!idea[s.key]) idea[s.key] = {};
      });
    });
    localStorage.setItem(STORAGE_KEY + '_v', String(DATA_VERSION));
  }

  // 权威 SOP · 永远存在且置顶
  const sopIdx = ideas.findIndex(i => i.id === 'sop_canonical' || i.title === '做游戏 SOP');
  if (sopIdx >= 0) ideas.splice(sopIdx, 1);
  ideas.unshift({ ...CANONICAL_SOP });

  // 如果只剩 SOP · 塞占位
  if (ideas.length === 1) {
    ideas.push(makePlaceholder('构图裁切', 'v1.0 已上线 · https://fantasyfanftl.github.io/lycheeGame/crop.html'));
    ideas.push(makePlaceholder('产品脑', 'v1.0 已上线 · https://fantasyfanftl.github.io/lycheeGame/product-mind.html'));
  }
  save();
}

function makePlaceholder(title, note) {
  const idea = {
    id: uid(),
    title,
    createdAt: new Date().toISOString().split('T')[0],
    brainstorm: note || ''
  };
  SOP_STEPS.forEach(s => { idea[s.key] = {}; });
  return idea;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
}

function uid() {
  return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// 完成的 Step 数
function completedSteps(idea) {
  if (idea.docMode) return -1;
  let done = 0;
  SOP_STEPS.forEach(s => {
    const stepData = idea[s.key] || {};
    const anyFilled = s.fields.some(f => (stepData[f.k] || '').trim());
    if (anyFilled) done++;
  });
  return done;
}

function renderSidebar() {
  const listEl = document.getElementById('idea-list');
  listEl.innerHTML = ideas.map(idea => {
    const title = (idea.title || '').trim() || '（未命名）';
    const active = idea.id === currentId ? ' active' : '';
    const pinned = idea.pinned ? ' pinned' : '';
    const pinIcon = idea.pinned ? '<span class="pin-icon">📌</span>' : '';
    const cls = 'idea-item' + active + pinned;
    const done = completedSteps(idea);
    const progress = idea.docMode ? '' : `<span class="progress-mini">${done}/7</span>`;
    return `<button class="${cls}" data-id="${idea.id}">
      ${pinIcon}
      <span class="idea-title">${escapeHtml(title)}</span>
      ${progress}
    </button>`;
  }).join('');
  listEl.querySelectorAll('.idea-item').forEach(btn => {
    btn.addEventListener('click', () => {
      currentId = btn.dataset.id;
      renderSidebar();
      renderDetail();
    });
  });
}

function renderDetail() {
  const main = document.getElementById('main');
  const idea = ideas.find(i => i.id === currentId);
  if (!idea) {
    main.innerHTML = '<div class="empty-state">左边加一个想法 · 或点击列表选一个开始按 7 步 SOP 走</div>';
    return;
  }

  if (idea.docMode) {
    renderDocMode(main, idea);
    return;
  }

  renderStepMode(main, idea);
}

function renderDocMode(main, idea) {
  // Step 顺序 · 上排 1-2-3-4 · 下排从右到左 5-6-7 (S 型蛇行)
  // 用 grid 4 列 · 上排放 1234 · 下排放 (empty)765
  const cells = [
    { step: SOP_STEPS[0], row: 1, col: 1, arrow: 'right' },
    { step: SOP_STEPS[1], row: 1, col: 2, arrow: 'right' },
    { step: SOP_STEPS[2], row: 1, col: 3, arrow: 'right' },
    { step: SOP_STEPS[3], row: 1, col: 4, arrow: 'down' },
    { step: SOP_STEPS[6], row: 2, col: 1, arrow: null },
    { step: SOP_STEPS[5], row: 2, col: 2, arrow: 'left' },
    { step: SOP_STEPS[4], row: 2, col: 3, arrow: 'left' }
  ];
  // 但 grid-column 需要按视觉位置放:
  // row 1: col 1-4 · Step 1-4
  // row 2: col 3-1 · Step 5-6-7 (右到左)
  // Step 5 在 row 2 col 4(对应 Step 4 下方) ← 让 Step 4 直接下箭头指到 Step 5

  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-title-input" style="pointer-events:none; color:#ffd89b;">${escapeHtml(idea.title)}</div>
    </div>

    <div class="sop-doc">
      <div class="sop-doc-subtitle">${escapeHtml(idea.subtitle || '')}</div>
      <div class="sop-doc-intro">${escapeHtml(idea.intro || '')}</div>

      <div class="sop-flow">
        ${renderFlowCell(SOP_STEPS[0], { rightArrow: true })}
        ${renderFlowCell(SOP_STEPS[1], { rightArrow: true })}
        ${renderFlowCell(SOP_STEPS[2], { rightArrow: true })}
        ${renderFlowCell(SOP_STEPS[3], { downArrow: true })}
        ${renderFlowCell(SOP_STEPS[6], {}, 'row2-col1')}
        ${renderFlowCell(SOP_STEPS[5], { leftArrowFromRight: true }, 'row2-col2')}
        ${renderFlowCell(SOP_STEPS[4], { leftArrowFromRight: true }, 'row2-col3')}
        <div class="sop-flow-cell" style="grid-column: 4; grid-row: 2; opacity: 0; pointer-events: none;"></div>
      </div>

      <div class="sop-doc-rules">
        <div class="rules-title">3 条不做</div>
        <ul>
          <li>不追完美 — 每一步"可用"就上</li>
          <li>不并行铺 — 一个游戏一条线</li>
          <li>不预设用户 — 我玩得爽就是成功</li>
        </ul>
      </div>
    </div>
  `;
}

function renderFlowCell(s, arrows, positionClass) {
  const arrowHtml = [];
  if (arrows.rightArrow) arrowHtml.push('<div class="sop-flow-arrow h right">▶</div>');
  if (arrows.leftArrowFromRight) arrowHtml.push('<div class="sop-flow-arrow h right">◀</div>');
  if (arrows.downArrow) arrowHtml.push('<div class="sop-flow-arrow down">▼</div>');
  return `
    <div class="sop-flow-cell">
      <div class="sop-step-doc">
        <div class="sd-head">
          <span class="sd-num">${s.step}</span>
          <span class="sd-name">${s.name}</span>
        </div>
        <div class="sd-why">${s.why}</div>
        <div class="sd-goal">🎯 ${escapeHtml(s.goal)}</div>
        <div class="sd-dos-label">必做</div>
        <ul class="sd-dos">
          ${s.fields.map(f => `<li><b>${f.label}</b> · ${f.hint}</li>`).join('')}
        </ul>
        ${s.warn ? `<div class="sd-warn">${escapeHtml(s.warn)}</div>` : ''}
        <div class="sd-verify">${s.name}验收清单</div>
      </div>
      ${arrowHtml.join('')}
    </div>
  `;
}

function renderStepMode(main, idea) {
  main.innerHTML = `
    <div class="detail-header">
      <input class="detail-title-input" id="title-input" value="${escapeAttr(idea.title || '')}" placeholder="给这个想法起个名字...">
      <div class="detail-actions">
        <button class="btn danger" id="del-btn">删 除</button>
      </div>
    </div>

    <div class="step-mode-layout">
      <div class="step-mode-left">
        ${SOP_STEPS.map(s => {
          const stepData = idea[s.key] || {};
          const anyFilled = s.fields.some(f => (stepData[f.k] || '').trim());
          return `
            <div class="step-card ${anyFilled ? 'filled' : ''}">
              <div class="step-head">
                <span class="step-num">${s.step}</span>
                <span class="step-name">${s.name}</span>
                <span class="step-why">${s.why}</span>
              </div>
              <div class="step-goal">🎯 ${escapeHtml(s.goal)}</div>
              <div class="step-fields">
                ${s.fields.map(f => `
                  <div class="step-field">
                    <div class="step-field-label">${f.label}<span class="hint">${f.hint}</span></div>
                    <textarea data-step="${s.key}" data-field="${f.k}" placeholder="${f.hint}">${escapeHtml(stepData[f.k] || '')}</textarea>
                  </div>
                `).join('')}
              </div>
              ${s.warn ? `<div class="step-warn">${escapeHtml(s.warn)}</div>` : ''}
            </div>
          `;
        }).join('')}
        <div class="save-hint" id="save-hint">自动保存 · 每次编辑即存</div>
      </div>

      <div class="step-mode-right">
        <div class="brainstorm">
          <div class="brainstorm-label">
            <span class="emoji">💭</span>
            <span class="name">发 散 区</span>
            <span class="hint">随便写 · 想到就加 · 未来归纳</span>
          </div>
          <textarea data-key="brainstorm" placeholder="讨论时冒出来的碎片直接塞这&#10;不用管结构 不用管顺序 想到就写">${escapeHtml(idea.brainstorm || '')}</textarea>
        </div>
      </div>
    </div>
  `;

  // 自动高度(仅 SOP 卡片的 textarea)
  main.querySelectorAll('.step-field textarea').forEach(ta => {
    autoResize(ta);
    ta.addEventListener('input', () => {
      autoResize(ta);
      const stepK = ta.dataset.step;
      const fieldK = ta.dataset.field;
      if (!idea[stepK]) idea[stepK] = {};
      idea[stepK][fieldK] = ta.value;
      queueSave();
    });
  });
  // 发散区不自动高度 · flex 撑满
  const bsTa = main.querySelector('.brainstorm textarea');
  if (bsTa) {
    bsTa.addEventListener('input', () => {
      idea.brainstorm = bsTa.value;
      queueSave();
    });
  }

  const titleInput = document.getElementById('title-input');
  titleInput.addEventListener('input', () => {
    idea.title = titleInput.value;
    queueSave();
    renderSidebar();
  });

  document.getElementById('del-btn').addEventListener('click', () => {
    if (idea.pinned) { alert('这条是置顶权威内容 · 不能删。'); return; }
    if (!confirm('删除这个想法？不可撤销。')) return;
    ideas = ideas.filter(i => i.id !== idea.id);
    currentId = ideas[0]?.id || null;
    save();
    renderSidebar();
    renderDetail();
  });
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(40, ta.scrollHeight) + 'px';
}

function queueSave() {
  clearTimeout(saveTimer);
  const hint = document.getElementById('save-hint');
  if (hint) hint.textContent = '编辑中...';
  saveTimer = setTimeout(() => {
    save();
    renderSidebar();
    const hint2 = document.getElementById('save-hint');
    if (hint2) {
      hint2.textContent = '已保存 ✓';
      hint2.classList.add('saved');
      setTimeout(() => {
        if (hint2) {
          hint2.classList.remove('saved');
          hint2.textContent = '自动保存 · 每次编辑即存';
        }
      }, 1500);
    }
  }, 400);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function escapeAttr(s) { return escapeHtml(s); }

// ============ 添加 ============
function addIdea(title) {
  const t = (title || '').trim();
  const newIdea = {
    id: uid(),
    title: t,
    createdAt: new Date().toISOString().split('T')[0],
    brainstorm: ''
  };
  SOP_STEPS.forEach(s => { newIdea[s.key] = {}; });

  // 找到最后一个 pinned 后插入
  let insertAt = 0;
  for (let i = 0; i < ideas.length; i++) {
    if (ideas[i].pinned) insertAt = i + 1;
    else break;
  }
  ideas.splice(insertAt, 0, newIdea);
  currentId = newIdea.id;
  save();
  renderSidebar();
  renderDetail();
  setTimeout(() => {
    const t2 = document.getElementById('title-input');
    if (t2 && !t2.value) t2.focus();
  }, 50);
}

document.getElementById('add-btn').addEventListener('click', () => {
  const input = document.getElementById('add-input');
  addIdea(input.value);
  input.value = '';
});
document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addIdea(e.target.value);
    e.target.value = '';
  }
});

// ============ 导出 ============
function buildExport() {
  return ideas.filter(i => !i.docMode).map((idea, i) => {
    const title = (idea.title || '（未命名）').trim();
    const lines = [`【想法 ${i+1}】${title}`, `创建: ${idea.createdAt || ''}`];
    SOP_STEPS.forEach(s => {
      const stepData = idea[s.key] || {};
      const filled = s.fields.filter(f => (stepData[f.k] || '').trim());
      if (filled.length) {
        lines.push(`\n[${s.step}] ${s.name}`);
        filled.forEach(f => {
          lines.push(`  · ${f.label}: ${stepData[f.k].trim()}`);
        });
      }
    });
    const bs = (idea.brainstorm || '').trim();
    if (bs) lines.push(`\n💭 发散区:\n${bs}`);
    return lines.join('\n');
  }).join('\n\n───\n\n');
}

function openExport() {
  document.getElementById('export-text').value = buildExport();
  document.getElementById('export-modal').classList.add('show');
}
function closeExport() {
  document.getElementById('export-modal').classList.remove('show');
}
function copyExport() {
  const ta = document.getElementById('export-text');
  ta.select();
  document.execCommand('copy');
  const btn = event.target;
  const t = btn.textContent;
  btn.textContent = '已复制 ✓';
  setTimeout(() => { btn.textContent = t; }, 1200);
}
document.getElementById('export-btn').addEventListener('click', openExport);
document.getElementById('export-modal').addEventListener('click', e => {
  if (e.target.id === 'export-modal') e.target.classList.remove('show');
});

// ============ 清空 ============
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('清空所有想法？不可撤销。请确认已导出重要内容。（置顶的 SOP 会保留）')) return;
  ideas = ideas.filter(i => i.pinned);
  currentId = ideas[0]?.id || null;
  save();
  renderSidebar();
  renderDetail();
});

// ============ Boot ============
loadIdeas();
currentId = ideas[0]?.id || null;
renderSidebar();
renderDetail();
</script>
