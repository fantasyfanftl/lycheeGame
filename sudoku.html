<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪夜列车</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', 'Georgia', serif;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(90, 120, 160, 0.18), transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(70, 90, 130, 0.15), transparent 60%),
      linear-gradient(180deg, #12182a 0%, #0a0f1e 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #d4d8e0;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }
  #app { position: relative; min-height: 100vh; }
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    opacity: 0;
    transition: opacity 0.6s ease;
    overflow: hidden;
  }
  .screen.active { display: flex; opacity: 1; }
  #screen-title, #screen-verdict, #screen-result {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .back-link {
    position: absolute;
    top: 14px;
    left: 16px;
    color: rgba(212, 216, 224, 0.5);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    z-index: 100;
    letter-spacing: 1px;
  }
  .back-link:hover { color: rgba(212, 216, 224, 0.9); }

  /* Snowfall */
  .snow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .snow span {
    position: absolute;
    top: -10px;
    color: rgba(255, 255, 255, 0.35);
    animation: fall linear infinite;
    user-select: none;
  }
  @keyframes fall {
    to { transform: translateY(105vh); }
  }

  /* Title screen */
  #screen-title { text-align: center; z-index: 2; }
  .title-time {
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(160, 180, 210, 0.55);
    margin-bottom: 30px;
  }
  .title-main {
    font-size: clamp(30px, 6vw, 42px);
    letter-spacing: 8px;
    margin-bottom: 10px;
    color: #e0e6ee;
    text-shadow: 0 0 40px rgba(140, 170, 210, 0.3);
  }
  .title-sub {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(160, 180, 210, 0.5);
    margin-bottom: 40px;
  }
  .intro-text {
    max-width: 500px;
    line-height: 2;
    font-size: 15px;
    color: rgba(212, 216, 224, 0.85);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .intro-text p { margin: 4px 0; }
  .intro-text p.gap { height: 12px; }

  .rules-card {
    max-width: 500px;
    width: 100%;
    background: linear-gradient(180deg, rgba(160, 60, 60, 0.12) 0%, rgba(200, 100, 100, 0.06) 100%);
    border: 1px solid rgba(200, 100, 100, 0.4);
    border-radius: 4px;
    padding: 18px 22px;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(200, 100, 100, 0.08), inset 0 0 20px rgba(200, 100, 100, 0.04);
  }
  .rules-card .rules-header {
    font-size: 12px;
    color: #ffb0b0;
    letter-spacing: 6px;
    margin-bottom: 12px;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px dashed rgba(200, 100, 100, 0.3);
  }
  .rules-card ul {
    list-style: none;
    padding: 0;
  }
  .rules-card li {
    padding: 6px 0;
    color: rgba(224, 230, 238, 0.9);
    font-size: 14px;
    line-height: 1.7;
    letter-spacing: 1px;
    padding-left: 22px;
    position: relative;
  }
  .rules-card li::before {
    content: '❄';
    position: absolute;
    left: 0;
    top: 8px;
    color: rgba(200, 100, 100, 0.7);
    font-size: 10px;
  }
  .rules-card li b { color: #ffd8a0; }

  .cold-btn {
    background: #d4d8e0;
    color: #12182a;
    border: none;
    padding: 12px 30px;
    font-size: 15px;
    letter-spacing: 5px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 2px 12px rgba(140, 170, 210, 0.15);
    transition: all 0.3s;
    position: relative;
  }
  .cold-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid rgba(140, 170, 210, 0.3);
    pointer-events: none;
  }
  .cold-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(140, 170, 210, 0.35); }
  .cold-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #8890a0; }
  .cold-btn.small { padding: 8px 18px; font-size: 13px; letter-spacing: 3px; }

  /* Game screen */
  #screen-game { justify-content: flex-start; padding-top: 50px; z-index: 2; }
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 560px;
    width: 100%;
    margin-bottom: 10px;
  }
  .game-title {
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(160, 180, 210, 0.8);
  }
  .clue-btn {
    background: transparent;
    border: 1px solid rgba(160, 180, 210, 0.3);
    color: rgba(212, 216, 224, 0.85);
    padding: 5px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .clue-btn:hover { background: rgba(160, 180, 210, 0.1); }
  .clue-btn .badge {
    background: #a04040;
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
  }
  .info {
    display: flex;
    gap: 8px;
    max-width: 560px;
    width: 100%;
    margin-bottom: 10px;
  }
  .info span {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(160, 180, 210, 0.15);
    padding: 6px 12px;
    text-align: center;
    font-size: 13px;
    color: rgba(212, 216, 224, 0.75);
    letter-spacing: 1px;
  }
  .info span b { color: #e0e6ee; margin-left: 4px; }

  .difficulty {
    display: flex;
    gap: 5px;
    max-width: 560px;
    width: 100%;
    margin-bottom: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .difficulty button {
    padding: 4px 10px;
    border: 1px solid rgba(160, 180, 210, 0.25);
    background: transparent;
    color: rgba(212, 216, 224, 0.75);
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 1px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .difficulty button:hover { background: rgba(160, 180, 210, 0.1); }
  .difficulty button.active {
    background: rgba(160, 180, 210, 0.2);
    border-color: #e0e6ee;
    color: #e0e6ee;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 0;
    border: 2px solid rgba(160, 180, 210, 0.5);
    aspect-ratio: 1;
    margin-bottom: 14px;
    background: rgba(0, 0, 0, 0.3);
    max-width: 560px;
    width: 100%;
    position: relative;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(15px, 3.8vw, 22px);
    font-weight: 400;
    background: transparent;
    border: 1px solid rgba(160, 180, 210, 0.08);
    cursor: pointer;
    aspect-ratio: 1;
    color: rgba(212, 216, 224, 0.9);
    font-family: 'Georgia', serif;
    transition: background 0.15s;
    position: relative;
  }
  .cell:nth-child(3n) { border-right: 1px solid rgba(160, 180, 210, 0.4); }
  .cell:nth-child(9n) { border-right: 1px solid rgba(160, 180, 210, 0.08); }
  .row-3 { border-bottom: 1px solid rgba(160, 180, 210, 0.4) !important; }
  .cell.fixed {
    color: #e0e6ee;
    font-weight: 500;
    background: rgba(160, 180, 210, 0.05);
  }
  .cell.selected {
    background: rgba(160, 100, 100, 0.35) !important;
    box-shadow: 0 0 12px rgba(200, 130, 130, 0.4) inset;
  }
  .cell.highlight { background: rgba(160, 180, 210, 0.08); }
  .cell.same-num { background: rgba(160, 180, 210, 0.15); }
  .cell.error { color: #ff8080; text-shadow: 0 0 10px rgba(255, 128, 128, 0.4); }
  .cell:not(.fixed):hover { background: rgba(160, 180, 210, 0.08); }
  .cell.box-solved {
    background: rgba(180, 150, 100, 0.14);
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
    margin-bottom: 12px;
    max-width: 560px;
    width: 100%;
  }
  .numpad button {
    padding: 9px 0;
    font-size: 16px;
    font-weight: 500;
    background: rgba(160, 180, 210, 0.1);
    color: #d4d8e0;
    border: 1px solid rgba(160, 180, 210, 0.2);
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.15s;
  }
  .numpad button:hover {
    background: rgba(160, 180, 210, 0.25);
    border-color: rgba(160, 180, 210, 0.5);
  }
  .actions {
    display: flex;
    gap: 6px;
    max-width: 560px;
    width: 100%;
    flex-wrap: wrap;
  }
  .actions button {
    flex: 1;
    padding: 8px 0;
    font-size: 12px;
    letter-spacing: 2px;
    border: 1px solid rgba(160, 180, 210, 0.3);
    border-radius: 2px;
    cursor: pointer;
    background: transparent;
    color: rgba(212, 216, 224, 0.85);
    font-family: inherit;
    transition: all 0.15s;
    min-width: 60px;
  }
  .actions button:hover:not(:disabled) { background: rgba(160, 180, 210, 0.1); }
  .actions button:disabled { opacity: 0.35; cursor: not-allowed; }
  .actions button.accuse {
    background: rgba(160, 60, 60, 0.4);
    border-color: rgba(200, 100, 100, 0.6);
    color: #ffb0b0;
  }
  .actions button.accuse:hover:not(:disabled) { background: rgba(200, 80, 80, 0.5); }

  .message {
    text-align: center;
    padding: 6px;
    margin-top: 8px;
    border-radius: 2px;
    font-size: 13px;
    letter-spacing: 2px;
    min-height: 22px;
    color: rgba(212, 216, 224, 0.7);
  }
  .message.info { color: #a0c8e8; }
  .message.error { color: #ff9090; }

  /* Clue toast */
  .clue-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: #e8e0d0;
    color: #2a2418;
    padding: 24px 30px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(200, 170, 130, 0.3);
    border: 1px solid #a09070;
    z-index: 200;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    font-family: 'Georgia', 'Songti SC', serif;
  }
  .clue-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
    cursor: pointer;
  }
  .clue-toast .location {
    font-size: 11px;
    letter-spacing: 4px;
    color: #907050;
    margin-bottom: 4px;
  }
  .clue-toast .head {
    font-size: 16px;
    letter-spacing: 3px;
    color: #2a2418;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(160, 144, 112, 0.4);
  }
  .clue-toast .body {
    font-size: 15px;
    line-height: 1.8;
    letter-spacing: 1px;
  }
  .clue-toast .foot {
    font-size: 10px;
    color: #907050;
    margin-top: 14px;
    text-align: right;
    letter-spacing: 2px;
  }

  /* Modal (clue log) */
  .modal-mask {
    position: fixed;
    inset: 0;
    background: rgba(5, 10, 20, 0.85);
    backdrop-filter: blur(6px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-mask.show { display: flex; }
  .modal {
    background: #e8e0d0;
    color: #2a2418;
    padding: 28px 26px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid #a09070;
    font-family: 'Georgia', 'Songti SC', serif;
  }
  .modal h3 {
    font-size: 18px;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .modal .modal-sub {
    font-size: 12px;
    color: #907050;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(160, 144, 112, 0.4);
  }
  .clue-item {
    padding: 12px 0;
    border-bottom: 1px dashed rgba(160, 144, 112, 0.4);
    display: flex;
    gap: 12px;
    line-height: 1.6;
  }
  .clue-item:last-child { border-bottom: none; }
  .clue-location {
    color: #907050;
    font-size: 12px;
    font-weight: bold;
    min-width: 60px;
    letter-spacing: 1px;
  }
  .clue-body-inner { color: #2a2418; font-size: 14px; flex: 1; }
  .clue-body-inner.locked { color: #907050; opacity: 0.55; font-style: italic; }
  .modal-close {
    display: block;
    margin: 20px auto 0;
    background: none;
    border: 1px solid #6b5d40;
    color: #2a2418;
    padding: 8px 22px;
    font-family: inherit;
    letter-spacing: 3px;
    cursor: pointer;
    font-size: 13px;
  }
  .modal-close:hover { background: rgba(107, 93, 64, 0.1); }

  /* Verdict */
  #screen-verdict, #screen-result { justify-content: flex-start; padding-top: 60px; z-index: 2; }
  .verdict-title {
    font-size: 22px;
    letter-spacing: 6px;
    color: #e0e6ee;
    margin-bottom: 8px;
  }
  .verdict-sub {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(160, 180, 210, 0.6);
    margin-bottom: 30px;
    text-align: center;
    max-width: 500px;
    line-height: 1.8;
  }
  .verdict-section {
    width: 100%;
    max-width: 640px;
    margin-bottom: 24px;
  }
  .verdict-section h4 {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(160, 180, 210, 0.75);
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .choice {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(160, 180, 210, 0.2);
    color: #d4d8e0;
    padding: 14px 12px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    text-align: center;
    transition: all 0.2s;
  }
  .choice:hover { background: rgba(160, 180, 210, 0.08); border-color: rgba(160, 180, 210, 0.5); }
  .choice.selected {
    background: rgba(160, 60, 60, 0.3);
    border-color: rgba(200, 100, 100, 0.7);
    box-shadow: 0 0 12px rgba(200, 100, 100, 0.3);
  }
  .choice .avatar { font-size: 26px; margin-bottom: 6px; }
  .choice .name { font-size: 15px; letter-spacing: 2px; margin-bottom: 3px; }
  .choice .role { font-size: 11px; color: rgba(212, 216, 224, 0.5); letter-spacing: 1px; margin-bottom: 6px; }
  .choice .desc { font-size: 12px; color: rgba(212, 216, 224, 0.6); line-height: 1.5; }
  .verdict-submit { margin-top: 20px; }

  /* Result */
  .result-title {
    font-size: 26px;
    letter-spacing: 8px;
    margin-bottom: 24px;
  }
  .result-title.win { color: #a0e0c0; }
  .result-title.lose { color: #ffa090; }
  .result-body {
    max-width: 560px;
    line-height: 2.2;
    font-size: 16px;
    color: rgba(212, 216, 224, 0.9);
    margin-bottom: 40px;
    letter-spacing: 1px;
    text-align: left;
    padding: 0 20px;
  }
  .result-body p { margin: 4px 0; }
  .result-body p.gap { height: 14px; }
  .result-body p.emph { color: #a0c8e8; font-style: italic; }
  .result-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* Landscape */
  @media (orientation: landscape) and (max-height: 550px) {
    #screen-game { padding-top: 30px; }
    .game-header, .info, .difficulty, .board, .numpad, .actions { max-width: 500px; }
    .board { width: min(500px, 62vh); }
  }
  @media (max-width: 500px) {
    .verdict-title { font-size: 18px; letter-spacing: 4px; }
    .choice-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .choice { padding: 10px 8px; }
    .clue-toast .body { font-size: 14px; }
  }
</style>
</head>
<body>
<a href="index.html" class="back-link">← 荔枝游戏</a>
<div class="snow" id="snow"></div>
<div id="app">

<!-- Title -->
<div id="screen-title" class="screen active">
  <div class="title-time">凌晨 · 三时 · 二十分</div>
  <h1 class="title-main">雪 夜 列 车</h1>
  <div class="title-sub">京沪线 · 山中停驻 · 一夜风雪</div>
  <div class="intro-text" id="introText"></div>
  <div class="rules-card">
    <div class="rules-header">— 你 需 要 知 道 —</div>
    <ul>
      <li>眼前的数独盘 = <b>车厢搜查图</b></li>
      <li>每填对一个 <b>3×3 宫</b> → 搜清一处地方，掉出一条<b>线索</b></li>
      <li>凑齐九处线索后，进入<b>推理定案</b>：指出凶手 · 说明手法</li>
      <li>也可以随时点<b>"推理定案"</b>提前指控——你有把握就下</li>
    </ul>
  </div>
  <button class="cold-btn" id="startBtn">登 车 调 查</button>
</div>

<!-- Game -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <span class="game-title">❄ 雪夜列车 · 车厢搜查图</span>
    <button class="clue-btn" id="clueBtn">线索簿 <span class="badge" id="clueBadge">0/9</span></button>
  </div>
  <div class="info">
    <span>时辰 <b id="timer">00:00</b></span>
    <span>差错 <b id="mistakes">0</b></span>
    <span>已搜 <b id="searched">0</b>/9 处</span>
  </div>
  <div class="difficulty">
    <button data-level="easy" class="active">简单 · 40 处已知</button>
    <button data-level="medium">中等 · 32 处已知</button>
    <button data-level="hard">困难 · 26 处已知</button>
    <button data-level="expert">专家 · 22 处已知</button>
  </div>
  <div class="board" id="board"></div>
  <div class="numpad" id="numpad"></div>
  <div class="actions">
    <button id="newGame">重启调查</button>
    <button id="erase">擦除</button>
    <button id="hint">直觉</button>
    <button id="check">核对</button>
    <button id="accuseBtn" class="accuse">推理定案</button>
  </div>
  <div class="message" id="message"></div>
</div>

<!-- Verdict -->
<div id="screen-verdict" class="screen">
  <h2 class="verdict-title">推 · 理 · 定 案</h2>
  <p class="verdict-sub" id="verdictSub"></p>

  <div class="verdict-section">
    <h4>凶手</h4>
    <div class="choice-grid" id="suspectGrid"></div>
  </div>

  <div class="verdict-section">
    <h4>手法</h4>
    <div class="choice-grid" id="methodGrid"></div>
  </div>

  <div class="verdict-submit">
    <button class="cold-btn" id="submitVerdictBtn" disabled>正式指控</button>
    <button class="cold-btn small" id="backToGameBtn" style="margin-left: 10px;">继续调查</button>
  </div>
</div>

<!-- Result -->
<div id="screen-result" class="screen">
  <h2 class="result-title" id="resultTitle"></h2>
  <div class="result-body" id="resultBody"></div>
  <div class="result-actions">
    <button class="cold-btn small" id="replayBtn">另立新案</button>
    <button class="cold-btn small" id="homeBtn">回菜单</button>
  </div>
</div>

<!-- Clue toast + modal -->
<div class="clue-toast" id="clueToast">
  <div class="location" id="clueToastLoc"></div>
  <div class="head" id="clueToastHead">— 搜查结果 —</div>
  <div class="body" id="clueToastBody"></div>
  <div class="foot">点击继续</div>
</div>

<div class="modal-mask" id="clueModal">
  <div class="modal">
    <h3>线 索 簿</h3>
    <div class="modal-sub">数独盘的每个 3×3 宫 = 车厢的一处位置。填完即搜清</div>
    <div id="clueList"></div>
    <button class="modal-close" id="closeClueBtn">合上</button>
  </div>
</div>

</div>

<script>
// ============ Story ============

// ============ Sudoku core ============
const N = 9;
let puzzle, solution, userBoard, fixed;
let selected = null;
let mistakes = 0, seconds = 0;
let timerId = null;
let difficulty = 'easy';
let solved = false;
let unlockedBoxes;  // Set of box indices (0-8) unlocked
let clueQueue = [];
let showingClue = false;
const DIFFICULTY = { easy: 40, medium: 32, hard: 26, expert: 22 };

function createEmpty() { return Array.from({length: N}, () => Array(N).fill(0)); }
function isValid(g, r, c, n) {
  for (let i = 0; i < N; i++) if (g[r][i] === n || g[i][c] === n) return false;
  const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
  for (let i = 0; i < 3; i++)
    for (let j = 0; j < 3; j++)
      if (g[br+i][bc+j] === n) return false;
  return true;
}
function solveGrid(g) {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (g[r][c] === 0) {
        const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
        for (const n of nums) {
          if (isValid(g, r, c, n)) {
            g[r][c] = n;
            if (solveGrid(g)) return true;
            g[r][c] = 0;
          }
        }
        return false;
      }
  return true;
}
function countSolutions(g, limit = 2) {
  let count = 0;
  function bt() {
    if (count >= limit) return;
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (g[r][c] === 0) {
          for (let n = 1; n <= 9; n++)
            if (isValid(g, r, c, n)) {
              g[r][c] = n;
              bt();
              g[r][c] = 0;
              if (count >= limit) return;
            }
          return;
        }
    count++;
  }
  bt();
  return count;
}
function generatePuzzle(clues) {
  const grid = createEmpty();
  solveGrid(grid);
  solution = grid.map(r => [...r]);
  const puz = grid.map(r => [...r]);
  const positions = Array.from({length: 81}, (_, i) => i).sort(() => Math.random() - 0.5);
  let removed = 0;
  const target = 81 - clues;
  for (const p of positions) {
    if (removed >= target) break;
    const r = Math.floor(p/9), c = p%9;
    const backup = puz[r][c];
    puz[r][c] = 0;
    const copy = puz.map(x => [...x]);
    if (countSolutions(copy) !== 1) puz[r][c] = backup;
    else removed++;
  }
  return puz;
}

// ============ DOM ============
const boardEl = document.getElementById('board');
const numpadEl = document.getElementById('numpad');
const timerEl = document.getElementById('timer');
const mistakesEl = document.getElementById('mistakes');
const searchedEl = document.getElementById('searched');
const messageEl = document.getElementById('message');
const clueBadge = document.getElementById('clueBadge');
const introText = document.getElementById('introText');
const clueToast = document.getElementById('clueToast');
const clueToastLoc = document.getElementById('clueToastLoc');
const clueToastBody = document.getElementById('clueToastBody');
const clueModal = document.getElementById('clueModal');
const clueList = document.getElementById('clueList');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============ Render ============
function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r === 2 || r === 5) cell.classList.add('row-3');
      if (fixed[r][c]) cell.classList.add('fixed');
      const boxIdx = Math.floor(r/3)*3 + Math.floor(c/3);
      if (unlockedBoxes.has(boxIdx)) cell.classList.add('box-solved');
      cell.textContent = userBoard[r][c] || '';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => selectCell(r, c));
      boardEl.appendChild(cell);
    }
  applyHighlights();
}

function selectCell(r, c) { selected = { r, c }; applyHighlights(); }

function applyHighlights() {
  const cells = boardEl.children;
  for (let i = 0; i < 81; i++) cells[i].classList.remove('selected', 'highlight', 'same-num', 'error');
  if (!selected) return;
  const { r, c } = selected;
  const val = userBoard[r][c];
  const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
  for (let i = 0; i < 9; i++)
    for (let j = 0; j < 9; j++) {
      const idx = i*9+j;
      if (i === r || j === c || (i >= br && i < br+3 && j >= bc && j < bc+3)) cells[idx].classList.add('highlight');
      if (val && userBoard[i][j] === val) cells[idx].classList.add('same-num');
      if (userBoard[i][j] !== 0 && !fixed[i][j] && userBoard[i][j] !== solution[i][j]) cells[idx].classList.add('error');
    }
  cells[r*9+c].classList.add('selected');
}

function placeNumber(n) {
  if (!selected || solved) return;
  const { r, c } = selected;
  if (fixed[r][c]) return;
  if (n !== 0 && userBoard[r][c] !== n && n !== solution[r][c]) {
    mistakes++;
    mistakesEl.textContent = mistakes;
  }
  userBoard[r][c] = n;
  render();
  checkBoxUnlocks();
  if (isComplete()) {
    stopTimer();
    solved = true;
    showMessage('全盘搜清 · 请你推理定案', 'info');
  }
}

function isBoxComplete(boxIdx) {
  const br = Math.floor(boxIdx / 3) * 3;
  const bc = (boxIdx % 3) * 3;
  for (let i = 0; i < 3; i++)
    for (let j = 0; j < 3; j++)
      if (userBoard[br+i][bc+j] !== solution[br+i][bc+j]) return false;
  return true;
}

function checkBoxUnlocks() {
  for (let bi = 0; bi < 9; bi++) {
    if (unlockedBoxes.has(bi)) continue;
    if (isBoxComplete(bi)) {
      unlockedBoxes.add(bi);
      queueClueToast(STORY.clues[bi]);
    }
  }
  searchedEl.textContent = unlockedBoxes.size;
  clueBadge.textContent = `${unlockedBoxes.size}/9`;
}

function queueClueToast(clue) {
  clueQueue.push(clue);
  if (!showingClue) processClueQueue();
}
function processClueQueue() {
  if (!clueQueue.length) { showingClue = false; return; }
  showingClue = true;
  const clue = clueQueue.shift();
  clueToastLoc.textContent = `— ${clue.loc} —`;
  clueToastBody.textContent = clue.text;
  clueToast.classList.add('show');
  let done = false;
  const dismiss = () => {
    if (done) return;
    done = true;
    clueToast.classList.remove('show');
    clueToast.removeEventListener('click', dismiss);
    clearTimeout(timer);
    setTimeout(processClueQueue, 400);
  };
  clueToast.addEventListener('click', dismiss);
  const timer = setTimeout(dismiss, 4500);
}

function isComplete() {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (userBoard[r][c] !== solution[r][c]) return false;
  return true;
}

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = 'message ' + (type || '');
}

function newGame() {
  solved = false;
  showMessage('新盘布置中……', '');
  setTimeout(() => {
    puzzle = generatePuzzle(DIFFICULTY[difficulty]);
    userBoard = puzzle.map(r => [...r]);
    fixed = puzzle.map(r => r.map(v => v !== 0));
    mistakes = 0;
    seconds = 0;
    selected = null;
    unlockedBoxes = new Set();
    clueQueue = [];
    showingClue = false;
    clueToast.classList.remove('show');
    mistakesEl.textContent = '0';
    timerEl.textContent = '00:00';
    searchedEl.textContent = '0';
    clueBadge.textContent = '0/9';
    showMessage('', '');
    render();
    startTimer();
  }, 50);
}

function startTimer() {
  stopTimer();
  timerId = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    timerEl.textContent = `${m}:${s}`;
  }, 1000);
}
function stopTimer() { if (timerId) clearInterval(timerId); timerId = null; }

function buildNumpad() {
  for (let n = 1; n <= 9; n++) {
    const b = document.createElement('button');
    b.textContent = n;
    b.addEventListener('click', () => placeNumber(n));
    numpadEl.appendChild(b);
  }
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  if (!selected) return;
  if (e.key >= '1' && e.key <= '9') placeNumber(parseInt(e.key));
  else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') placeNumber(0);
  else if (e.key.startsWith('Arrow')) {
    let { r, c } = selected;
    if (e.key === 'ArrowUp') r = (r+8)%9;
    if (e.key === 'ArrowDown') r = (r+1)%9;
    if (e.key === 'ArrowLeft') c = (c+8)%9;
    if (e.key === 'ArrowRight') c = (c+1)%9;
    selectCell(r, c);
    e.preventDefault();
  }
});

document.getElementById('newGame').addEventListener('click', newGame);
document.getElementById('erase').addEventListener('click', () => placeNumber(0));
document.getElementById('hint').addEventListener('click', () => {
  if (!selected) { showMessage('先选一格', 'error'); return; }
  const { r, c } = selected;
  if (fixed[r][c] || solved) return;
  userBoard[r][c] = solution[r][c];
  render();
  checkBoxUnlocks();
  if (isComplete()) { stopTimer(); solved = true; showMessage('全盘搜清', 'info'); }
});
document.getElementById('check').addEventListener('click', () => {
  let errors = 0;
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (userBoard[r][c] !== 0 && userBoard[r][c] !== solution[r][c]) errors++;
  if (errors === 0) showMessage('☾ 目前无差错', 'info');
  else showMessage(`✗ 现有 ${errors} 处错位`, 'error');
});

document.querySelectorAll('.difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.level;
    newGame();
  });
});

// Clue log modal
document.getElementById('clueBtn').addEventListener('click', () => {
  renderClueList();
  clueModal.classList.add('show');
});
document.getElementById('closeClueBtn').addEventListener('click', () => clueModal.classList.remove('show'));
clueModal.addEventListener('click', e => { if (e.target === clueModal) clueModal.classList.remove('show'); });

function renderClueList() {
  clueList.innerHTML = STORY.clues.map((c, i) => {
    const unlocked = unlockedBoxes.has(i);
    return `<div class="clue-item">
      <span class="clue-location">${c.loc}</span>
      <span class="clue-body-inner ${unlocked ? '' : 'locked'}">${unlocked ? c.text : '尚未搜查……'}</span>
    </div>`;
  }).join('');
}

// ============ Verdict ============
let selectedSuspect = null, selectedMethod = null;

function initVerdict() {
  document.getElementById('verdictSub').textContent =
    `你已搜清 ${unlockedBoxes.size}/9 处 · 差错 ${mistakes} 次。凶手是谁？用了什么手法？`;
  const sg = document.getElementById('suspectGrid');
  sg.innerHTML = STORY.suspects.map(s => `
    <button class="choice" data-sus="${s.id}">
      <div class="avatar">${s.avatar}</div>
      <div class="name">${s.name}</div>
      <div class="role">${s.role}</div>
      <div class="desc">${s.desc}</div>
    </button>`).join('');
  sg.querySelectorAll('.choice').forEach(b => {
    b.addEventListener('click', () => {
      sg.querySelectorAll('.choice').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedSuspect = b.dataset.sus;
      updateSubmit();
    });
  });
  const mg = document.getElementById('methodGrid');
  mg.innerHTML = STORY.methods.map(m => `
    <button class="choice" data-mtd="${m.id}">
      <div class="name">${m.name}</div>
      <div class="desc">${m.desc}</div>
    </button>`).join('');
  mg.querySelectorAll('.choice').forEach(b => {
    b.addEventListener('click', () => {
      mg.querySelectorAll('.choice').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedMethod = b.dataset.mtd;
      updateSubmit();
    });
  });
  selectedSuspect = null; selectedMethod = null;
  updateSubmit();
}

function updateSubmit() {
  document.getElementById('submitVerdictBtn').disabled = !selectedSuspect || !selectedMethod;
}

function submitVerdict() {
  const correct = selectedSuspect === STORY.answer.suspect && selectedMethod === STORY.answer.method;
  const titleEl = document.getElementById('resultTitle');
  const bodyEl = document.getElementById('resultBody');
  if (correct) {
    titleEl.textContent = '真 相 大 白';
    titleEl.className = 'result-title win';
    bodyEl.innerHTML = STORY.correct.map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
  } else {
    const sName = STORY.suspects.find(s => s.id === selectedSuspect).name;
    const mName = STORY.methods.find(m => m.id === selectedMethod).name;
    titleEl.textContent = '你 错 了';
    titleEl.className = 'result-title lose';
    bodyEl.innerHTML = STORY.wrong(sName, mName).map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
  }
  showScreen('screen-result');
}

document.getElementById('accuseBtn').addEventListener('click', () => {
  initVerdict();
  showScreen('screen-verdict');
});
document.getElementById('backToGameBtn').addEventListener('click', () => showScreen('screen-game'));
document.getElementById('submitVerdictBtn').addEventListener('click', submitVerdict);
document.getElementById('replayBtn').addEventListener('click', () => { newGame(); showScreen('screen-game'); });
document.getElementById('homeBtn').addEventListener('click', () => { window.location.href = 'index.html'; });

document.getElementById('startBtn').addEventListener('click', () => {
  newGame();
  showScreen('screen-game');
});

// ============ Init ============
function initIntro() {
  introText.innerHTML = STORY.intro.map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
}
function initSnow() {
  const snowEl = document.getElementById('snow');
  const flakes = 40;
  for (let i = 0; i < flakes; i++) {
    const s = document.createElement('span');
    s.textContent = ['❅','❆','·','·','.'][Math.floor(Math.random()*5)];
    s.style.left = Math.random() * 100 + '%';
    s.style.fontSize = (8 + Math.random() * 10) + 'px';
    s.style.animationDuration = (10 + Math.random() * 15) + 's';
    s.style.animationDelay = (Math.random() * -25) + 's';
    s.style.opacity = 0.2 + Math.random() * 0.5;
    snowEl.appendChild(s);
  }
}

initIntro();
initSnow();
buildNumpad();
// newGame not called until user clicks start
unlockedBoxes = new Set();
userBoard = createEmpty();
fixed = userBoard.map(r => r.map(_ => false));
solution = createEmpty();
</script>
