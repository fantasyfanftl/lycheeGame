<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回荔枝游戏</a>
  <h1>星 辰 命 盘</h1>
  <div class="subtitle">九星入盘 · 为你排一次命</div>
  <div class="info">
    <span>时辰 <b id="timer">00:00</b></span>
    <span>差错 <b id="mistakes">0</b></span>
  </div>
  <div class="difficulty">
    <button data-level="easy" class="active">初 · 星海入门</button>

    <button data-level="expert">极 · 逆天改命</button>
  </div>
  <div class="board" id="board"></div>
  <div class="numpad" id="numpad"></div>
  <div class="actions">
    <button id="newGame" class="primary">重排星盘</button>
    <button id="erase">擦除</button>
    <button id="hint">天机</button>
    <button id="check">观星</button>
  </div>

</div>

<div class="modal-mask" id="revealModal">
  <div class="modal">
    <div class="star-decoration">✦ ✧ ✦</div>
    <h2>你 的 命 盘</h2>

      <span class="star-label">— 主 星 —</span>
      <span class="star-name" id="mainStar"></span>

    <div class="scenario">
      <span class="scenario-label">— 局 面 —</span>
      <span class="scenario-name" id="scenarioName"></span>

    </div>

      <button id="newPuzzleBtn">重排星盘</button>

<script>
// ============ Sudoku core ============
const N = 9;
let puzzle, solution, userBoard, fixed;
let selected = null;
let mistakes = 0;
let seconds = 0;
let timerId = null;
let difficulty = 'easy';
let solved = false;
const DIFFICULTY = { easy: 40, medium: 32, hard: 26, expert: 22 };

function createEmpty() {
  return Array.from({length: N}, () => Array(N).fill(0));
}

function isValid(g, r, c, n) {
  for (let i = 0; i < N; i++) if (g[r][i] === n || g[i][c] === n) return false;
  const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
  for (let i = 0; i < 3; i++)
    for (let j = 0; j < 3; j++)
      if (g[br+i][bc+j] === n) return false;
  return true;
}

function solveGrid(g) {
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (g[r][c] === 0) {
        const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
        for (const n of nums) {
          if (isValid(g, r, c, n)) {
            g[r][c] = n;
            if (solveGrid(g)) return true;
            g[r][c] = 0;
          }
        }
        return false;
      }
    }
  }
  return true;
}

function countSolutions(g, limit = 2) {
  let count = 0;
  function bt() {
    if (count >= limit) return;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        if (g[r][c] === 0) {
          for (let n = 1; n <= 9; n++) {
            if (isValid(g, r, c, n)) {
              g[r][c] = n;
              bt();
              g[r][c] = 0;
              if (count >= limit) return;
            }
          }
          return;
        }
      }
    }
    count++;
  }
  bt();
  return count;
}

function generatePuzzle(clues) {
  const grid = createEmpty();
  solveGrid(grid);
  solution = grid.map(r => [...r]);
  const puz = grid.map(r => [...r]);
  const positions = Array.from({length: 81}, (_, i) => i).sort(() => Math.random() - 0.5);
  let removed = 0;
  const target = 81 - clues;
  for (const p of positions) {
    if (removed >= target) break;
    const r = Math.floor(p/9), c = p%9;
    const backup = puz[r][c];
    puz[r][c] = 0;
    const copy = puz.map(x => [...x]);
    if (countSolutions(copy) !== 1) {
      puz[r][c] = backup;
    } else {
      removed++;
    }
  }
  return puz;
}

// ============ Render ============
const boardEl = document.getElementById('board');
const numpadEl = document.getElementById('numpad');
const timerEl = document.getElementById('timer');
const mistakesEl = document.getElementById('mistakes');
const messageEl = document.getElementById('message');

function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r === 2 || r === 5) cell.classList.add('row-3');
      if (fixed[r][c]) cell.classList.add('fixed');
      cell.textContent = userBoard[r][c] || '';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => selectCell(r, c));
      boardEl.appendChild(cell);
    }
  }
  applyHighlights();
}

function selectCell(r, c) {
  selected = { r, c };
  applyHighlights();
}

function applyHighlights() {
  const cells = boardEl.children;
  for (let i = 0; i < 81; i++) {
    cells[i].classList.remove('selected', 'highlight', 'same-num', 'error');
  }
  if (!selected) return;
  const { r, c } = selected;
  const val = userBoard[r][c];
  const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
  for (let i = 0; i < 9; i++) {
    for (let j = 0; j < 9; j++) {
      const idx = i*9+j;
      if (i === r || j === c || (i >= br && i < br+3 && j >= bc && j < bc+3)) {
        cells[idx].classList.add('highlight');
      }
      if (val && userBoard[i][j] === val) cells[idx].classList.add('same-num');
      if (userBoard[i][j] !== 0 && !fixed[i][j] && userBoard[i][j] !== solution[i][j]) {
        cells[idx].classList.add('error');
      }
    }
  }
  cells[r*9+c].classList.add('selected');
}

function placeNumber(n) {
  if (!selected || solved) return;
  const { r, c } = selected;
  if (fixed[r][c]) return;
  if (n !== 0 && userBoard[r][c] !== n && n !== solution[r][c]) {
    mistakes++;
    mistakesEl.textContent = mistakes;
  }
  userBoard[r][c] = n;
  render();
  if (isComplete()) {
    stopTimer();
    solved = true;
    showMessage('星盘归位 · 天机将现', 'success');
    setTimeout(showReveal, 700);
  }
}

function isComplete() {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (userBoard[r][c] !== solution[r][c]) return false;
  return true;
}

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = 'message ' + (type || '');
}

function newGame() {
  showMessage('星盘排布中……', '');
  solved = false;
  setTimeout(() => {
    puzzle = generatePuzzle(DIFFICULTY[difficulty]);
    userBoard = puzzle.map(r => [...r]);
    fixed = puzzle.map(r => r.map(v => v !== 0));
    mistakes = 0;
    seconds = 0;
    selected = null;
    mistakesEl.textContent = '0';
    timerEl.textContent = '00:00';
    showMessage('', '');
    render();
    startTimer();
    hideReveal();
  }, 50);
}

function startTimer() {
  stopTimer();
  timerId = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    timerEl.textContent = `${m}:${s}`;
  }, 1000);
}
function stopTimer() { if (timerId) clearInterval(timerId); timerId = null; }

function buildNumpad() {
  for (let n = 1; n <= 9; n++) {
    const b = document.createElement('button');
    b.textContent = n;
    b.addEventListener('click', () => placeNumber(n));
    numpadEl.appendChild(b);
  }
}

document.addEventListener('keydown', e => {
  if (!selected) return;
  if (e.key >= '1' && e.key <= '9') placeNumber(parseInt(e.key));
  else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') placeNumber(0);
  else if (e.key.startsWith('Arrow')) {
    let { r, c } = selected;
    if (e.key === 'ArrowUp') r = (r+8)%9;
    if (e.key === 'ArrowDown') r = (r+1)%9;
    if (e.key === 'ArrowLeft') c = (c+8)%9;
    if (e.key === 'ArrowRight') c = (c+1)%9;
    selectCell(r, c);
    e.preventDefault();
  }
});

document.getElementById('newGame').addEventListener('click', newGame);
document.getElementById('erase').addEventListener('click', () => placeNumber(0));
document.getElementById('hint').addEventListener('click', () => {
  if (!selected) { showMessage('先选一格', 'error'); return; }
  const { r, c } = selected;
  if (fixed[r][c] || solved) return;
  userBoard[r][c] = solution[r][c];
  render();
  if (isComplete()) {
    stopTimer(); solved = true;
    showMessage('星盘归位 · 天机将现', 'success');
    setTimeout(showReveal, 700);
  }
});
document.getElementById('check').addEventListener('click', () => {
  let errors = 0;
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (userBoard[r][c] !== 0 && userBoard[r][c] !== solution[r][c]) errors++;
  if (errors === 0) showMessage('☾ 目前无差错', 'success');
  else showMessage(`✗ 现有 ${errors} 处错位`, 'error');
});

document.querySelectorAll('.difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.level;
    newGame();
  });
});

function pickScenario(seconds, mistakes, difficulty) {
  if (difficulty === 'expert' && mistakes === 0) return '紫微入命';
  const fast = seconds < 240, medium = seconds < 720;
  if (mistakes >= 4) return '跌撞前行';
  if (mistakes === 0) {
    if (fast) return '少年得志';
    if (!medium) return '深水静流';
    return '水到渠成';
  }
  // 1-3 errors
  if (fast) return '锋芒毕露';
  return '跌撞前行';
}

function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

let currentScenario = null;

function generateFortune(reshuffle = false) {
  const scenarioKey = pickScenario(seconds, mistakes, difficulty);
  currentScenario = scenarioKey;
  const s = SCENARIOS[scenarioKey];

  // 主星 = 中宫 grid[4][4] 的值决定
  const centerVal = solution[4][4];
  const star = scenarioKey === '紫微入命' ? BONUS_STAR : NINE_STARS[centerVal - 1];

  // 从场景池里取 3 条宜、3 条忌、1 首诗
  const seed = reshuffle
    ? (seconds * 31 + mistakes * 137 + Math.floor(Date.now() / 100))
    : (seconds * 31 + mistakes * 137 + centerVal * 991 + difficulty.length * 7);
  const rand = mulberry32(seed);
  const pick = (arr, n = 1) => {
    const shuffled = [...arr].sort(() => rand() - 0.5);
    return n === 1 ? shuffled[0] : shuffled.slice(0, n);
  };

  const auspicious = pick(s.auspicious, Math.min(3, s.auspicious.length));
  const avoid = pick(s.avoid, Math.min(3, s.avoid.length));
  const poem = pick(s.poems);

  // 运势星级：错误越少越高
  let luck;
  if (scenarioKey === '紫微入命') luck = 5;
  else if (mistakes === 0) luck = 5;
  else if (mistakes <= 2) luck = 4;
  else if (mistakes <= 5) luck = 3;
  else luck = 2;

  return {
    star, scenario: scenarioKey, scenarioDesc: s.desc,
    centerVal, auspicious, avoid, poem, luck,
    stats: { seconds, mistakes, difficulty }
  };
}

function renderFortune(f) {
  document.getElementById('mainStar').textContent = f.star.name;
  document.getElementById('starTrait').textContent = f.star.trait;
  document.getElementById('starReason').textContent = f.scenario === '紫微入命'
    ? '极难 · 零差错 · 破天而入'
    : `中宫落 ${f.centerVal} · 星入命宫`;
  document.getElementById('scenarioName').textContent = f.scenario;
  document.getElementById('scenarioDesc').textContent = f.scenarioDesc;
  const timeStr = `${Math.floor(f.stats.seconds/60)}分${f.stats.seconds%60}秒`;
  document.getElementById('scenarioStat').textContent = `你用 ${timeStr}，错 ${f.stats.mistakes} 处`;
  document.getElementById('auspiciousList').innerHTML = f.auspicious.map(item =>
    `<li><span class="fortune-text">${item.t}</span><span class="fortune-why">${item.why}</span></li>`
  ).join('');
  document.getElementById('avoidList').innerHTML = f.avoid.map(item =>
    `<li><span class="fortune-text">${item.t}</span><span class="fortune-why">${item.why}</span></li>`
  ).join('');
  document.getElementById('poem').textContent = f.poem;
  document.getElementById('luckStars').textContent = '★'.repeat(f.luck) + '☆'.repeat(5 - f.luck);
}

function showReveal() {
  const f = generateFortune();
  renderFortune(f);
  document.getElementById('revealModal').classList.add('show');
}
function hideReveal() {
  document.getElementById('revealModal').classList.remove('show');
}
document.getElementById('reshuffleBtn').addEventListener('click', () => {
  const f = generateFortune(true);
  renderFortune(f);
});
document.getElementById('newPuzzleBtn').addEventListener('click', () => {
  hideReveal();
  newGame();
});
document.getElementById('revealModal').addEventListener('click', e => {
  if (e.target.id === 'revealModal') hideReveal();
});
