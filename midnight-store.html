<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>凌晨两点的便利店</title>
<style>
:root {
  --paper: #e8dcc4;
  --paper-warm: #f0dfba;
  --paper-edge: #c9b48a;
  --ink: #3d2f24;
  --ink-mid: #6b5439;
  --ink-light: #9a8464;
  --night: #1a1f2c;
  --night-mid: #2a3448;
  --night-cool: #3a4560;
  --warm-glow: #f5c88a;
  --warm-mid: #d9a760;
  --warm-deep: #a67240;
  --accent: #c17b52;
  --glass-cool: rgba(180, 200, 220, 0.12);
  --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--night);
  color: var(--ink);
  font-family: 'KaiTi', 'STKaiti', '楷体', 'Songti SC', 'FangSong', serif;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  transition: opacity 1.2s ease;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ========== Kraft paper texture ========== */
.paper-tex {
  background-color: var(--paper);
  background-image:
    radial-gradient(ellipse at 20% 30%, rgba(139, 108, 78, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(139, 108, 78, 0.05) 0%, transparent 60%),
    radial-gradient(circle at 40% 60%, rgba(200, 170, 130, 0.08) 0%, transparent 40%);
  background-size: 100% 100%;
}

/* ========== Title screen ========== */
#title-screen {
  background: radial-gradient(ellipse at 50% 45%, #2a3548 0%, var(--night) 75%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--paper);
}

.title-content {
  text-align: center;
  padding: 40px;
  max-width: 600px;
}

.title-time {
  font-size: 14px;
  letter-spacing: 6px;
  color: var(--warm-glow);
  opacity: 0.7;
  margin-bottom: 40px;
}

.title-main {
  font-size: 44px;
  letter-spacing: 10px;
  color: var(--paper);
  text-shadow: 0 0 30px rgba(245, 200, 138, 0.25);
  margin-bottom: 30px;
  font-weight: normal;
}

.title-sub {
  font-size: 16px;
  letter-spacing: 3px;
  color: rgba(232, 220, 196, 0.7);
  line-height: 1.8;
  margin: 6px 0;
}

.title-sub2 {
  font-size: 15px;
  letter-spacing: 2px;
  color: rgba(232, 220, 196, 0.5);
  margin-bottom: 60px;
}

.paper-btn {
  background: var(--paper);
  color: var(--ink);
  border: none;
  padding: 12px 32px;
  font-size: 17px;
  letter-spacing: 4px;
  font-family: inherit;
  cursor: pointer;
  border-radius: 2px;
  box-shadow: 0 2px 12px rgba(245, 200, 138, 0.15);
  transition: all 0.3s ease;
  position: relative;
}

.paper-btn::before {
  content: '';
  position: absolute;
  inset: -2px;
  border: 1px solid rgba(245, 200, 138, 0.3);
  border-radius: 2px;
  pointer-events: none;
}

.paper-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(245, 200, 138, 0.35);
}

/* ========== Game screen ========== */
#game-screen {
  display: flex;
  flex-direction: column;
  background: var(--night);
}

.top-bar {
  height: 50px;
  background: var(--paper);
  border-bottom: 1px solid var(--paper-edge);
  display: flex;
  align-items: center;
  padding: 0 24px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.top-title {
  font-size: 15px;
  letter-spacing: 4px;
  color: var(--ink);
  flex: 1;
}

.cp-counter {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--ink-mid);
  margin-right: 24px;
}

.cp-counter .count {
  color: var(--accent);
  font-size: 16px;
  font-weight: bold;
  padding: 0 2px;
}

.notebook-btn {
  background: none;
  border: 1px solid var(--paper-edge);
  color: var(--ink);
  padding: 6px 14px;
  font-size: 13px;
  letter-spacing: 2px;
  font-family: inherit;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.25s ease;
}

.notebook-btn:hover {
  background: var(--paper-warm);
  border-color: var(--ink-light);
}

.scene-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
  background: var(--night);
  display: flex;
  align-items: center;
  justify-content: center;
}

#scene-svg {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  display: block;
}

/* SVG interactivity */
.hotspot-target {
  cursor: pointer;
}

.hotspot-glow {
  animation: hotspot-pulse 1.8s ease-in-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}

.hotspot-ring {
  animation: hotspot-ripple 1.6s ease-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}

.hotspot-dot {
  animation: hotspot-dot-pulse 1.8s ease-in-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}

@keyframes hotspot-pulse {
  0%, 100% { opacity: 0.45; transform: scale(0.9); }
  50%      { opacity: 0.9;  transform: scale(1.2); }
}

@keyframes hotspot-ripple {
  0%   { transform: scale(0.6); opacity: 0.95; }
  100% { transform: scale(2.4); opacity: 0; }
}

@keyframes hotspot-dot-pulse {
  0%, 100% { opacity: 0.8; }
  50%      { opacity: 1; }
}

.char-svg {
  cursor: default;
  transition: opacity 0.6s ease;
}

.char-svg.dimmed {
  opacity: 0.55;
}

.char-svg.current {
  opacity: 1;
}

.char-svg.clickable {
  cursor: pointer;
}

/* ========== Bottom bar ========== */
.bottom-bar {
  height: 108px;
  background: var(--paper);
  border-top: 1px solid var(--paper-edge);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.pov-indicator {
  min-width: 180px;
  padding: 10px 16px;
  border-right: 1px dashed var(--paper-edge);
  color: var(--ink-mid);
}

.pov-label {
  font-size: 11px;
  letter-spacing: 3px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.pov-name {
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--ink);
}

.pov-hint {
  font-size: 12px;
  letter-spacing: 1px;
  opacity: 0.55;
  margin-top: 6px;
  font-style: italic;
}

.char-tabs {
  display: flex;
  gap: 14px;
  flex: 1;
}

.char-tab {
  background: transparent;
  border: 1px solid var(--paper-edge);
  padding: 10px 14px;
  font-family: inherit;
  cursor: pointer;
  border-radius: 2px;
  color: var(--ink);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 90px;
  opacity: 1;
}

.char-tab.locked {
  opacity: 0.32;
  cursor: not-allowed;
  border-style: dashed;
}

.char-tab.active {
  background: var(--warm-glow);
  border-color: var(--warm-mid);
  box-shadow: 0 2px 8px rgba(245, 200, 138, 0.4);
}

.char-tab.completed:not(.active) {
  background: var(--paper-warm);
  border-color: var(--ink-light);
}

.char-tab:not(.locked):hover {
  transform: translateY(-2px);
}

.char-tab-icon {
  width: 42px;
  height: 42px;
  margin-bottom: 4px;
}

.char-tab-name {
  font-size: 12px;
  letter-spacing: 2px;
}

.char-tab-status {
  font-size: 10px;
  color: var(--ink-mid);
  opacity: 0.7;
  margin-top: 2px;
  letter-spacing: 1px;
}

/* ========== Dialogue overlay ========== */
.dialogue-overlay {
  position: absolute;
  inset: 0;
  background: rgba(20, 25, 40, 0.55);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0 40px 130px;
  z-index: 20;
  transition: opacity 0.5s ease;
}

.dialogue-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.dialogue-box {
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 15% 25%, rgba(139, 108, 78, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(139, 108, 78, 0.07) 0%, transparent 55%);
  border: 1px solid var(--paper-edge);
  max-width: 780px;
  width: 100%;
  padding: 26px 34px 22px;
  border-radius: 3px;
  box-shadow: var(--shadow-soft);
  position: relative;
}

.dialogue-box::before {
  content: '';
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed rgba(139, 108, 78, 0.25);
  pointer-events: none;
  border-radius: 2px;
}

.dialogue-narrator {
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 6px;
}

.dialogue-title {
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--ink);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--paper-edge);
}

.dialogue-text {
  font-size: 16px;
  line-height: 2;
  color: var(--ink);
  letter-spacing: 1px;
  min-height: 100px;
  white-space: pre-wrap;
}

.dialogue-cp {
  margin-top: 16px;
  padding: 10px 14px;
  background: rgba(245, 200, 138, 0.25);
  border-left: 3px solid var(--accent);
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--ink-mid);
  animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.dialogue-continue {
  margin-top: 18px;
  padding: 8px 22px;
  background: transparent;
  color: var(--ink-mid);
  border: 1px solid var(--paper-edge);
  font-family: inherit;
  cursor: pointer;
  font-size: 14px;
  letter-spacing: 3px;
  border-radius: 2px;
  transition: all 0.25s ease;
  float: right;
}

.dialogue-continue:hover {
  background: var(--paper-warm);
  color: var(--ink);
}

/* ========== Choices ========== */
.choice-block {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed var(--paper-edge);
}
.choice-prompt {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--ink-mid);
  margin-bottom: 12px;
  font-style: italic;
}
.choice-option {
  display: block;
  width: 100%;
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid var(--paper-edge);
  color: var(--ink);
  font-family: inherit;
  padding: 10px 14px;
  font-size: 15px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 2px;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.6;
  margin-bottom: 8px;
}
.choice-option:hover {
  background: rgba(245, 200, 138, 0.3);
  border-color: var(--accent);
  transform: translateX(3px);
}
.choice-chosen {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--accent);
  padding: 8px 12px;
  border-left: 2px solid var(--accent);
  margin-top: 6px;
}
.dialogue-continue:disabled,
.dialogue-continue.disabled {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}

/* ========== Toast ========== */
.toast {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--paper);
  padding: 10px 22px;
  border: 1px solid var(--paper-edge);
  border-radius: 2px;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--ink);
  box-shadow: var(--shadow-soft);
  z-index: 30;
  animation: toastIn 0.5s ease, toastOut 0.5s ease 2.6s forwards;
}

@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, -10px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translate(-50%, -10px); }
}

/* ========== Notebook ========== */
#notebook-screen {
  background: rgba(20, 25, 40, 0.85);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}

.notebook {
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(139, 108, 78, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(139, 108, 78, 0.07) 0%, transparent 55%);
  width: min(900px, 92vw);
  max-height: 88vh;
  padding: 40px 48px;
  border-radius: 3px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  position: relative;
  overflow-y: auto;
}

.notebook::before {
  content: '';
  position: absolute;
  top: 12px; left: 12px; right: 12px; bottom: 12px;
  border: 1px dashed rgba(139, 108, 78, 0.3);
  pointer-events: none;
  border-radius: 2px;
}

.notebook-header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px dashed var(--paper-edge);
}

.notebook-title {
  font-size: 26px;
  letter-spacing: 6px;
  color: var(--ink);
  margin-bottom: 8px;
}

.notebook-sub {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--ink-mid);
  opacity: 0.75;
}

.cp-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 24px;
}

.cp-entry {
  border: 1px solid var(--paper-edge);
  padding: 16px 20px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.15);
}

.cp-entry.locked {
  background: transparent;
  border-style: dashed;
  opacity: 0.55;
}

.cp-entry-title {
  font-size: 17px;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 10px;
}

.cp-entry.locked .cp-entry-title {
  color: var(--ink-light);
}

.cp-entry-povs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 8px;
}

.cp-pov {
  padding: 10px 12px;
  border-left: 2px solid var(--paper-edge);
}

.cp-pov-name {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--ink-mid);
  margin-bottom: 6px;
}

.cp-pov-text {
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink);
  letter-spacing: 0.5px;
}

.cp-locked-msg {
  font-size: 13px;
  color: var(--ink-mid);
  font-style: italic;
  letter-spacing: 2px;
  opacity: 0.75;
}

.notebook-close-row {
  text-align: center;
}

/* ========== Ending ========== */
#ending-screen {
  background: radial-gradient(ellipse at 50% 40%, #2a3548 0%, var(--night) 80%);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  color: var(--paper);
  padding: 60px 40px 80px;
  overflow-y: auto;
}

.ending-content {
  max-width: 640px;
  text-align: center;
}

.ending-time {
  font-size: 14px;
  letter-spacing: 6px;
  color: var(--warm-glow);
  opacity: 0.7;
  margin-bottom: 40px;
}

.ending-title {
  font-size: 24px;
  letter-spacing: 5px;
  color: var(--paper);
  margin-bottom: 48px;
  font-weight: normal;
  line-height: 1.8;
}

.ending-text {
  font-size: 16px;
  letter-spacing: 2px;
  line-height: 2.4;
  color: rgba(232, 220, 196, 0.85);
  margin-bottom: 60px;
  white-space: pre-line;
  text-align: left;
}

.ending-text .line {
  opacity: 0;
  animation: lineIn 1.2s ease forwards;
}

@keyframes lineIn {
  to { opacity: 1; }
}

/* Scrollbar */
.notebook::-webkit-scrollbar { width: 6px; }
.notebook::-webkit-scrollbar-thumb { background: var(--paper-edge); border-radius: 3px; }
.notebook::-webkit-scrollbar-track { background: transparent; }

/* ========== Mobile (<= 640px) ========== */
@media (max-width: 640px) {
  .top-bar { padding: 0 12px; height: 46px; }
  .top-title { display: none; }
  .cp-counter { font-size: 12px; margin-right: 8px; flex: 1; }
  .cp-counter .count { font-size: 14px; }
  .notebook-btn { padding: 4px 8px; font-size: 11px; letter-spacing: 1px; margin-right: 6px !important; }

  .bottom-bar { height: auto; padding: 10px 12px; flex-direction: column; align-items: stretch; gap: 10px; }
  .pov-indicator { min-width: 0; border-right: none; border-bottom: 1px dashed var(--paper-edge); padding: 8px 10px; cursor: pointer; user-select: none; border-radius: 4px; transition: background 0.15s; }
  .pov-indicator:active { background: var(--paper-warm); }
  .pov-hint { display: block; font-size: 11px; margin-top: 4px; opacity: 0.75; letter-spacing: 1px; font-style: normal; }
  .scene-wrap { flex: 0 0 auto; width: 100%; aspect-ratio: 1000 / 660; background: #2a3448; }
  #game-screen { background: #1a1f2c; }
  .bottom-bar { margin-top: auto; }
  .char-tabs { gap: 6px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .char-tab { min-width: 68px; padding: 6px 6px; flex-shrink: 0; }
  .char-tab-icon { width: 28px; height: 28px; margin-bottom: 2px; }
  .char-tab-name { font-size: 11px; letter-spacing: 1px; }
  .char-tab-status { font-size: 9px; letter-spacing: 0; margin-top: 1px; }

  .dialogue-overlay { padding: 0 10px 16px; }
  .dialogue-box { padding: 18px 18px 14px; }
  .dialogue-narrator { font-size: 11px; letter-spacing: 3px; }
  .dialogue-title { font-size: 16px; letter-spacing: 2px; margin-bottom: 10px; padding-bottom: 8px; }
  .dialogue-text { font-size: 14px; line-height: 1.9; letter-spacing: 0.5px; min-height: 60px; }
  .dialogue-cp { font-size: 12px; letter-spacing: 1px; padding: 8px 10px; }
  .dialogue-continue { font-size: 12px; padding: 6px 16px; letter-spacing: 2px; }
  .choice-block { margin-top: 12px; padding-top: 10px; }
  .choice-prompt { font-size: 12px; letter-spacing: 1px; margin-bottom: 8px; }
  .choice-option { padding: 8px 12px; font-size: 13px; letter-spacing: 0.5px; line-height: 1.5; }

  .title-content { padding: 24px; }
  .title-time { font-size: 12px; letter-spacing: 4px; margin-bottom: 26px; }
  .title-main { font-size: 30px; letter-spacing: 6px; margin-bottom: 22px; }
  .title-sub { font-size: 13px; letter-spacing: 2px; line-height: 1.7; }
  .title-sub2 { font-size: 12px; margin-bottom: 40px; }
  .paper-btn { padding: 10px 24px; font-size: 15px; letter-spacing: 3px; }

  #ending-screen { padding: 40px 24px 60px; }
  .ending-time { font-size: 12px; letter-spacing: 4px; margin-bottom: 26px; }
  .ending-title { font-size: 18px; letter-spacing: 3px; margin-bottom: 32px; line-height: 1.7; }
  .ending-text { font-size: 14px; letter-spacing: 1px; line-height: 2; margin-bottom: 40px; }

  .notebook { padding: 24px 18px; width: 96vw; }
  .notebook-title { font-size: 20px; letter-spacing: 4px; }
  .notebook-sub { font-size: 11px; letter-spacing: 2px; }
  .cp-entry { padding: 12px 14px; }
  .cp-entry-title { font-size: 14px; letter-spacing: 2px; margin-bottom: 6px; }
  .cp-entry-povs { grid-template-columns: 1fr; gap: 10px; }
  .cp-pov-text { font-size: 12px; line-height: 1.7; }

  .toast { font-size: 12px; letter-spacing: 2px; padding: 8px 16px; }
}

/* Very narrow (<= 380px) */
@media (max-width: 380px) {
  .top-title { font-size: 11px; letter-spacing: 1px; }
  .char-tab { min-width: 60px; }
  .char-tab-name { font-size: 10px; }
  .title-main { font-size: 26px; letter-spacing: 4px; }
  .dialogue-text { font-size: 13px; }
}

.hub-back-link {
  position: fixed;
  top: 14px;
  left: 16px;
  z-index: 9999;
  color: rgba(240, 223, 186, 0.55);
  text-decoration: none;
  font-size: 12px;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 12px;
  background: rgba(0,0,0,0.15);
  backdrop-filter: blur(6px);
  transition: color 0.2s, background 0.2s;
  user-select: none;
}
.hub-back-link:hover {
  color: rgba(240, 223, 186, 0.9);
  background: rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<a href="index.html" class="hub-back-link">← 荔枝游戏</a>

<div id="app">

  <!-- ========== Title Screen ========== -->
  <div id="title-screen" class="screen">
    <div class="title-content">
      <div class="title-time">01 : 47 AM</div>
      <h1 class="title-main">凌晨两点的便利店</h1>

// Ending — adaptive, built from world state at runtime
const ENDING = { lines: [] };  // filled by buildEndingLines(world) at showEnding time

// ============================================================
// STATE
// ============================================================

const state = {
  screen: 'title',
  currentPOV: null,
  unlocked: new Set(['cashier','nurse','driver','teen']),
  completed: new Set(),
  progress: { cashier: 0, nurse: 0, driver: 0, teen: 0 },
  convergences: new Set(),
  cpProgress: {}, // { cpId: Set of chars who've contributed }
  notebookRecord: {}, // { cpId: { char: chosen text } }
  world: {},      // world flags — who did what at what tier
  dialogueOpen: false,
  notebookOpen: false
};

// per-open state (not part of `state`, just transient)
let _currentBeat = null;
let _currentEffective = null;

// ============================================================
// HELPERS
// ============================================================

function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) s.classList.remove('hidden');
    else s.classList.add('hidden');
  });
  state.screen = id.replace('-screen', '');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  $('game-screen').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function currentBeat() {
  if (!state.currentPOV) return null;
  const beats = BEATS[state.currentPOV] || [];
  const i = state.progress[state.currentPOV];
  return beats[i] || null;
}

// ============================================================
// RENDER
// ============================================================

function renderCharTabs() {
  const wrap = $('char-tabs');
  wrap.innerHTML = '';
  const cur = state.currentPOV;
  const midArc = cur && !state.completed.has(cur) && state.progress[cur] > 0;

  CHAR_ORDER.forEach(id => {
    const c = CHARACTERS[id];
    const active = state.currentPOV === id;
    const completed = state.completed.has(id);
    const disabled = midArc && !active;

    let status = '待 探 索';
    if (completed) status = '已 走 完';
    else if (active) status = midArc ? '进 行 中' : '当 前';

    const btn = document.createElement('button');
    btn.className = 'char-tab' + (active ? ' active' : '') + (completed ? ' completed' : '') + (disabled ? ' locked' : '');
    btn.dataset.char = id;
    btn.innerHTML = `
      <svg class="char-tab-icon" viewBox="0 0 42 42">${charIconSVG(id)}</svg>
      <div class="char-tab-name">${c.name}</div>
      <div class="char-tab-status">${status}</div>
    `;
    if (!disabled) btn.addEventListener('click', () => switchPOV(id));
    wrap.appendChild(btn);
  });
}

function renderPOVIndicator() {
  if (!state.currentPOV) {
    $('pov-name').textContent = '—';
    $('pov-hint').textContent = '选 一 个 人 · 走 进 这 一 晚';
    return;
  }
  $('pov-name').textContent = CHARACTERS[state.currentPOV].name;
  const beat = currentBeat();
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 640px)').matches;
  if (!beat) {
    $('pov-hint').textContent = '这 一 段 走 完 了 · 选 下 一 位';
  } else if (isMobile) {
    $('pov-hint').textContent = '· ' + (beat.title || '') + ' · 轻 点 继 续 →';
  } else {
    $('pov-hint').textContent = '点 击 闪 烁 处 继 续';
  }
}

function renderHotspots() {
  const g = $('hotspots');
  g.innerHTML = '';
  const beat = currentBeat();
  if (!beat || state.dialogueOpen) return;

  const pos = HOTSPOTS[beat.hs];
  if (!pos) return;

  const svgNS = 'http://www.w3.org/2000/svg';

  // 1. Outer ripple ring — radar ping expanding outward
  const ring = document.createElementNS(svgNS, 'circle');
  ring.setAttribute('cx', pos.x);
  ring.setAttribute('cy', pos.y);
  ring.setAttribute('r', 30);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'rgba(245, 200, 138, 0.9)');
  ring.setAttribute('stroke-width', '3');
  ring.setAttribute('class', 'hotspot-ring');
  ring.setAttribute('pointer-events', 'none');
  g.appendChild(ring);

  // 2. Middle warm glow — soft breathing halo
  const glow = document.createElementNS(svgNS, 'circle');
  glow.setAttribute('cx', pos.x);
  glow.setAttribute('cy', pos.y);
  glow.setAttribute('r', 28);
  glow.setAttribute('fill', 'rgba(245, 200, 138, 0.55)');
  glow.setAttribute('class', 'hotspot-glow');
  glow.setAttribute('pointer-events', 'none');
  g.appendChild(glow);

  // 3. Bright center dot — clear click target
  const dot = document.createElementNS(svgNS, 'circle');
  dot.setAttribute('cx', pos.x);
  dot.setAttribute('cy', pos.y);
  dot.setAttribute('r', 7);
  dot.setAttribute('fill', 'rgba(249, 243, 232, 0.95)');
  dot.setAttribute('stroke', 'rgba(193, 123, 82, 0.9)');
  dot.setAttribute('stroke-width', '1.5');
  dot.setAttribute('class', 'hotspot-dot');
  dot.setAttribute('pointer-events', 'none');
  g.appendChild(dot);

  // 4. Invisible click target — larger than visual for easy tap
  const hit = document.createElementNS(svgNS, 'circle');
  hit.setAttribute('cx', pos.x);
  hit.setAttribute('cy', pos.y);
  hit.setAttribute('r', 55);
  hit.setAttribute('fill', 'transparent');
  hit.setAttribute('class', 'hotspot-target');
  hit.addEventListener('click', () => triggerHotspot(beat.hs));
  g.appendChild(hit);
}

function renderCharacters() {
  const g = $('characters');
  g.innerHTML = '';
  CHAR_ORDER.forEach(id => {
    const pos = HOTSPOTS[id];
    const isCurrent = state.currentPOV === id;
    const wrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    wrap.setAttribute('class', 'char-svg' + (isCurrent ? ' current' : ' dimmed'));
    wrap.setAttribute('transform', `translate(${pos.x - 30}, ${pos.y - 60})`);
    wrap.innerHTML = characterSVG(id);
    g.appendChild(wrap);
  });
}

function updateCPCounter() {
  $('cp-count').textContent = state.convergences.size;
}

function render() {
  renderCharTabs();
  renderPOVIndicator();
  renderHotspots();
  renderCharacters();
  updateCPCounter();
}

// ============================================================
// ACTIONS
// ============================================================

function switchPOV(char) {
  if (!state.unlocked.has(char)) return;
  const cur = state.currentPOV;
  // Lock: mid-arc can't switch away
  if (cur && cur !== char && state.progress[cur] > 0 && !state.completed.has(cur)) {
    toast('先 走 完 ' + CHARACTERS[cur].name + ' 这 一 段');
    return;
  }
  state.currentPOV = char;
  startAmbient(char);

  // Handle empty arc (scaffold placeholder): auto-complete
  const arcLen = (BEATS[char] || []).length;
  if (arcLen === 0 && !state.completed.has(char)) {
    state.completed.add(char);
    setTimeout(() => toast(CHARACTERS[char].name + ' · 这 一 段 内 容 待 填'), 250);
    if (state.completed.size >= CHAR_ORDER.length) {
      setTimeout(() => { stopAmbient(); showEnding(); }, 1200);
    }
  }

  render();
}

function triggerHotspot(hs) {
  const beat = currentBeat();
  if (!beat || beat.hs !== hs) return;
  playBeat(beat);
}

function resolveBranch(beat) {
  // If beat has branches, pick the first whose `when` returns true
  // (or one without `when` as default). Returns an "effective" object
  // with title/text/cps/effects potentially overridden.
  if (!beat.branches || !beat.branches.length) return beat;
  for (const b of beat.branches) {
    if (!b.when || b.when(state.world)) {
      return {
        hs: beat.hs,
        title: b.title || beat.title,
        text: b.text,
        cps: b.cps,
        effects: b.effects,
        // preserve choices at top-level if any
        choices: beat.choices,
        choicePrompt: beat.choicePrompt
      };
    }
  }
  return beat;
}

function playBeat(beat) {
  state.dialogueOpen = true;
  _currentBeat = beat;
  const effective = resolveBranch(beat);
  _currentEffective = effective;

  const char = CHARACTERS[state.currentPOV];
  $('dialogue-narrator').textContent = char.name + ' · 视角';
  $('dialogue-title').textContent = effective.title || '';
  $('dialogue-text').textContent = effective.text || '';

  // Beat-start SFX
  if (effective.sfx === 'doorChime' || (beat && beat.sfx === 'doorChime')) {
    playDoorChime();
  }

  // Reset containers
  $('observations-container').innerHTML = '';
  $('choice-container').innerHTML = '';
  $('dialogue-cp').style.display = 'none';

  const hasChoices = effective.choices && effective.choices.length;

  if (hasChoices) {
    // Render choices; continue is disabled until picked
    const container = $('choice-container');
    if (effective.choicePrompt) {
      const p = document.createElement('div');
      p.className = 'choice-prompt';
      p.textContent = effective.choicePrompt;
      container.appendChild(p);
    }
    effective.choices.forEach((choice, idx) => {
      const btn = document.createElement('button');
      btn.className = 'choice-option';
      btn.textContent = choice.label;
      btn.addEventListener('click', () => pickChoice(idx));
      container.appendChild(btn);
    });
    setContinueEnabled(false);
  } else {
    // Auto-do: apply effects + track CPs immediately
    if (effective.effects) effective.effects(state.world);
    const unlocked = contributeToCPs(effective);
    recordNotebook(effective.cps, effective.text);
    showCPUnlock(unlocked);
    setContinueEnabled(true);
  }

  $('dialogue-overlay').classList.remove('hidden');
  render();
}

function pickChoice(idx) {
  const beat = _currentEffective;
  const choice = beat.choices[idx];

  playChoiceClick();
  if (choice.voice) speakLine(choice.voice, 900);

  // Append the choice's follow-up text to the main text
  const textDiv = $('dialogue-text');
  if (choice.text) {
    textDiv.textContent = textDiv.textContent + '\n\n' + choice.text;
  }

  // Apply effects
  if (choice.effects) choice.effects(state.world);

  // Track CPs from the choice + record notebook text
  const unlocked = contributeToCPs(choice);
  recordNotebook(choice.cps, choice.text);
  showCPUnlock(unlocked);

  // Replace choice UI with the "chosen" marker
  const container = $('choice-container');
  container.innerHTML = '';
  const chosen = document.createElement('div');
  chosen.className = 'choice-chosen';
  chosen.textContent = '「 ' + choice.label + ' 」';
  container.appendChild(chosen);

  setContinueEnabled(true);
}

function recordNotebook(cps, text) {
  if (!cps || !cps.length || !text) return;
  const char = state.currentPOV;
  cps.forEach(cp => {
    const id = cp.id || cp;
    if (!state.notebookRecord[id]) state.notebookRecord[id] = {};
    state.notebookRecord[id][char] = text;
  });
}

function contributeToCPs(source) {
  const cps = source && source.cps;
  if (!cps || !cps.length) return [];
  const char = state.currentPOV;
  const unlocked = [];
  cps.forEach(cp => {
    const id = cp.id || cp;
    if (!state.cpProgress[id]) state.cpProgress[id] = new Set();
    state.cpProgress[id].add(char);

    const meta = CONVERGENCES[id];
    if (meta && !state.convergences.has(id)) {
      const needed = meta.participants || [];
      const npcs = meta.npcs || [];
      // NPCs auto-satisfy — only playable participants must contribute
      const required = needed.filter(c => !npcs.includes(c));
      const allDone = required.every(c => state.cpProgress[id].has(c));
      if (allDone) {
        state.convergences.add(id);
        unlocked.push(id);
      }
    }
  });
  return unlocked;
}

function showCPUnlock(unlocked) {
  const cpBox = $('dialogue-cp');
  if (unlocked.length) {
    const titles = unlocked.map(id => (CONVERGENCES[id] && CONVERGENCES[id].title) || id).join(' · ');
    cpBox.textContent = '✎  记 下 一 段 交 汇 —— ' + titles;
    cpBox.style.display = 'block';
    playCPChime();
  } else {
    cpBox.style.display = 'none';
  }
}

function setContinueEnabled(enabled) {
  const btn = $('dialogue-continue');
  btn.disabled = !enabled;
  if (enabled) {
    btn.classList.remove('disabled');
    btn.textContent = '继 续 →';
  } else {
    btn.classList.add('disabled');
    btn.textContent = '（ 先 做 出 选 择 ）';
  }
}

function closeBeat() {
  state.dialogueOpen = false;
  $('dialogue-overlay').classList.add('hidden');

  const c = state.currentPOV;
  state.progress[c]++;

  if (state.progress[c] >= (BEATS[c] || []).length) {
    if (!state.completed.has(c)) {
      state.completed.add(c);
      playArcComplete();
      setTimeout(() => toast(CHARACTERS[c].name + ' · 这 一 段 走 完 了'), 300);
    }
  }

  // All 5 arcs done → ending
  if (state.completed.size >= CHAR_ORDER.length) {
    stopAmbient();
    setTimeout(showEnding, 900);
    render();
    return;
  }

  render();
}

function showNotebook() {
  const list = $('cp-list');
  list.innerHTML = '';
  Object.entries(CONVERGENCES).forEach(([id, cp]) => {
    const isUnlocked = state.convergences.has(id);
    const entry = document.createElement('div');
    entry.className = 'cp-entry' + (isUnlocked ? '' : ' locked');
    if (isUnlocked) {
      const record = state.notebookRecord[id] || {};
      const povNames = Object.keys(record);
      const povsHTML = povNames.map(char => {
        const meta = (CHARACTERS[char]) || (NPC && NPC[char]) || { name: char };
        return '<div class="cp-pov"><div class="cp-pov-name">' + meta.name + '</div><div class="cp-pov-text">' + (record[char] || '') + '</div></div>';
      }).join('');
      entry.innerHTML = '<div class="cp-entry-title">' + cp.title + '</div>' +
                        (povsHTML ? '<div class="cp-entry-povs">' + povsHTML + '</div>' : '<div class="cp-locked-msg">这一晚，你经过了这里。</div>');
    } else {
      entry.innerHTML = '<div class="cp-entry-title">? · 尚 未 相 遇</div><div class="cp-locked-msg">继续在不同的视角里，看这一晚有没有交汇过...</div>';
    }
    list.appendChild(entry);
  });
  $('notebook-screen').classList.remove('hidden');
  state.notebookOpen = true;
}

function hideNotebook() {
  $('notebook-screen').classList.add('hidden');
  state.notebookOpen = false;
}

// ============================================================
// AUDIO — procedural ambient via Web Audio API
// ============================================================

const AUDIO = {
  ctx: null,
  master: null,
  drone: null,        // { oscillators: [...], gain }
  timers: [],         // active setTimeout ids
  muted: false,
  currentAmbient: null
};

function ensureAudio() {
  if (!AUDIO.ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    AUDIO.ctx = new AC();
    AUDIO.master = AUDIO.ctx.createGain();
    AUDIO.master.gain.value = AUDIO.muted ? 0 : 0.9;
    AUDIO.master.connect(AUDIO.ctx.destination);
  }
  if (AUDIO.ctx.state === 'suspended') {
    AUDIO.ctx.resume().catch(() => {});
  }
  return true;
}

function startAmbient(character) {
  if (AUDIO.currentAmbient === character) return;
  stopAmbient(true);
  if (!ensureAudio()) return;
  AUDIO.currentAmbient = character;
  if (character === 'nurse')       startNurseAmbient();
  else if (character === 'cashier') startCashierAmbient();
  else if (character === 'driver')  startDriverAmbient();
  else if (character === 'teen')    startTeenAmbient();
}

function stopAmbient(instant) {
  AUDIO.currentAmbient = null;
  if (!AUDIO.ctx) return;
  const now = AUDIO.ctx.currentTime;

  if (AUDIO.drone) {
    const d = AUDIO.drone;
    AUDIO.drone = null;
    try {
      const g = d.gain.gain;
      g.cancelScheduledValues(now);
      g.setValueAtTime(g.value, now);
      g.linearRampToValueAtTime(0, now + (instant ? 0.15 : 1.4));
    } catch (e) {}
    setTimeout(() => {
      (d.oscillators || []).forEach(o => { try { o.stop(); } catch (e) {} });
    }, instant ? 200 : 1600);
  }
  (AUDIO.timers || []).forEach(t => clearTimeout(t));
  AUDIO.timers = [];
}

function startNurseAmbient() {
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const osc1 = ctx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = 55;
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine'; osc2.frequency.value = 82.5;
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.08;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain);
  const droneGain = ctx.createGain();
  droneGain.gain.value = 0;
  droneGain.gain.linearRampToValueAtTime(0.18, now + 2.2);
  lfoGain.connect(droneGain.gain);
  osc1.connect(droneGain);
  osc2.connect(droneGain);
  droneGain.connect(AUDIO.master);
  osc1.start(); osc2.start(); lfo.start();
  AUDIO.drone = { oscillators: [osc1, osc2, lfo], gain: droneGain };

  const scheduleFluor = () => {
    if (AUDIO.currentAmbient !== 'nurse') return;
    AUDIO.timers.push(setTimeout(() => { playFluorescent(); scheduleFluor(); }, 2800 + Math.random() * 5500));
  };
  scheduleFluor();

  const scheduleBeep = () => {
    if (AUDIO.currentAmbient !== 'nurse') return;
    AUDIO.timers.push(setTimeout(() => { playHospitalBeep(); scheduleBeep(); }, 18000 + Math.random() * 22000));
  };
  scheduleBeep();
}

function startCashierAmbient() {
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // Store hum: low + gentle overtone
  const osc1 = ctx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = 50;
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine'; osc2.frequency.value = 100;
  const droneGain = ctx.createGain();
  droneGain.gain.value = 0;
  droneGain.gain.linearRampToValueAtTime(0.13, now + 2);
  osc1.connect(droneGain);
  osc2.connect(droneGain);
  droneGain.connect(AUDIO.master);
  osc1.start(); osc2.start();
  AUDIO.drone = { oscillators: [osc1, osc2], gain: droneGain };
  // Fluorescent flicker (shared with nurse)
  const scheduleFluor = () => {
    if (AUDIO.currentAmbient !== 'cashier') return;
    AUDIO.timers.push(setTimeout(() => { playFluorescent(); scheduleFluor(); }, 3200 + Math.random() * 6000));
  };
  scheduleFluor();
  // Occasional soft phone vibration (mother's expected message)
  const scheduleVibration = () => {
    if (AUDIO.currentAmbient !== 'cashier') return;
    AUDIO.timers.push(setTimeout(() => { playPhoneVibration(); scheduleVibration(); }, 25000 + Math.random() * 30000));
  };
  scheduleVibration();
}

function startDriverAmbient() {
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // Low road-hum drone (sawtooth low-passed for warmth)
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth'; osc.frequency.value = 60;
  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 180;
  const droneGain = ctx.createGain();
  droneGain.gain.value = 0;
  droneGain.gain.linearRampToValueAtTime(0.08, now + 2);
  osc.connect(lpf);
  lpf.connect(droneGain);
  droneGain.connect(AUDIO.master);
  osc.start();
  AUDIO.drone = { oscillators: [osc], gain: droneGain };
  // Traffic wash (occasional)
  const scheduleTraffic = () => {
    if (AUDIO.currentAmbient !== 'driver') return;
    AUDIO.timers.push(setTimeout(() => { playTrafficWash(); scheduleTraffic(); }, 8000 + Math.random() * 14000));
  };
  scheduleTraffic();
  // Rare metallic tink (car cooling)
  const scheduleTink = () => {
    if (AUDIO.currentAmbient !== 'driver') return;
    AUDIO.timers.push(setTimeout(() => { playMetalTink(); scheduleTink(); }, 20000 + Math.random() * 30000));
  };
  scheduleTink();
}

function startTeenAmbient() {
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // Wind: bandpassed noise looped
  const bufSize = Math.floor(ctx.sampleRate * 4);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
  const noise = ctx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 1.5;
  const windGain = ctx.createGain();
  windGain.gain.value = 0;
  windGain.gain.linearRampToValueAtTime(0.09, now + 3);
  // Slow modulation for wind swells
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.15;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.05;
  lfo.connect(lfoGain);
  lfoGain.connect(windGain.gain);
  noise.connect(bp);
  bp.connect(windGain);
  windGain.connect(AUDIO.master);
  noise.start(); lfo.start();
  AUDIO.drone = { oscillators: [noise, lfo], gain: windGain };
  // Distant traffic swoosh (rare, muffled)
  const scheduleDistant = () => {
    if (AUDIO.currentAmbient !== 'teen') return;
    AUDIO.timers.push(setTimeout(() => { playDistantTraffic(); scheduleDistant(); }, 15000 + Math.random() * 25000));
  };
  scheduleDistant();
}

function playPhoneVibration() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'cashier' || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // Two short low buzzes
  [0, 0.22].forEach(offset => {
    const osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 130;
    const g = ctx.createGain();
    const t0 = now + offset;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.05, t0 + 0.02);
    g.gain.linearRampToValueAtTime(0.05, t0 + 0.14);
    g.gain.linearRampToValueAtTime(0, t0 + 0.18);
    osc.connect(g);
    g.connect(AUDIO.master);
    osc.start(t0); osc.stop(t0 + 0.2);
  });
}

function playTrafficWash() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'driver' || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const dur = 3 + Math.random() * 3;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 0.5;
  const g = ctx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.05, now + 0.6);
  g.gain.setValueAtTime(0.05, now + dur - 0.6);
  g.gain.linearRampToValueAtTime(0, now + dur);
  noise.connect(lp);
  lp.connect(g);
  g.connect(AUDIO.master);
  noise.start(now); noise.stop(now + dur);
}

function playMetalTink() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'driver' || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = 'triangle'; osc.frequency.value = 1800;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.03, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0005, now + 0.4);
  osc.connect(g);
  g.connect(AUDIO.master);
  osc.start(now); osc.stop(now + 0.5);
}

function playDistantTraffic() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'teen' || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const dur = 2.5 + Math.random() * 2;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 400; lp.Q.value = 0.5;
  const g = ctx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.03, now + 0.5);
  g.gain.setValueAtTime(0.03, now + dur - 0.5);
  g.gain.linearRampToValueAtTime(0, now + dur);
  noise.connect(lp);
  lp.connect(g);
  g.connect(AUDIO.master);
  noise.start(now); noise.stop(now + dur);
}

function playDoorChime() {
  if (!ensureAudio() || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const notes = [
    { f: 987.77, d: 0,    dur: 0.32 },  // B5
    { f: 783.99, d: 0.30, dur: 0.55 }   // G5
  ];
  notes.forEach(({ f, d, dur }) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = f;
    const osc2 = ctx.createOscillator();
    osc2.type = 'sine'; osc2.frequency.value = f * 2.001;
    const oscG = ctx.createGain(); oscG.gain.value = 0.3;
    const g = ctx.createGain();
    const t0 = now + d;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.20, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
    osc.connect(g);
    osc2.connect(oscG);
    oscG.connect(g);
    g.connect(AUDIO.master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
    osc2.start(t0); osc2.stop(t0 + dur + 0.05);
  });
  // Convenience-store PA welcome greeting (mechanical) after chime
  setTimeout(() => {
    if (AUDIO.muted) return;
    if (!('speechSynthesis' in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance('欢迎光临。');
      u.lang = 'zh-CN';
      u.rate = 1.15;
      u.pitch = 1.2;
      u.volume = 0.65;
      const voice = (typeof getZhVoice === 'function') ? getZhVoice() : null;
      if (voice) u.voice = voice;
      speechSynthesis.speak(u);
    } catch (e) {}
  }, 750);
}

function playFluorescent() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'nurse') return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;

  const bufferSize = Math.floor(ctx.sampleRate * 0.22);
  const buf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.6;

  const noise = ctx.createBufferSource();
  noise.buffer = buf;

  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2600 + Math.random() * 1800;
  filter.Q.value = 6;

  const g = ctx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.10, now + 0.02);
  g.gain.linearRampToValueAtTime(0.04, now + 0.06);
  g.gain.linearRampToValueAtTime(0, now + 0.18);

  noise.connect(filter);
  filter.connect(g);
  g.connect(AUDIO.master);
  noise.start(now);
  noise.stop(now + 0.22);
}

function playHospitalBeep() {
  if (!AUDIO.ctx || AUDIO.currentAmbient !== 'nurse') return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;

  // two soft short beeps at ~1000Hz — heavily attenuated (distant memory)
  [0, 0.28].forEach((offset) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 1000;

    const g = ctx.createGain();
    g.gain.value = 0;
    const t0 = now + offset;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.06, t0 + 0.03);
    g.gain.linearRampToValueAtTime(0.06, t0 + 0.12);
    g.gain.linearRampToValueAtTime(0, t0 + 0.16);

    // Low-pass to soften it (feels far)
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1400;

    osc.connect(lp);
    lp.connect(g);
    g.connect(AUDIO.master);
    osc.start(t0);
    osc.stop(t0 + 0.2);
  });
}

function toggleMute() {
  AUDIO.muted = !AUDIO.muted;
  const btn = $('mute-btn');
  if (btn) btn.textContent = AUDIO.muted ? '🔇' : '🔊';
  if (AUDIO.ctx && AUDIO.master) {
    const now = AUDIO.ctx.currentTime;
    AUDIO.master.gain.cancelScheduledValues(now);
    AUDIO.master.gain.setValueAtTime(AUDIO.master.gain.value, now);
    AUDIO.master.gain.linearRampToValueAtTime(AUDIO.muted ? 0 : 0.9, now + 0.4);
  }
}

// ============================================================
// SFX — sound cues on major beats (choice / CP unlock / arc end)
// ============================================================

function playChoiceClick() {
  if (!ensureAudio() || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  const bufSize = Math.floor(ctx.sampleRate * 0.06);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1800;
  filter.Q.value = 2.5;
  const g = ctx.createGain();
  g.gain.value = 0.16;
  noise.connect(filter);
  filter.connect(g);
  g.connect(AUDIO.master);
  noise.start(now);
}

function playCPChime() {
  if (!ensureAudio() || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // A4 + E5 (perfect fifth) — soft arpeggio
  [{ f: 440, d: 0 }, { f: 659.25, d: 0.09 }].forEach(({ f, d }) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const g = ctx.createGain();
    const t0 = now + d;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.24, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + 1.7);
    osc.connect(g);
    g.connect(AUDIO.master);
    osc.start(t0);
    osc.stop(t0 + 1.8);
  });
}

function playArcComplete() {
  if (!ensureAudio() || AUDIO.muted) return;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  // Warm major triad, slow arpeggio, long tail
  [{ f: 261.63, d: 0 }, { f: 329.63, d: 0.22 }, { f: 392, d: 0.46 }].forEach(({ f, d }) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const g = ctx.createGain();
    const t0 = now + d;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.22, t0 + 0.025);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + 2.8);
    osc.connect(g);
    g.connect(AUDIO.master);
    osc.start(t0);
    osc.stop(t0 + 2.9);
  });
}

// ============================================================
// VOICE — Web Speech TTS (prefer neural voices) with file/recording fallback
// ============================================================

function getZhVoice() {
  if (!('speechSynthesis' in window)) return null;
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  const zh = vs.filter(v => /^zh/i.test(v.lang));
  if (!zh.length) return null;
  // Prefer neural / natural / online voices — much better quality
  const neural = zh.find(v => /natural|neural|online|wavenet|studio/i.test(v.name));
  if (neural) return neural;
  // Prefer female-hinted zh-CN names
  const female = zh.find(v => /xiao(xiao|yi|meng|yun|hui|mo|qi)|meijia|tingting|female/i.test(v.name));
  if (female) return female;
  // Fall through to whatever zh is available
  return zh.find(v => /zh-CN/i.test(v.lang)) || zh[0];
}

function speakLine(spec, delayMs) {
  if (AUDIO.muted) return;
  const opts = (typeof spec === 'string') ? { text: spec } : spec;
  if (!opts) return;

  const tryFile = (url) => {
    return new Promise((resolve, reject) => {
      try {
        const audio = new Audio(url);
        audio.volume = opts.volume != null ? opts.volume : 0.95;
        const p = audio.play();
        if (p && p.then) p.then(() => resolve(true)).catch(reject);
        else resolve(true);
      } catch (e) { reject(e); }
    });
  };

  const doTTS = () => {
    if (!('speechSynthesis' in window) || !opts.text) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(opts.text);
      u.lang = 'zh-CN';
      u.rate = opts.rate != null ? opts.rate : 0.88;
      u.pitch = opts.pitch != null ? opts.pitch : 0.95;
      u.volume = opts.volume != null ? opts.volume : 0.9;
      const voice = getZhVoice();
      if (voice) u.voice = voice;
      speechSynthesis.speak(u);
    } catch (e) {}
  };

  const doPlay = async () => {
    // 1. localStorage-recorded (future)
    if (opts.key) {
      const url = localStorage.getItem('voice.' + opts.key);
      if (url) { tryFile(url).catch(() => {}); return; }
    }
    // 2. external file (future)
    if (opts.file) {
      try { await tryFile(opts.file); return; } catch (e) {}
    }
    // 3. TTS fallback (current default)
    doTTS();
  };

  if (delayMs) setTimeout(doPlay, delayMs);
  else doPlay();
}

// Warm up voices list (needed on some browsers)
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
}

// ============================================================
// INIT
// ============================================================

function bindEvents() {
  $('start-btn').addEventListener('click', () => {
    ensureAudio();
    showScreen('game-screen');
    state.currentPOV = null;
    render();
  });
  $('dialogue-continue').addEventListener('click', closeBeat);
  $('notebook-btn').addEventListener('click', showNotebook);
  $('notebook-close').addEventListener('click', hideNotebook);
  $('mute-btn').addEventListener('click', toggleMute);

  // Mobile: tap pov-indicator or scene to trigger current beat
  const tryTriggerCurrent = () => {
    if (state.dialogueOpen) return;
    if (!state.currentPOV) return;
    const beat = currentBeat();
    if (beat) playBeat(beat);
  };
  $('pov-name').parentElement.addEventListener('click', tryTriggerCurrent);
  document.querySelector('.scene-wrap').addEventListener('click', (e) => {
    // Only trigger if click landed on the scene background, not on a child hotspot circle
    if (e.target.tagName === 'svg' || e.target.classList.contains('scene-wrap')) {
      tryTriggerCurrent();
    }
  });
  $('ending-restart').addEventListener('click', () => {
    stopAmbient(true);
    state.currentPOV = null;
    state.unlocked = new Set(['cashier','nurse','driver','teen']);
    state.completed = new Set();
    state.progress = { cashier: 0, nurse: 0, driver: 0, teen: 0 };
    state.convergences = new Set();
    state.cpProgress = {};
    state.notebookRecord = {};
    state.world = {};
    showScreen('title-screen');
    render();
  });
}

function init() {
  bindEvents();
  adjustMobileScene();
  render();
}

function adjustMobileScene() {
  const svg = document.getElementById('scene-svg');
  if (!svg) return;
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 640px)').matches;
  if (isMobile) {
    // Mobile: crop to interior + cat bowl (drop moon/lamppost/stars)
    svg.setAttribute('viewBox', '200 20 1000 660');
  } else {
    svg.setAttribute('viewBox', '0 0 1200 700');
  }
}

// Re-adjust on window resize (e.g., phone rotation)
if (typeof window !== 'undefined') {
  window.addEventListener('resize', () => {
    if (typeof adjustMobileScene === 'function') adjustMobileScene();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
