<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048 · 记忆重组</title>
<link rel="icon" type="image/png" href="lychee-logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Songti SC', 'STSong', 'Segoe UI', -apple-system, serif;
    background: linear-gradient(135deg, #2a3448 0%, #1a1f2c 100%);
    min-height: 100vh;
    color: #e8dcc4;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overflow-x: hidden;
  }
  #app { position: relative; min-height: 100vh; }
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    opacity: 0;
    transition: opacity 0.6s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: flex; opacity: 1; }
  .back-link {
    position: absolute;
    top: 14px;
    left: 16px;
    color: rgba(240, 223, 186, 0.55);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.15);
    border-radius: 12px;
    transition: color 0.2s;
    z-index: 100;
  }
  .back-link:hover { color: rgba(240, 223, 186, 0.9); }

  /* ============ Title screen ============ */
  #screen-title { text-align: center; }
  .title-time {
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(245, 200, 138, 0.7);
    margin-bottom: 30px;
  }
  .title-main {
    font-size: clamp(32px, 6vw, 46px);
    letter-spacing: 8px;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(245, 200, 138, 0.3);
  }
  .title-sub {
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(232, 220, 196, 0.5);
    margin-bottom: 40px;
  }
  .intro-text {
    max-width: 520px;
    line-height: 2;
    font-size: 15px;
    color: rgba(232, 220, 196, 0.8);
    margin-bottom: 40px;
    letter-spacing: 1px;
  }
  .intro-text p { margin: 4px 0; }
  .intro-text p.gap { height: 12px; }

  .paper-btn {
    background: #e8dcc4;
    color: #3d2f24;
    border: none;
    padding: 12px 32px;
    font-size: 16px;
    letter-spacing: 4px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 2px 12px rgba(245, 200, 138, 0.15);
    transition: all 0.3s;
    position: relative;
  }
  .paper-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border: 1px solid rgba(245, 200, 138, 0.3);
    pointer-events: none;
  }
  .paper-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(245, 200, 138, 0.35);
  }
  .paper-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: #d4c9b3;
  }
  .paper-btn:disabled:hover {
    transform: none;
    box-shadow: 0 2px 12px rgba(245, 200, 138, 0.15);
  }
  .paper-btn.small { padding: 8px 18px; font-size: 13px; letter-spacing: 2px; }

  /* ============ Game screen ============ */
  #screen-game { justify-content: flex-start; padding-top: 60px; }
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 460px;
    width: 100%;
    margin-bottom: 12px;
  }
  .game-title {
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(245, 200, 138, 0.85);
  }
  .clue-btn {
    background: transparent;
    border: 1px solid rgba(245, 200, 138, 0.3);
    color: rgba(232, 220, 196, 0.85);
    padding: 5px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .clue-btn:hover { background: rgba(245, 200, 138, 0.1); }
  .clue-btn .badge {
    background: #c17b52;
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
  }

  .scores {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    max-width: 460px;
    width: 100%;
  }
  .score-box {
    flex: 1;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(245, 200, 138, 0.15);
    border-radius: 4px;
    padding: 8px 12px;
    text-align: center;
  }
  .score-box .label {
    display: block;
    font-size: 10px;
    color: rgba(232, 220, 196, 0.5);
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .score-box .value {
    font-size: 20px;
    color: #f5c88a;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .board-wrap {
    position: relative;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(245, 200, 138, 0.15);
    border-radius: 8px;
    padding: 8px;
    aspect-ratio: 1;
    max-width: 460px;
    width: 100%;
    margin-bottom: 12px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    height: 100%;
  }
  .cell-bg {
    background: rgba(245, 200, 138, 0.06);
    border-radius: 4px;
  }
  .tiles {
    position: absolute;
    inset: 8px;
    pointer-events: none;
  }
  .tile {
    position: absolute;
    width: calc((100% - 24px) / 4);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    font-weight: bold;
    font-size: clamp(20px, 6vw, 30px);
    font-family: 'Segoe UI', 'STHeiti', sans-serif;
    transition: transform 130ms ease-out;
    letter-spacing: -0.5px;
  }
  .tile.pop { animation: pop 200ms ease-out; }
  .tile.appear { animation: appear 200ms ease-out; }
  @keyframes pop {
    0% { transform: var(--pos) scale(1); }
    50% { transform: var(--pos) scale(1.18); }
    100% { transform: var(--pos) scale(1); }
  }
  @keyframes appear {
    0% { transform: var(--pos) scale(0); opacity: 0; }
    100% { transform: var(--pos) scale(1); opacity: 1; }
  }
  .tile-2    { background: #eee4da; color: #776e65; }
  .tile-4    { background: #ede0c8; color: #776e65; }
  .tile-8    { background: #f2b179; color: #f9f6f2; }
  .tile-16   { background: #f59563; color: #f9f6f2; }
  .tile-32   { background: #f67c5f; color: #f9f6f2; }
  .tile-64   { background: #f65e3b; color: #f9f6f2; }
  .tile-128  { background: #edcf72; color: #f9f6f2; font-size: clamp(18px, 5.4vw, 26px); }
  .tile-256  { background: #edcc61; color: #f9f6f2; font-size: clamp(18px, 5.4vw, 26px); }
  .tile-512  { background: #edc850; color: #f9f6f2; font-size: clamp(18px, 5.4vw, 26px); }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: clamp(15px, 4.6vw, 22px); }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: clamp(15px, 4.6vw, 22px); box-shadow: 0 0 24px rgba(243, 215, 116, 0.7); }
  .tile-super { background: #3c3a32; color: #f9f6f2; font-size: clamp(13px, 4vw, 20px); }

  .actions {
    display: flex;
    gap: 8px;
    max-width: 460px;
    width: 100%;
  }
  .actions button {
    flex: 1;
    padding: 9px 0;
    background: transparent;
    border: 1px solid rgba(245, 200, 138, 0.3);
    color: rgba(232, 220, 196, 0.85);
    font-size: 13px;
    letter-spacing: 2px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .actions button:hover:not(:disabled) { background: rgba(245, 200, 138, 0.1); }
  .actions button:disabled { opacity: 0.35; cursor: not-allowed; }
  .actions button.accuse {
    background: rgba(193, 123, 82, 0.85);
    color: #fff;
    border-color: #c17b52;
  }
  .actions button.accuse:hover:not(:disabled) { background: #c17b52; }

  /* ============ Score gain popup ============ */
  .score-gain {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #f5c88a;
    font-size: 22px;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 900ms ease-out forwards;
    text-shadow: 0 0 10px rgba(245, 200, 138, 0.5);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
  }

  /* ============ Clue toast (滑入) ============ */
  .clue-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: #e8dcc4;
    color: #3d2f24;
    padding: 24px 32px;
    max-width: 440px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid #c9b48a;
    z-index: 200;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .clue-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .clue-toast .head {
    font-size: 12px;
    letter-spacing: 4px;
    color: #a67240;
    margin-bottom: 10px;
  }
  .clue-toast .body {
    font-size: 17px;
    line-height: 1.7;
    letter-spacing: 1px;
  }
  .clue-toast .foot {
    font-size: 11px;
    color: #a67240;
    margin-top: 16px;
    text-align: right;
    letter-spacing: 2px;
  }

  /* ============ Clue log modal ============ */
  .modal-mask {
    position: fixed;
    inset: 0;
    background: rgba(10, 12, 20, 0.7);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .modal-mask.show { display: flex; opacity: 1; }
  .modal {
    background: #e8dcc4;
    color: #3d2f24;
    padding: 30px 28px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid #c9b48a;
  }
  .modal h3 {
    font-size: 18px;
    letter-spacing: 4px;
    margin-bottom: 6px;
    color: #3d2f24;
  }
  .modal .modal-sub {
    font-size: 12px;
    color: #a67240;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201, 180, 138, 0.5);
  }
  .clue-item {
    padding: 12px 0;
    border-bottom: 1px dashed rgba(201, 180, 138, 0.5);
    display: flex;
    gap: 14px;
    line-height: 1.6;
  }
  .clue-item:last-child { border-bottom: none; }
  .clue-tier {
    color: #a67240;
    font-weight: bold;
    font-size: 15px;
    flex-shrink: 0;
    letter-spacing: 1px;
    min-width: 44px;
  }
  .clue-body { color: #3d2f24; font-size: 14px; }
  .clue-body.locked { color: #a67240; opacity: 0.5; font-style: italic; }
  .modal-close {
    display: block;
    margin: 20px auto 0;
    background: none;
    border: 1px solid #6b5439;
    color: #3d2f24;
    padding: 8px 24px;
    font-family: inherit;
    letter-spacing: 3px;
    cursor: pointer;
    font-size: 13px;
  }
  .modal-close:hover { background: rgba(107, 84, 57, 0.1); }

  /* ============ Verdict screen ============ */
  #screen-verdict, #screen-result { justify-content: flex-start; padding-top: 60px; }
  .verdict-title {
    font-size: 22px;
    letter-spacing: 6px;
    color: #f5c88a;
    margin-bottom: 8px;
  }
  .verdict-sub {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(232, 220, 196, 0.6);
    margin-bottom: 30px;
    text-align: center;
    max-width: 500px;
    line-height: 1.8;
  }
  .verdict-section {
    width: 100%;
    max-width: 620px;
    margin-bottom: 24px;
  }
  .verdict-section h4 {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(245, 200, 138, 0.7);
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .choice {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(245, 200, 138, 0.2);
    color: #e8dcc4;
    padding: 14px 12px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 2px;
    text-align: center;
    transition: all 0.2s;
  }
  .choice:hover { background: rgba(245, 200, 138, 0.1); border-color: rgba(245, 200, 138, 0.5); }
  .choice.selected {
    background: rgba(193, 123, 82, 0.35);
    border-color: #c17b52;
    box-shadow: 0 0 12px rgba(193, 123, 82, 0.3);
  }
  .choice .avatar { font-size: 26px; margin-bottom: 6px; }
  .choice .name { font-size: 15px; letter-spacing: 2px; margin-bottom: 3px; }
  .choice .role { font-size: 11px; color: rgba(232, 220, 196, 0.5); letter-spacing: 1px; margin-bottom: 6px; }
  .choice .desc { font-size: 12px; color: rgba(232, 220, 196, 0.6); line-height: 1.5; }
  .verdict-submit {
    margin-top: 20px;
  }

  /* ============ Result screen ============ */
  .result-title {
    font-size: 26px;
    letter-spacing: 8px;
    margin-bottom: 24px;
  }
  .result-title.win { color: #f5c88a; }
  .result-title.lose { color: #c17b52; }
  .result-body {
    max-width: 560px;
    line-height: 2.2;
    font-size: 16px;
    color: rgba(232, 220, 196, 0.85);
    margin-bottom: 40px;
    letter-spacing: 1px;
    text-align: left;
    padding: 0 20px;
  }
  .result-body p { margin: 4px 0; }
  .result-body p.gap { height: 14px; }
  .result-body p.emph { color: #f5c88a; font-style: italic; }
  .result-actions { display: flex; gap: 12px; }

  /* ============ Landscape (mobile) ============ */
  @media (orientation: landscape) and (max-height: 550px) {
    .screen { padding: 12px 16px; }
    #screen-game { padding-top: 40px; }
    .game-header, .scores, .board-wrap, .actions { max-width: 380px; }
    .board-wrap { max-height: 78vh; }
    .title-main { font-size: 28px; letter-spacing: 5px; }
    .intro-text { font-size: 13px; line-height: 1.7; margin-bottom: 20px; }
    #screen-verdict, #screen-result { padding-top: 40px; }
  }
  @media (max-width: 500px) {
    .verdict-title { font-size: 18px; letter-spacing: 4px; }
    .choice-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .choice { padding: 10px 8px; }
    .choice .avatar { font-size: 22px; }
    .choice .name { font-size: 13px; }
    .clue-toast .body { font-size: 15px; }
  }
</style>
</head>
<body>
<a href="index.html" class="back-link">← 荔枝游戏</a>
<div id="app">

  <!-- ============ Title ============ -->
  <div id="screen-title" class="screen active">
    <div class="title-time">凌晨 · 二时 · 十七分</div>
    <h1 class="title-main">暴雨庄园</h1>
    <div class="title-sub">1938 · 江南 · 梅雨季</div>
    <div class="intro-text" id="introText"></div>
    <button class="paper-btn" id="startBtn">开始调查</button>
  </div>

  <!-- ============ Game ============ -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <span class="game-title">🕯 暴雨庄园</span>
      <button class="clue-btn" id="clueBtn">线索簿 <span class="badge" id="clueBadge">0/7</span></button>
    </div>
    <div class="scores">
      <div class="score-box"><span class="label">得分</span><span class="value" id="score">0</span></div>
      <div class="score-box"><span class="label">最高</span><span class="value" id="best">0</span></div>
    </div>
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
      <div class="tiles" id="tiles"></div>
    </div>
    <div class="actions">
      <button id="undoBtn" disabled>↩ 撤销</button>
      <button id="restartBtn">重来</button>
      <button id="accuseBtn" class="accuse">开始推理</button>
    </div>
  </div>

  <!-- ============ Verdict ============ -->
  <div id="screen-verdict" class="screen">
    <h2 class="verdict-title">推 · 理</h2>
    <p class="verdict-sub" id="verdictSub"></p>

    <div class="verdict-section">
      <h4>凶手</h4>
      <div class="choice-grid" id="suspectGrid"></div>
    </div>

    <div class="verdict-section">
      <h4>手法</h4>
      <div class="choice-grid" id="methodGrid"></div>
    </div>

    <div class="verdict-submit">
      <button class="paper-btn" id="submitVerdictBtn" disabled>指控</button>
    </div>
  </div>

  <!-- ============ Result ============ -->
  <div id="screen-result" class="screen">
    <h2 class="result-title" id="resultTitle"></h2>
    <div class="result-body" id="resultBody"></div>
    <div class="result-actions">
      <button class="paper-btn small" id="replayBtn">再玩一局</button>
      <button class="paper-btn small" id="homeBtn">回菜单</button>
    </div>
  </div>

  <!-- Clue toast -->
  <div class="clue-toast" id="clueToast">
    <div class="head">— 记忆重组 —</div>
    <div class="body" id="clueToastBody"></div>
    <div class="foot" id="clueToastFoot"></div>
  </div>

  <!-- Clue log modal -->
  <div class="modal-mask" id="clueModal">
    <div class="modal">
      <h3>线 索 簿</h3>
      <div class="modal-sub">数字方块合并到指定层级即可解锁</div>
      <div id="clueList"></div>
      <button class="modal-close" id="closeClueBtn">合上</button>
    </div>
  </div>

</div>

<script>
// ============ Story Data ============
const STORY = {
  intro: [
    '你是应邀而来的侦探，昨夜宿在梅家庄园。',
    '凌晨两点十七分——一声尖叫。',
    '书房里，梅老爷倒在血泊中，胸口一柄裁纸刀。',
    '门从里面反锁，钥匙在他自己手中。',
    '',
    '你喝了管家送来的安神茶，记忆碎了一地。',
    '每次数字合并，就是重新拼合一片记忆。',
  ],
  suspects: [
    { id: 'zhou',   name: '老周',   role: '管家', avatar: '🎩',
      desc: '看着老爷长大。今夜是他给你送的安神茶。' },
    { id: 'xuejun', name: '梅雪君', role: '侄女', avatar: '💃',
      desc: '为遗产和老爷争吵多次。房间灯亮到很晚。' },
    { id: 'wan',    name: '沈婉',   role: '表妹', avatar: '👒',
      desc: '老爷的旧相识。昨晚神色异常。' },
    { id: 'hai',    name: '阿海',   role: '司机', avatar: '🧢',
      desc: '沉默寡言。白天陪老爷去过银行。' },
  ],
  methods: [
    { id: 'fishline',   name: '鱼线反锁', desc: '门外用鱼线拉动门闩，从窗缝抽出。' },
    { id: 'accomplice', name: '共犯离场', desc: '一人杀人后从窗户离去，钥匙塞回死者掌中。' },
    { id: 'suicide',    name: '意外自持', desc: '死者自己握着刀，另有隐情。' },
  ],
  clues: [
    { at: 32,   text: '书房门缝下方，一根断掉的鱼线。' },
    { at: 64,   text: '死者手中半张字条，写着「不该原谅」。' },
    { at: 128,  text: '梅雪君的窗户，昨夜亮到凌晨三点。' },
    { at: 256,  text: '书房窗外泥地上，一枚小小的高跟鞋印。' },
    { at: 512,  text: '老周的白手套沾了血——他说是切菜时的。' },
    { at: 1024, text: '沈婉的珍珠胸针，少了一颗——就落在书房桌下。' },
    { at: 2048, text: '书房抽屉里的新遗嘱，收信人只有一位——「小婉」。' },
  ],
  answer: { suspect: 'wan', method: 'fishline' },
  correct: [
    '你转向沈婉。',
    '"你是他的私生女，对吗？"',
    '',
    '她的手一颤，胸针空扣在灯下泛着光。',
    '',
    '"新遗嘱本要把庄园留给你——但他临时反悔。',
    ' 你父亲是渔民出身，从小教你用鱼线。',
    ' 一时情急，你选择了它。"',
    '',
    '她望向窗外的雨，很久没说话。',
    '"我只是……不想再被丢下一次。"',
    '',
    '——案件了结。',
  ],
  wrong: (chosenSusName, chosenMethName) => [
    `你说是${chosenSusName}，用${chosenMethName}。`,
    '',
    '屋内一片沉默。',
    '',
    '真相并非如此——凶手是沈婉，用鱼线反锁。',
    '她是老爷的私生女，因新遗嘱被撤而动手。',
    '你漏看了那颗胸针。',
    '',
    '也许你该再来一次。',
  ],
};

// ============ Game State ============
const SIZE = 4;
const ANIM_MS = 130;
let grid;                 // 2D of tile|null
let tiles;                // Set of live tiles
let nextId;
let score, best;
let history;              // for undo
let animating;
let unlockedTiers;        // Set of clue tiers unlocked
let gameOver;
let clueQueue = [];
let showingClue = false;

// ============ DOM refs ============
const boardEl = document.getElementById('board');
const tilesEl = document.getElementById('tiles');
const boardWrap = document.getElementById('boardWrap');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const undoBtn = document.getElementById('undoBtn');
const clueBadge = document.getElementById('clueBadge');
const introText = document.getElementById('introText');
const clueToast = document.getElementById('clueToast');
const clueToastBody = document.getElementById('clueToastBody');
const clueToastFoot = document.getElementById('clueToastFoot');
const clueModal = document.getElementById('clueModal');
const clueList = document.getElementById('clueList');

// ============ Screen switching ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============ Init title ============
function initTitle() {
  introText.innerHTML = STORY.intro.map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
}

// ============ Board init ============
function initBoardBackground() {
  boardEl.innerHTML = '';
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    boardEl.appendChild(c);
  }
}

// ============ Tile mgmt ============
function tileClass(v) { return v > 2048 ? 'tile-super' : `tile-${v}`; }

function positionTile(t) {
  const pct = (v) => `calc(${v} * (100% + 8px))`;
  const pos = `translate(${pct(t.c)}, ${pct(t.r)})`;
  t.el.style.setProperty('--pos', pos);
  t.el.style.transform = pos;
}

function renderTileEl(t, animate) {
  const el = document.createElement('div');
  el.className = 'tile ' + tileClass(t.v);
  el.textContent = t.v;
  el.dataset.id = t.id;
  t.el = el;
  positionTile(t);
  if (animate) el.classList.add('appear');
  tilesEl.appendChild(el);
}

function updateTileVisual(t) {
  t.el.className = 'tile ' + tileClass(t.v);
  t.el.textContent = t.v;
  positionTile(t);
}

function killTile(t) {
  t.el?.remove();
  tiles.delete(t);
}

function makeTile(r, c, v, animate = true) {
  const t = { id: nextId++, r, c, v };
  grid[r][c] = t;
  tiles.add(t);
  renderTileEl(t, animate);
  return t;
}

function spawn() {
  const empties = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) empties.push([r, c]);
  if (!empties.length) return null;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  const v = Math.random() < 0.9 ? 2 : 4;
  return makeTile(r, c, v, true);
}

function empty2D() {
  return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
}

// ============ Save / undo ============
function saveState() {
  history.push({
    grid: grid.map(row => row.map(t => t ? { id: t.id, r: t.r, c: t.c, v: t.v } : null)),
    score,
    unlocked: [...unlockedTiers],
    nextId,
  });
  if (history.length > 15) history.shift();
  updateUndoBtn();
}

function undo() {
  if (!history.length || animating) return;
  const s = history.pop();
  // Clear all tiles
  for (const t of [...tiles]) killTile(t);
  grid = empty2D();
  // Rebuild
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      const d = s.grid[r][c];
      if (d) {
        const t = { id: d.id, r: d.r, c: d.c, v: d.v };
        grid[r][c] = t;
        tiles.add(t);
        renderTileEl(t, false);
      }
    }
  nextId = s.nextId;
  score = s.score;
  unlockedTiers = new Set(s.unlocked);
  updateScore();
  updateClueBadge();
  updateUndoBtn();
}

function updateUndoBtn() {
  undoBtn.disabled = history.length === 0 || animating;
}

// ============ Move ============
const DIRS = {
  left:  { dr: 0, dc: -1, iter: () => { const p = []; for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) p.push([r,c]); return p; } },
  right: { dr: 0, dc:  1, iter: () => { const p = []; for (let r=0;r<SIZE;r++) for (let c=SIZE-1;c>=0;c--) p.push([r,c]); return p; } },
  up:    { dr: -1, dc: 0, iter: () => { const p = []; for (let c=0;c<SIZE;c++) for (let r=0;r<SIZE;r++) p.push([r,c]); return p; } },
  down:  { dr:  1, dc: 0, iter: () => { const p = []; for (let c=0;c<SIZE;c++) for (let r=SIZE-1;r>=0;r--) p.push([r,c]); return p; } },
};

function move(dir) {
  if (animating || gameOver) return;
  const D = DIRS[dir];
  saveState();

  // Reset merged flag on all tiles
  for (const t of tiles) t.merged = false;

  let moved = false;
  let gain = 0;
  const dying = [];

  for (const [r, c] of D.iter()) {
    const t = grid[r][c];
    if (!t) continue;
    let nr = r, nc = c;
    while (true) {
      const tr = nr + D.dr, tc = nc + D.dc;
      if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
      const target = grid[tr][tc];
      if (!target) {
        grid[tr][tc] = t;
        grid[nr][nc] = null;
        nr = tr; nc = tc;
      } else if (target.v === t.v && !target.merged) {
        // Merge current tile INTO target
        target.v *= 2;
        target.merged = true;
        gain += target.v;
        grid[nr][nc] = null;
        t._targetR = tr; t._targetC = tc;
        dying.push(t);
        moved = true;
        break;
      } else {
        break;
      }
    }
    if (t.r !== nr || t.c !== nc) {
      if (!dying.includes(t)) { t.r = nr; t.c = nc; }
      moved = true;
    }
  }

  if (!moved) {
    history.pop();
    updateUndoBtn();
    return;
  }

  score += gain;

  animating = true;
  updateUndoBtn();

  // Move all tiles (including dying ones sliding to merge point)
  for (const t of tiles) {
    if (dying.includes(t)) {
      t.r = t._targetR; t.c = t._targetC;
    }
    positionTile(t);
  }

  setTimeout(() => {
    // Kill dying tiles
    for (const t of dying) killTile(t);
    // Update surviving merged tiles' visuals
    for (const t of tiles) {
      if (t.merged) {
        updateTileVisual(t);
        t.el.classList.remove('pop');
        void t.el.offsetHeight;
        t.el.classList.add('pop');
      }
    }
    // Score gain popup
    if (gain > 0) showScoreGain(gain);
    // Spawn new tile
    spawn();
    updateScore();
    // Unlock clues
    checkClueUnlocks();
    animating = false;
    updateUndoBtn();
    checkGameOver();
  }, ANIM_MS + 20);
}

function showScoreGain(g) {
  const el = document.createElement('div');
  el.className = 'score-gain';
  el.textContent = `+${g}`;
  boardWrap.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function updateScore() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('best2048mem', best);
  }
  bestEl.textContent = best;
}

// ============ Clue unlocks ============
function checkClueUnlocks() {
  for (const clue of STORY.clues) {
    if (unlockedTiers.has(clue.at)) continue;
    // Any tile has value >= clue.at?
    for (const t of tiles) {
      if (t.v >= clue.at) {
        unlockedTiers.add(clue.at);
        showClueToast(clue);
        break;
      }
    }
  }
  updateClueBadge();
}

function showClueToast(clue) {
  clueQueue.push(clue);
  if (!showingClue) processClueQueue();
}

function processClueQueue() {
  if (!clueQueue.length) { showingClue = false; return; }
  showingClue = true;
  const clue = clueQueue.shift();
  clueToastBody.textContent = clue.text;
  clueToastFoot.textContent = `— 达成 ${clue.at} · 点击继续`;
  clueToast.classList.add('show');
  let done = false;
  const dismiss = () => {
    if (done) return;
    done = true;
    clueToast.classList.remove('show');
    clueToast.removeEventListener('click', dismiss);
    clearTimeout(timer);
    setTimeout(processClueQueue, 350);
  };
  clueToast.addEventListener('click', dismiss);
  const timer = setTimeout(dismiss, 3500);
}

function updateClueBadge() {
  clueBadge.textContent = `${unlockedTiers.size}/${STORY.clues.length}`;
}

function renderClueList() {
  clueList.innerHTML = STORY.clues.map(c => {
    const unlocked = unlockedTiers.has(c.at);
    return `<div class="clue-item">
      <span class="clue-tier">${c.at}</span>
      <span class="clue-body ${unlocked ? '' : 'locked'}">${unlocked ? c.text : '待重组的记忆……'}</span>
    </div>`;
  }).join('');
}

// ============ Game over ============
function hasMovesLeft() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return true;
      const v = grid[r][c].v;
      if (c + 1 < SIZE && grid[r][c+1]?.v === v) return true;
      if (r + 1 < SIZE && grid[r+1][c]?.v === v) return true;
    }
  return false;
}

function checkGameOver() {
  if (!hasMovesLeft()) {
    gameOver = true;
    // Small toast prompting accusation
    setTimeout(() => {
      alert('无路可走。你已收集了能重组的一切。\n点击「开始推理」揭示凶手。');
    }, 300);
  }
}

// ============ Init game ============
function newGame() {
  grid = empty2D();
  tiles = new Set();
  nextId = 1;
  score = 0;
  history = [];
  animating = false;
  unlockedTiers = new Set();
  gameOver = false;
  clueQueue = [];
  showingClue = false;
  clueToast.classList.remove('show');
  tilesEl.innerHTML = '';
  spawn();
  spawn();
  updateScore();
  updateClueBadge();
  updateUndoBtn();
}

// ============ Verdict ============
let selectedSuspect = null, selectedMethod = null;

function initVerdict() {
  document.getElementById('verdictSub').textContent =
    `你已重组 ${unlockedTiers.size}/${STORY.clues.length} 段记忆。凶手是谁？用了什么手法？`;
  const susGrid = document.getElementById('suspectGrid');
  susGrid.innerHTML = STORY.suspects.map(s => `
    <button class="choice" data-sus="${s.id}">
      <div class="avatar">${s.avatar}</div>
      <div class="name">${s.name}</div>
      <div class="role">${s.role}</div>
      <div class="desc">${s.desc}</div>
    </button>`).join('');
  susGrid.querySelectorAll('.choice').forEach(b => {
    b.addEventListener('click', () => {
      susGrid.querySelectorAll('.choice').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedSuspect = b.dataset.sus;
      updateSubmit();
    });
  });
  const mtdGrid = document.getElementById('methodGrid');
  mtdGrid.innerHTML = STORY.methods.map(m => `
    <button class="choice" data-mtd="${m.id}">
      <div class="name">${m.name}</div>
      <div class="desc">${m.desc}</div>
    </button>`).join('');
  mtdGrid.querySelectorAll('.choice').forEach(b => {
    b.addEventListener('click', () => {
      mtdGrid.querySelectorAll('.choice').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedMethod = b.dataset.mtd;
      updateSubmit();
    });
  });
  selectedSuspect = null;
  selectedMethod = null;
  updateSubmit();
}

function updateSubmit() {
  document.getElementById('submitVerdictBtn').disabled = !selectedSuspect || !selectedMethod;
}

function submitVerdict() {
  const correct = selectedSuspect === STORY.answer.suspect && selectedMethod === STORY.answer.method;
  showResult(correct);
}

function showResult(correct) {
  const titleEl = document.getElementById('resultTitle');
  const bodyEl = document.getElementById('resultBody');
  if (correct) {
    titleEl.textContent = '真 相 大 白';
    titleEl.className = 'result-title win';
    bodyEl.innerHTML = STORY.correct.map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
  } else {
    const sName = STORY.suspects.find(s => s.id === selectedSuspect).name;
    const mName = STORY.methods.find(m => m.id === selectedMethod).name;
    titleEl.textContent = '你 想 错 了';
    titleEl.className = 'result-title lose';
    bodyEl.innerHTML = STORY.wrong(sName, mName).map(l => l ? `<p>${l}</p>` : '<p class="gap"></p>').join('');
  }
  showScreen('screen-result');
}

// ============ Input ============
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  const map = {
    ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
    a: 'left', d: 'right', w: 'up', s: 'down',
    A: 'left', D: 'right', W: 'up', S: 'down',
  };
  if (map[e.key]) { move(map[e.key]); e.preventDefault(); }
});

let touchStart = null;
boardWrap.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
boardWrap.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 24) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
  touchStart = null;
}, { passive: true });

// ============ Buttons ============
document.getElementById('startBtn').addEventListener('click', () => {
  newGame();
  showScreen('screen-game');
});
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('restartBtn').addEventListener('click', () => {
  if (confirm('重开一局？当前进度会重置。')) newGame();
});
document.getElementById('accuseBtn').addEventListener('click', () => {
  initVerdict();
  showScreen('screen-verdict');
});
document.getElementById('clueBtn').addEventListener('click', () => {
  renderClueList();
  clueModal.classList.add('show');
});
document.getElementById('closeClueBtn').addEventListener('click', () => {
  clueModal.classList.remove('show');
});
clueModal.addEventListener('click', e => {
  if (e.target === clueModal) clueModal.classList.remove('show');
});
document.getElementById('submitVerdictBtn').addEventListener('click', submitVerdict);
document.getElementById('replayBtn').addEventListener('click', () => {
  newGame();
  showScreen('screen-game');
});
document.getElementById('homeBtn').addEventListener('click', () => {
  window.location.href = 'index.html';
});

// ============ Boot ============
best = parseInt(localStorage.getItem('best2048mem') || '0', 10);
initTitle();
initBoardBackground();
</script>
